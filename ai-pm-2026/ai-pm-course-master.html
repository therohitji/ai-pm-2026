"4.2": `
<div class="wrap">
  <div class="les-kicker">Chapter 4 · Lesson 4.2</div>
  <h1 class="les-title">User Research When the Product Is Probabilistic</h1>
  <div class="les-meta">
    <span class="pill">Product research</span><span class="pill">~25 min read</span>
    <span class="pill">Prereq: 4.1</span><span class="pill">Difficulty: core</span>
  </div>
  <p class="motto">Normal research asks whether people want the feature. For a probabilistic product the only question that predicts success is how they feel the first time it's confidently, fluently wrong.</p>

  <p class="lead">Lesson 4.1 found the right problem; now you have to research it the right way — for a product that is wrong on purpose, sometimes. A deterministic feature either works or has a bug. An AI feature has a <em class="k">success rate</em>, and the user lives in the gap. The PM who only researches the happy path ships something that demos beautifully and gets abandoned the week it makes its first confident mistake. This lesson teaches you to research the <em class="k">failure experience</em>: how much error a use case tolerates, how cheaply a user can catch it, and the trap on the other side — users who trust it too much.</p>

  <h2><span class="ix">1</span> Your Mandate</h2>
  <div class="sub">What you own when the product can't promise it's right.</div>
  <p>Your mandate is to <strong>own the trust model</strong>: define, per use case, how good is good enough, and design for the moment the product is wrong. You do not own the model's accuracy — engineering and the model push that number up over time. You own whether the <em>failure experience</em> is survivable: can the user notice the mistake, fix it cheaply, and keep trusting the product afterward? Get that right and a 70%-correct product can be beloved. Get it wrong and a 95%-correct product gets uninstalled after one bad answer at the wrong moment.</p>

  <h2><span class="ix">2</span> Your Responsibilities</h2>
  <div class="sub">The research a normal PM skips — and an AI PM can't.</div>
  <table>
    <tr><th>You research</th><th>Not just (the happy-path version)</th></tr>
    <tr><td><strong>The failure experience</strong> — what users do when it's wrong</td><td>Whether they like it when it's right</td></tr>
    <tr><td><strong>Verification cost</strong> — how fast/cheap it is to catch a bad answer</td><td>How fast it produces an answer</td></tr>
    <tr><td><strong>Consequence of acting on a wrong answer</strong></td><td>The value of a correct answer</td></tr>
    <tr><td><strong>Trust calibration</strong> — do users over- or under-trust it?</td><td>Top-line satisfaction score</td></tr>
    <tr><td><strong>The recovery path</strong> — can trust survive the first mistake?</td><td>First-impression delight</td></tr>
  </table>
  <p>The through-line of this chapter: in an AI-saturated market you win by understanding a real workflow deeply — and "deeply" includes its failure modes. <strong>Researching only the happy path is how you mistake a fragile product for a strong one.</strong></p>

  <h2><span class="ix">3</span> Metrics That Matter Here</h2>
  <div class="sub">The trust scorecard. Satisfaction-on-the-happy-path is the vanity metric to avoid.</div>
  <table>
    <tr><th>Metric</th><th>Reads as</th><th>Why a PM watches it</th></tr>
    <tr><td><strong>Error tolerance threshold</strong></td><td>The accuracy bar below which this use case is unusable</td><td>It sets your real quality target — and it differs per task</td></tr>
    <tr><td><strong>Verification cost</strong></td><td>Time/effort to confirm or reject an output</td><td>Cheap-to-verify tasks tolerate far more error</td></tr>
    <tr><td><strong>Time-to-detect a wrong answer</strong></td><td>How long before the user notices a mistake</td><td>Slow detection = the mistake does damage</td></tr>
    <tr><td><strong>Over-reliance / automation-bias rate</strong></td><td>% of wrong outputs accepted without checking</td><td>The silent failure: users trusting garbage</td></tr>
    <tr><td><strong>Trust-after-error retention</strong></td><td>Do users come back after the first visible mistake?</td><td>The truest signal that the failure experience works</td></tr>
  </table>
  <div class="callout warn">
    <div class="ch">The trap — "they accepted it" is not "it was right"</div>
    <p>Acceptance and correctness are different things, and conflating them is the most dangerous metric error in AI products. Users accept wrong answers all the time — that's <strong>automation bias</strong>. If your only signal is "% accepted" or "satisfaction," a confidently-wrong product can look great in the data right up until it causes real harm. <strong>Measure whether accepted outputs were actually correct, not just whether users clicked yes.</strong></p>
  </div>

  <h2><span class="ix">4</span> How to Think Here</h2>
  <div class="sub">The "good enough" bar isn't one number — it's a function of two things you must research.</div>
  <div class="fig">
    <div class="fig-title">The good-enough bar = verification cost × consequence of error</div>
    <svg viewBox="0 0 520 300" xmlns="http://www.w3.org/2000/svg" font-family="Hanken Grotesk, sans-serif">
      <rect x="70" y="145" width="206" height="107" fill="#0a7d3c" opacity="0.07"/>
      <rect x="283" y="35" width="212" height="110" fill="#b25000" opacity="0.07"/>
      <line x1="70" y1="252" x2="495" y2="252" stroke="#1d1d1f" stroke-width="1.2"/>
      <line x1="70" y1="252" x2="70" y2="35" stroke="#1d1d1f" stroke-width="1.2"/>
      <line x1="282" y1="40" x2="282" y2="252" stroke="#dddddd" stroke-width="1"/>
      <line x1="70" y1="145" x2="490" y2="145" stroke="#dddddd" stroke-width="1"/>
      <text x="285" y="284" text-anchor="middle" font-size="11" fill="#86868b">cost to verify / fix a wrong answer   (cheap → expensive)</text>
      <text x="26" y="145" text-anchor="middle" font-size="11" fill="#86868b" transform="rotate(-90 26 145)">consequence of acting on it</text>
      <text x="175" y="196" text-anchor="middle" font-size="11.5" font-weight="700" fill="#0a7d3c">SHIP AGGRESSIVELY</text>
      <text x="175" y="214" text-anchor="middle" font-size="9" fill="#0a7d3c">autocomplete · drafts · suggestions</text>
      <text x="386" y="196" text-anchor="middle" font-size="11.5" font-weight="700" fill="#86868b">PROCEED WITH CARE</text>
      <text x="386" y="214" text-anchor="middle" font-size="9" fill="#86868b">verify-heavy, low-stakes tasks</text>
      <text x="175" y="92" text-anchor="middle" font-size="11.5" font-weight="700" fill="#0058b0">CITE · LET USER CHECK</text>
      <text x="175" y="110" text-anchor="middle" font-size="9" fill="#0058b0">answer engines · research</text>
      <text x="386" y="92" text-anchor="middle" font-size="11.5" font-weight="700" fill="#b25000">HUMAN-IN-THE-LOOP</text>
      <text x="386" y="110" text-anchor="middle" font-size="9" fill="#b25000">diagnosis · legal · payments</text>
    </svg>
    <div class="fig-cap">The bar is set by two things you must research, not guess: how cheaply a user can catch and fix a wrong answer, and how badly a wrong answer hurts if they don't. Copilot lives bottom-left; an autonomous medical tool lives top-right.</div>
  </div>
  <p>The mental model: <strong>tolerance for error is not a property of the model — it's a property of the use case.</strong> The same 80%-accurate model is a delight in one quadrant and a lawsuit in another. So when you research a probabilistic product, you're really locating it on this grid:</p>
  <ol>
    <li><strong>Estimate the consequence.</strong> If the user acts on a wrong answer, how bad is it — a wasted second, or real harm?</li>
    <li><strong>Measure the verification cost.</strong> How fast and cheap is it to tell a good answer from a bad one? (A citation, a visible diff, an instant reject key all lower this.)</li>
    <li><strong>Place it on the grid</strong> and let the quadrant dictate the design: ship-aggressively, cite-and-verify, or hard human-in-the-loop.</li>
    <li><strong>Lower the verification cost as a product lever.</strong> You can often move a product into a safer quadrant by making errors cheaper to catch — that's a design decision you own.</li>
  </ol>
  <div class="callout accent">
    <div class="ch">Say this in the interview</div>
    <p>"The acceptable error rate isn't one number — it depends on how cheaply the user can verify an answer and how badly a wrong one hurts. So I'd research the failure experience per use case, and I'd treat 'make mistakes cheap to catch' as a core feature, not a nice-to-have."</p>
  </div>

  <h2><span class="ix">5</span> Frameworks to Deploy</h2>
  <div class="sub">Three tools for researching a product that's wrong on purpose.</div>
  <h3>① The error-tolerance matrix</h3>
  <p>The 2×2 above, used as a research instrument: for each task your product does, place it by <em class="k">verification cost</em> and <em class="k">consequence of error</em>. The quadrant tells you the acceptable quality bar and the required guardrails. Different tasks in the same product can land in different quadrants — research them separately.</p>
  <h3>② Research the failure path, not the happy path</h3>
  <p>In every interview and usability test, deliberately show users a <strong>wrong</strong> output and watch what they do. Do they catch it? How fast? Do they fix it, abandon the product, or — worse — accept it? The happy path tells you almost nothing about whether the product survives contact with reality. The failure path tells you everything.</p>
  <h3>③ Calibrate for both failure modes of trust</h3>
  <p>Reliance fails in two directions. <em class="k">Under-trust</em>: users ignore a correct, useful product. <em class="k">Over-trust</em> (automation bias): users accept wrong outputs without checking. Research both. The fix for under-trust is showing reliability; the fix for over-trust is friction that prompts verification — and the published research is clear that "AI literacy" alone does <em>not</em> protect users from over-trust, so you have to design for it.</p>

  <h2><span class="ix">6</span> Worked Solution</h2>
  <div class="sub">A real research brief — planned the way you'd actually run it.</div>
  <div class="callout">
    <div class="ch">The prompt</div>
    <p style="font-family:var(--font-ui);font-weight:600;">"We're building an AI feature that drafts replies to customer emails for our support agents. Plan the user research."</p>
  </div>
  <p><strong>Step 1 — Place the task on the grid first.</strong> Drafting a reply that a human agent reviews and sends is <em>cheap to verify</em> (the agent reads it in seconds) and <em>medium consequence</em> (a bad draft caught is harmless; a bad draft sent is not). That's near the ship-aggressively / cite-and-check border — good fit for a probabilistic product, <em>if</em> the human stays in the loop.</p>
  <p><strong>Step 2 — Research the failure experience explicitly.</strong> I'd run sessions where agents are shown deliberately flawed drafts — a wrong refund amount, a subtly off policy — and observe:</p>
  <div class="flow">
<span class="st">1 Map the wrong answers</span>   <span class="nt">what does a bad draft actually look like?</span>
   <span class="ar">↓</span>
<span class="st">2 Measure verify cost</span>       <span class="nt">how fast can an agent spot the flaw?</span>
   <span class="ar">↓</span>
<span class="st">3 Watch what they do</span>        <span class="nt">edit it, discard it — or send it blind?</span>
   <span class="ar">↓</span>
<span class="st">4 Set the good-enough bar</span>   <span class="nt">per reply type, by consequence</span>
  </div>
  <p><strong>Step 3 — Hunt for over-trust, not just errors.</strong> The scary finding wouldn't be "the draft was wrong" — it's "the agent sent it without reading because it looked confident." So I'd measure the over-reliance rate directly, and test design friction that forces a glance: surfacing the policy the draft relied on, highlighting the dollar amount, requiring a one-click confirm on anything irreversible.</p>
  <p><strong>Step 4 — Define the bar per reply type.</strong> Low-stakes replies (where's my order) can auto-draft freely. High-stakes replies (refunds, account changes) need the draft plus a verification cue and a human send. The research output isn't "users like it" — it's a per-task tolerance bar and a failure-experience design.</p>
  <div class="callout good">
    <div class="ch">Why this wins</div>
    <p>You researched what actually predicts retention — the failure experience — instead of happy-path delight. You separated tasks by consequence, measured verification cost, and caught the silent killer (over-trust). That's a research plan that ships a product people keep using after it makes its first mistake.</p>
  </div>

  <h2><span class="ix">7</span> Industry Case</h2>
  <div class="sub">The product that's "wrong" most of the time — and beloved anyway — plus the trap on its flip side.</div>
  <h3>GitHub Copilot — why a ~70%-rejected product still wins</h3>
  <p>Copilot is the cleanest proof that tolerance for error is a property of the use case, not the model. Multiple independent studies put its suggestion <strong>acceptance rate in the ~21–34% range</strong> (an Accenture enterprise study landed around 30%; peer-reviewed work reported low-to-mid 20s). Read naively, that's damning — developers reject most of what it offers. Yet the same body of research reports <strong>high satisfaction (around 72%)</strong> and real productivity gains, and GitHub's own studies found acceptance rate is a strong predictor of perceived productivity.</p>
  <p>Why does a product that's "wrong" most of the time delight users? Because it lives in the bottom-left quadrant: <strong>verification is nearly free.</strong> A wrong suggestion costs one keystroke to dismiss; a right one saves minutes. When the cost of catching an error rounds to zero, error tolerance is enormous — exactly the failure-experience design this lesson is about.</p>
  <ul>
    <li><strong>Low acceptance is fine when rejection is free.</strong> The product optimizes for cheap-to-dismiss misses and high-value hits — not for being right every time.</li>
    <li><strong>The over-trust caveat is real and documented.</strong> A widely-cited Stanford study found developers using an AI assistant wrote <em>more</em> insecure code while being <em>more</em> confident it was secure — automation bias in the wild. Cheap verification only helps if users actually verify.</li>
    <li><strong>Felt-speed can outrun real-speed.</strong> One controlled 2025 study found developers <em>felt</em> faster with AI help yet were measurably slower once validation overhead was counted — a reminder to research real behavior, not self-reported delight.</li>
  </ul>
  <div class="callout accent">
    <div class="ch">The PM takeaway</div>
    <p>Copilot won by understanding its workflow deeply enough to know that, for coding autocomplete, a wrong answer is almost free to reject — so "be helpful often" beats "be right always." Your research job is to find that same truth for <em>your</em> use case: where the failure experience is cheap, ship boldly; where it's costly or invisible, design for verification and human checkpoints before you ship at all.</p>
  </div>

  <h2><span class="ix">✓</span> Check Yourself</h2>
  <div class="quiz" data-correct="3">
    <div class="q">GitHub Copilot users accept only ~30% of suggestions yet report high satisfaction. What's the right lesson?</div>
    <div class="opt" data-i="0"><span class="l">A</span><span>The model is bad and needs replacing.</span></div>
    <div class="opt" data-i="1"><span class="l">B</span><span>Acceptance rate is the only metric that matters.</span></div>
    <div class="opt" data-i="2"><span class="l">C</span><span>Users are irrational.</span></div>
    <div class="opt" data-i="3"><span class="l">D</span><span>When a wrong answer is nearly free to reject, users tolerate a high error rate — error tolerance depends on verification cost, not just accuracy.</span></div>
    <div class="qexp">A wrong suggestion costs one keystroke to dismiss; a right one saves minutes. Cheap verification creates huge error tolerance. Tolerance for error is a property of the use case (where it sits on the verification-cost / consequence grid), not a fixed property of the model.</div>
  </div>
  <div class="quiz" data-correct="1">
    <div class="q">Your AI feature shows a 95% "user accepted the answer" rate. Why might that NOT mean the product is good?</div>
    <div class="opt" data-i="0"><span class="l">A</span><span>Acceptance is always equivalent to correctness.</span></div>
    <div class="opt" data-i="1"><span class="l">B</span><span>Automation bias — users accept confident-looking wrong answers without verifying, so high acceptance can hide real errors.</span></div>
    <div class="opt" data-i="2"><span class="l">C</span><span>95% is a low number.</span></div>
    <div class="opt" data-i="3"><span class="l">D</span><span>Acceptance rate can't be measured reliably.</span></div>
    <div class="qexp">Acceptance is not correctness. Users over-trust fluent, confident outputs (automation bias) — documented even among experts, and not prevented by "AI literacy." Measure whether accepted outputs were actually right, and design friction that prompts verification on high-consequence actions.</div>
  </div>

  <h2><span class="ix">✎</span> Apply It Yourself</h2>
  <div class="sub">No worked answer this time — this one's your rep. Give it 10 minutes before you move on.</div>
  <div class="callout">
    <div class="ch">Your problem</div>
    <p style="font-family:var(--font-ui);font-weight:600;">"You're researching an AI feature that auto-suggests medical-billing codes for clinicians. Plan the research — focusing on what classic PM research would miss."</p>
  </div>
  <p><strong>Hints</strong> (peek only if you're stuck):</p>
  <ul>
    <li>Research the failure experience, not just the happy path.</li>
    <li>Place the task on the verification-cost × consequence grid.</li>
    <li>The trap: measuring happy-path satisfaction and shipping.</li>
  </ul>
  <table>
    <tr><th>A strong answer...</th><th>A weak answer...</th></tr>
    <tr><td>Studies how users behave on a wrong suggestion; measures verification cost and over-trust.</td><td>Only tests when it's right.</td></tr>
    <tr><td>Sets a per-use-case 'good enough' bar by consequence.</td><td>Picks one accuracy target for everything.</td></tr>
    <tr><td>Watches automation bias (accepting wrong codes unchecked).</td><td>Assumes users will catch errors.</td></tr>
  </table>
  <div class="callout accent">
    <div class="ch">Make it live</div>
    <p>Use an AI feature and deliberately accept a wrong output. How cheap was it to catch — and would you have, if you weren't looking?</p>
  </div>
  __NAV__
</div>

  <p class="lead">You've found a real problem (4.1) and researched how users tolerate it being probabilistic (4.2). Now you size and <em class="k">time</em> it. Not every good problem should be built today: some are thin wrappers to pass on, some are real but waiting on a model capability that hasn't arrived, and some are ready now. This lesson gives you the <em class="k">build / wait / wrap</em> verdict — judging an opportunity by both its durability and its timing, so you don't ship a wrapper, build too early, or miss the window.</p>

  <h2><span class="ix">1</span> Your Mandate</h2>

  <p>The two questions that produce the verdict, in order: <strong>is it durable?</strong> (if no, WRAP) and <strong>can the model do it now?</strong> (if yes, BUILD; if not-yet-but-coming, WAIT). Durability is the 4.1 test; timing is the new one this lesson adds.</p>

  <div class="sub">Three tools for sizing and timing.</div>
  <h3>① The build / wait / wrap trichotomy</h3>
  <p>Force every opportunity into one of three buckets, not a vague "maybe." The discipline of naming WAIT and WRAP as real verdicts — not just BUILD — is what stops you from pouring resources into a thin idea or a too-early one. Most ideas are WRAP; a few are WAIT; the rare durable-and-ready one is BUILD.</p>
  <h3>② The capability-threshold test</h3>
  <p>For a WAIT idea, ask precisely: <em class="k">what would the model have to do that it can't yet, and what release might deliver it?</em> Naming the threshold (sub-second latency, a quality bar, a price drop) turns "wait" from passive into a trigger you watch for — so you build the day it crosses, not a year late.</p>
  <h3>③ "Wait" is a strategy, not a failure</h3>
  <p>Choosing not to build yet is a legitimate, often-correct decision (it becomes roadmap sequencing in Ch.6.1). The teams that win an emerging category are usually the ones who waited for the capability threshold and then moved fast — not the ones who burned two years building before the model was ready.</p>

  <h2><span class="ix">6</span> Worked Solution</h2>
  <div class="sub">Three pitches, three verdicts.</div>
  <div class="callout">
    <div class="ch">The prompt</div>
    <p style="font-family:var(--font-ui);font-weight:600;">"A founder pitches three AI ideas: (a) a tool that summarizes any webpage, (b) a voice agent that takes restaurant phone orders, (c) a vertical AI for insurance-claims processing with proprietary claims data. Which do you build?"</p>
  </div>
  <p><strong>Run each through durable? then model-ready?</strong></p>
  <div class="flow">
<span class="st">(a) summarize a webpage</span>   <span class="nt">thin · the browser and model already do it · no moat → WRAP, pass</span>
<span class="st">(b) voice ordering agent</span>   <span class="nt">durable workflow · threshold just crossed (2024 real-time voice) → BUILD now</span>
<span class="st">(c) insurance-claims AI</span>    <span class="nt">proprietary data + deep workflow · model can reason today via RAG → BUILD now</span>
  </div>
  <p><strong>(a) WRAP.</strong> Summarizing a page is a single shallow step the model and the browser already do for free. No workflow depth, no moat — a feature, not a company. Pass (4.1's graveyard).</p>
  <p><strong>(b) BUILD now — and own the workflow, not the voice.</strong> Real-time voice only became viable when latency and quality crossed the human-conversation threshold (around late 2024). It <em>was</em> a WAIT idea; now the window is open. But I'd build the ordering <em>workflow</em> (menu, POS integration, the restaurant's data) with voice as the wedge — a thin voice wrapper would itself be a WRAP.</p>
  <p><strong>(c) BUILD now.</strong> Durable by construction — proprietary claims data plus a deep, regulated workflow (a moat) — and the model can do the reasoning today with RAG. Durable and ready: build.</p>
  <div class="callout good">
    <div class="ch">Why this wins</div>
    <p>You didn't rank by which demo was coolest; you sized each by durability and timing. You passed the wrapper, recognized the voice opportunity's window had just opened (and refused to build it thin), and greenlit the durable, model-ready vertical. That's opportunity sizing — the research-stage judgment that decides what's even worth building.</p>
  </div>

  <h2><span class="ix">7</span> Industry Case</h2>
  <div class="sub">Timing a capability threshold — and the graveyard for those who didn't.</div>
  <h3>Voice agents — a "wait" that became a "build" overnight</h3>
  <p>Voice agents are the cleanest 2025–26 example of timing an opportunity. For years, real-time voice was a WAIT: the round-trip of speech-to-text, model, and text-to-speech couldn't hit the ~300–500ms window human conversation needs, so voice products felt robotic and stalled. Then the threshold crossed — by late 2024, real-time conversational models and steep price cuts (OpenAI dropped its real-time API price sharply) brought latency and cost into range — and the window flung open: by some counts <strong>around 22% of a late-2024 Y Combinator cohort were voice-first startups.</strong> The opportunity didn't change; the model's capability did, converting a WAIT into a BUILD. And the seasoned framing of that wave — <em>voice will be the wedge, not the product</em> — is the WRAP warning restated: a thin voice layer is a feature, so the durable play is the workflow behind it.</p>
  <p>The contrast cases you already know. The WRAP graveyard — thin single-prompt wrappers eaten by frontier features (4.1) — is full of teams that built what they should have passed on. The BUILD winners — <strong>Cursor</strong> (which rode coding capability crossing a threshold and built real workflow depth on top, reaching billions in revenue) and the vertical agents like <strong>Sierra</strong> and <strong>Harvey</strong> — are durable workflows built when the model was ready. Same market, three verdicts, three fates.</p>
  <ul>
    <li><strong>Capability thresholds convert WAIT to BUILD.</strong> Voice was un-buildable, then suddenly buildable — the model moved, not the problem.</li>
    <li><strong>Even a hot window can hide a WRAP.</strong> A thin voice wrapper is still a wrapper; "voice is the wedge, not the product."</li>
    <li><strong>The durable, ready opportunity is the rare BUILD.</strong> Cursor, Sierra, Harvey — workflow depth, built at the right time.</li>
  </ul>
  <div class="callout accent">
    <div class="ch">The PM takeaway</div>
    <p>In an AI-saturated market the scarce thing is a real problem — and the next-scarcest is the judgment to build it at the right time. Size every opportunity by durability and timing: wrap the thin ones, wait deliberately for the ones whose threshold is coming, and build the durable, model-ready ones now. That verdict, made well, is where a real product begins.</p>
  </div>

  <h2><span class="ix">✓</span> Check Yourself</h2>
  <div class="quiz" data-correct="2">
    <div class="q">An idea is a genuinely deep workflow with a real moat, but today's models can't do the core task well enough — though the trajectory is clearly heading there. What's the verdict?</div>
    <div class="opt" data-i="0"><span class="l">A</span><span>WRAP — pass on it.</span></div>
    <div class="opt" data-i="1"><span class="l">B</span><span>BUILD now — pour resources in immediately.</span></div>
    <div class="opt" data-i="2"><span class="l">C</span><span>WAIT — it's durable but not yet model-ready; name the capability threshold and build when it crosses.</span></div>
    <div class="opt" data-i="3"><span class="l">D</span><span>Fine-tune a model from scratch to force it.</span></div>
    <div class="qexp">Durable but not-yet-feasible is the WAIT verdict. Building now means scaffolding around a limitation the next release will remove (the overhang trap). Name the threshold you're watching and build the day it crosses — that's how the winners timed voice agents.</div>
  </div>
  <div class="quiz" data-correct="0">
    <div class="q">Real-time voice agents went from stalled to a startup gold rush around late 2024. What changed?</div>
    <div class="opt" data-i="0"><span class="l">A</span><span>The model's capability crossed a threshold (latency, quality, and cost reached the human-conversation window) — converting a WAIT opportunity into a BUILD.</span></div>
    <div class="opt" data-i="1"><span class="l">B</span><span>People suddenly started liking voice.</span></div>
    <div class="opt" data-i="2"><span class="l">C</span><span>The underlying problem changed.</span></div>
    <div class="opt" data-i="3"><span class="l">D</span><span>Voice wrappers became durable on their own.</span></div>
    <div class="qexp">The problem didn't change; the model did. Once real-time voice hit the ~300–500ms latency and cost window, the opportunity flipped from WAIT to BUILD. (And note: voice is the wedge, not the product — the durable build is the workflow behind it, not a thin voice wrapper.)</div>
  </div>

  <h2><span class="ix">✎</span> Apply It Yourself</h2>
  <div class="sub">No worked answer this time — this one's your rep. Give it 10 minutes before you move on.</div>
  <div class="callout">
    <div class="ch">Your problem</div>
    <p style="font-family:var(--font-ui);font-weight:600;">"A founder has three ideas: (a) summarize-any-PDF, (b) an AI that runs a small law firm's client intake end-to-end, (c) real-time AI translation for live events. Give each a verdict — build, wait, or wrap — and why."</p>
  </div>
  <p><strong>Hints</strong> (peek only if you're stuck):</p>
  <ul>
    <li>Two questions: is it durable, and can the model do it well enough now?</li>
    <li>Not durable → wrap. Durable but not-ready → wait (name the threshold).</li>
    <li>The trap: building a thin one, or building a 'wait' one too early.</li>
  </ul>
  <table>
    <tr><th>A strong answer...</th><th>A weak answer...</th></tr>
    <tr><td>Wraps the thin one; builds the durable, model-ready one; waits on the one needing a threshold.</td><td>Builds whichever demo is coolest.</td></tr>
    <tr><td>For a 'wait,' names the capability threshold to watch.</td><td>Builds into the overhang too early.</td></tr>
    <tr><td>Sizes the prize, not just the validity.</td><td>Treats all three as equally buildable.</td></tr>
  </table>
  <div class="callout accent">
    <div class="ch">Make it live</div>
    <p>Take your own AI idea and verdict it: build, wait, or wrap? If 'wait,' what model capability are you waiting for?</p>
  </div>

  <div class="callout good" style="margin-top:40px;">
    <div class="ch">Chapter 4 complete</div>
    <p>You can now find a problem worth owning in an AI-saturated market (4.1), research it for the failure experience rather than just the happy path (4.2), and size and time it with the build / wait / wrap verdict (4.3) — wrapping nothing, waiting deliberately, and building the durable, model-ready opportunities. The scarce thing was never the model; it was the real problem, built at the right time. Next, <strong>Chapter 5 — Product Analytics &amp; AI Metrics</strong>: why DAU lies for AI products, and the quality, cost-per-task, and trust metrics you measure instead.</p>
  </div>
  __NAV__
</div>

<div class="wrap">
  <div class="les-kicker">Chapter 5 · Lesson 5.1</div>
  <h1 class="les-title">Beyond DAU: Evals, Quality &amp; Cost-per-task</h1>
  <div class="les-meta">
    <span class="pill">Analytics &amp; metrics</span><span class="pill">~26 min read</span>
    <span class="pill">Prereq: Ch.1, Ch.4</span><span class="pill">Difficulty: core</span>
  </div>
  <p class="motto">Engagement is the one number an AI product can fake. A model that is quietly getting worse will light up every dashboard you inherited from your SaaS job — right up until the users are gone.</p>

  <p class="lead">Every PM arrives in AI fluent in DAU, retention, and session time. Those metrics will actively mislead you here. An AI product can show <em class="k">rising engagement while its quality falls</em> — because a wrong answer makes users try again, and a retry looks like engagement. This lesson hands you the real scorecard: the AI metric stack of <em class="k">eval score, cost-per-task, containment, and hallucination rate</em> — the numbers that tell you whether the product is actually good, not just busy.</p>

  <h2><span class="ix">1</span> Your Mandate</h2>
  <div class="sub">What you own when the product's quality is a probability, not a guarantee.</div>
  <p>Your mandate is to <strong>own the definition of "good" and make it measurable</strong> — and to refuse to run an AI product on borrowed SaaS vanity metrics. In deterministic software, "it works" is binary, so you can get away with measuring usage. In a probabilistic product, "it works" is a rate you have to define, measure, and defend. You don't build the eval harness (that's 5.2 and engineering); you decide <em class="k">what counts as a correct answer</em>, which single metric equals value, and what bar a release has to clear before it ships.</p>

  <h2><span class="ix">2</span> Your Responsibilities</h2>
  <div class="sub">The concrete deliverables of an AI analytics function.</div>
  <table>
    <tr><th>You own</th><th>You do NOT own</th></tr>
    <tr><td><strong>The eval set + quality bar</strong> — the questions and the "what counts as right"</td><td>Building the eval/logging pipeline (eng — Lesson 5.2)</td></tr>
    <tr><td><strong>The north-star value metric</strong> — the one number that means the product worked</td><td>The model and its raw benchmark scores</td></tr>
    <tr><td><strong>Separating vanity from value</strong> — killing the metrics that lie</td><td>The dashboards' visual implementation</td></tr>
    <tr><td><strong>The review cadence</strong> — who looks at quality, how often</td><td>The data warehouse plumbing</td></tr>
  </table>
  <p>The trap junior AI PMs fall into is inheriting the growth-team dashboard and assuming a rising line is good news. <strong>Your job is to be the person in the room who asks "rising how — resolved, or just re-tried?"</strong></p>

  <h2><span class="ix">3</span> Metrics That Matter Here</h2>
  <div class="sub">The AI metric stack. Memorize it — this is the scorecard that replaces DAU.</div>
  <table>
    <tr><th>Metric</th><th>Reads as</th><th>Why a PM watches it</th></tr>
    <tr><td><strong>Eval score (quality rate)</strong></td><td>% of outputs that meet your defined bar</td><td>The only objective "is it actually good" signal</td></tr>
    <tr><td><strong>Cost per task</strong></td><td>$ per completed job — tokens + retrieval + retries</td><td>Whether unit economics survive at scale (Ch.1)</td></tr>
    <tr><td><strong>Containment / resolution</strong></td><td>% of tasks finished correctly with no human</td><td>The ROI number execs and customers actually buy</td></tr>
    <tr><td><strong>Hallucination / error rate</strong></td><td>% of confidently-wrong outputs</td><td>Drives trust, churn, and legal risk more than any feature</td></tr>
    <tr><td><strong>Faithfulness / groundedness</strong></td><td>Did the answer stick to its retrieved sources?</td><td>Catches hallucination even when retrieval was fine</td></tr>
  </table>
  <div class="callout warn">
    <div class="ch">The trap — a rising line can be a symptom of failure</div>
    <p>On an AI product, <strong>engagement and quality can move in opposite directions</strong>. If answers get worse, users re-ask, rephrase, and retry — and your session count, messages-per-user, and time-in-product all go <em>up</em>. A growth PM celebrates; an AI PM gets suspicious. The single most important habit in this chapter: <strong>never read an engagement metric without checking the quality metric beside it.</strong></p>
  </div>

  <h2><span class="ix">4</span> How to Think Here</h2>
  <div class="sub">Picture the two curves that a single dashboard line hides.</div>
  <div class="fig">
    <div class="fig-title">Why DAU lies — engagement up, quality down</div>
    <svg viewBox="0 0 520 300" xmlns="http://www.w3.org/2000/svg" font-family="Hanken Grotesk, sans-serif">
      <polygon points="250,148 470,80 470,210" fill="#b25000" opacity="0.10"/>
      <line x1="70" y1="250" x2="490" y2="250" stroke="#1d1d1f" stroke-width="1.2"/>
      <line x1="70" y1="250" x2="70" y2="40" stroke="#1d1d1f" stroke-width="1.2"/>
      <text x="280" y="282" text-anchor="middle" font-size="11" fill="#86868b">time / successive releases   →</text>
      <text x="40" y="148" text-anchor="middle" font-size="11" fill="#86868b" transform="rotate(-90 40 148)">metric value</text>
      <polyline points="80,200 250,148 470,80" fill="none" stroke="#0071e3" stroke-width="2.4"/>
      <polyline points="80,100 250,148 470,210" fill="none" stroke="#b25000" stroke-width="2.4"/>
      <circle cx="470" cy="80" r="3.5" fill="#0071e3"/><circle cx="470" cy="210" r="3.5" fill="#b25000"/>
      <text x="464" y="68" text-anchor="end" font-size="10" font-weight="700" fill="#0058b0">engagement (DAU) ↑</text>
      <text x="464" y="226" text-anchor="end" font-size="10" font-weight="700" fill="#b25000">real quality / resolution ↓</text>
      <text x="392" y="150" text-anchor="middle" font-size="9.5" fill="#b25000">the gap DAU hides</text>
    </svg>
    <div class="fig-cap">One dashboard line — "usage is up" — can hide two diverging truths. As quality falls, frustrated users retry, which pushes engagement up. The only way to see the orange line is to measure it on purpose.</div>
  </div>
  <p>When you're handed an AI product's metrics, run this loop before you believe any of it:</p>
  <ol>
    <li><strong>Distrust inherited metrics.</strong> DAU, sessions, and time-in-product were built for deterministic software. Assume they're misleading until proven otherwise.</li>
    <li><strong>Name the one value metric.</strong> The single number that means a user's job got done — "resolved correctly," "task completed," "answer accepted and right." Everything else is secondary.</li>
    <li><strong>Separate vanity from value.</strong> "Handled," "engaged," "messages sent" are activity. "Resolved," "correct," "contained" are outcomes. Demand the outcome.</li>
    <li><strong>Read cost-per-task next to quality.</strong> They must be watched as a pair — a quality gain that triples cost may not be worth shipping (Ch.1's triangle).</li>
    <li><strong>Gate releases on an eval.</strong> No shipping a prompt or model change that drops the eval score, no matter what the demo looks like.</li>
  </ol>
  <div class="callout accent">
    <div class="ch">Say this in the interview</div>
    <p>"I don't trust DAU for an AI product — engagement can rise while quality falls, because retries look like usage. I'd define an eval-based quality score and cost-per-task as the real scorecard, and gate releases on the eval."</p>
  </div>

  <h2><span class="ix">5</span> Frameworks to Deploy</h2>
  <div class="sub">Three tools that make you the most trusted voice in the metrics review.</div>
  <h3>① The AI metric stack</h3>
  <p>Name the four that matter — <em class="k">quality (eval) rate, cost-per-task, containment/resolution, hallucination rate</em> — and put them on one board. The discipline is reporting all four together: a quality number with no cost number, or a cost number with no quality number, is half a story and usually the flattering half.</p>
  <h3>② Vanity vs value — "handled" is not "resolved"</h3>
  <p>For every metric, ask: is this <em>activity</em> or <em>outcome</em>? "Chats handled," "queries processed," "users engaged" measure that something happened — not that it worked. The outcome twin ("resolved correctly," "task completed") is the one that maps to money. When a vendor or exec quotes you an activity metric, your reflex is to ask for its outcome twin.</p>
  <h3>③ Evals as the production gate</h3>
  <p>Through 2025 the industry consensus hardened that <strong>evals are to AI products what unit tests are to software</strong> — they moved from a research nicety to a release gate. Practically: you maintain a fixed eval set, and a prompt/model/retrieval change must clear it before it ships. This is the single habit that stops "we improved it" from quietly meaning "we made it worse on the cases we forgot to check."</p>

  <h2><span class="ix">6</span> Worked Solution</h2>
  <div class="sub">A real moment you'll face — the dashboard that looks like a win.</div>
  <div class="callout">
    <div class="ch">The prompt</div>

  <p><strong>Step 1 — Spot the vanity metrics.</strong> "Chats handled" is a routing number — it counts conversations the bot touched, not ones it resolved. "Session time up" is exactly the signal that should worry me, not reassure me: longer sessions can mean users fighting a bot that won't help.</p>
  <p><strong>Step 2 — Pull the outcome twins.</strong></p>

<span class="st">REAL</span>     <span class="nt">resolution rate · repeat-inquiry rate · cost per resolution · eval quality</span>
   <span class="ar">↓</span>
<span class="nt"># if sessions rose because users re-asked after wrong answers, quality FELL</span>
  </div>
  <p><strong>Step 3 — Check the tell-tale: repeat inquiries.</strong> If the same users are coming back about the same issue, the bot is deflecting, not resolving. A rising repeat-inquiry rate alongside rising "handled" is the fingerprint of the engagement-up-quality-down trap.</p>
  <p><strong>Step 4 — Run an eval before expanding.</strong> Sample a few hundred real conversations, score them for correct resolution and hallucination, and put cost-per-resolution next to it. <em>Then</em> decide on expansion. "We resolve 48% correctly at $0.30 each, and repeat inquiries are flat" is a green light; "handled is up but resolution is down" is a stop.</p>

  <h2><span class="ix">7</span> Industry Case</h2>

  <p><strong>Intercom Fin</strong> is the clearest signal of where the industry landed on AI metrics, because it puts its money where the real metric is: Fin is priced at roughly <strong>$0.99 per resolution</strong> — you pay only when a customer issue is actually resolved, not for messages handled or for the AI being available. If a customer asks for a human, or the automation fails to complete, it is not counted and not billed. That pricing model is a metric philosophy made concrete: <em>resolution is the unit of value, activity is not</em>. And Intercom is honest about the bar — its own published case studies report real-world resolution rates around <strong>42–50%</strong> (Linktree ~42%, Robin ~50%), not the 90s.</p>

  <ul>

  <div class="callout accent">
    <div class="ch">The PM takeaway</div>

  </div>

  <div class="quiz" data-correct="1">

  <div class="sub">No worked answer this time — this one's your rep. Give it 10 minutes before you move on.</div>
  <div class="callout">
    <div class="ch">Your problem</div>
    <p style="font-family:var(--font-ui);font-weight:600;">"Leadership is thrilled: your AI support bot's 'chats handled' is up 40% and session time is up. They want to expand it everywhere. What do you check before celebrating?"</p>

  <p><strong>Hints</strong> (peek only if you're stuck):</p>
  <ul>
    <li>Separate vanity (handled, sessions) from value (resolved, correct).</li>
    <li>Rising engagement can be retries after wrong answers.</li>

  <table>

    <tr><td>Pulls resolution rate, repeat-inquiry rate, cost-per-resolution, and an eval sample.</td><td>Celebrates 'handled' and session time.</td></tr>
    <tr><td>Reads rising sessions as a possible quality red flag.</td><td>Assumes more usage = better.</td></tr>
    <tr><td>Gates expansion on a quality eval, not the dashboard.</td><td>Scales a possibly-broken product.</td></tr>
  </table>
  <div class="callout accent">
    <div class="ch">Make it live</div>
    <p>Find an AI product bragging about a usage number. Ask: is that activity or an outcome? What's the value metric it's not showing?</p>
  </div>
  __NAV__
</div>
`,

"5.2": `
<div class="wrap">
  <div class="les-kicker">Chapter 5 · Lesson 5.2</div>
  <h1 class="les-title">Instrumenting an LLM Product</h1>
  <div class="les-meta">
    <span class="pill">Analytics &amp; metrics</span><span class="pill">~25 min read</span>
    <span class="pill">Prereq: 5.1</span><span class="pill">Difficulty: core</span>
  </div>
  <p class="motto">An LLM fails silently and fluently. If you're not logging the prompt, the context, and the output together, your first sign of a quality regression will be a customer telling the internet before they tell you.</p>

  <p class="lead">Lesson 5.1 told you which metrics to watch; this one is about <em class="k">how you can see them at all</em>. Instrumentation is the difference between catching a regression in an eval run on Tuesday and discovering it from an angry post on Friday. By the end you'll know exactly what to log on every AI request — <em class="k">prompt, retrieved context, output, tool calls, feedback</em> — and how that turns a silent, probabilistic product into one you can actually debug, measure, and trust.</p>

  <h2><span class="ix">1</span> Your Mandate</h2>
  <div class="sub">What you own when the product can't tell you it's broken.</div>
  <p>Your mandate is to <strong>own what gets logged and what the dashboard shows</strong> — the observability requirements. Engineering builds the pipeline; you specify the <em class="k">trace</em> (what must be captured on every request) and the <em class="k">alerts</em> (what quality drop should page someone). The non-negotiable you defend: <strong>quality must be observable.</strong> A product whose failures are invisible until a user complains is, for a PM, an unmanageable product.</p>

  <h2><span class="ix">2</span> Your Responsibilities</h2>
  <div class="sub">What to log — and why each piece earns its place.</div>
  <table>
    <tr><th>Capture on every request</th><th>So that you can…</th></tr>
    <tr><td><strong>Prompt</strong> (final, assembled)</td><td>See exactly what the model was actually asked</td></tr>
    <tr><td><strong>Retrieved context</strong></td><td>Localize failure — was it bad retrieval or bad generation? (Ch.1)</td></tr>
    <tr><td><strong>Output</strong></td><td>Score it, replay it, compare across releases</td></tr>
    <tr><td><strong>Tool calls + arguments</strong></td><td>See what the agent did, not just what it said (Ch.2)</td></tr>
    <tr><td><strong>User feedback signals</strong></td><td>Thumbs, edits, regenerates, escalations — free quality labels</td></tr>
    <tr><td><strong>Cost + latency per task</strong></td><td>Watch unit economics and the p95 tail (Ch.1)</td></tr>
  </table>
  <p>The thing that separates an AI trace from a normal log: <strong>you must capture the prompt and the retrieved context, not just the output.</strong> Logging only the final answer tells you <em>that</em> it failed; logging the whole chain tells you <em>where</em> — and "where" is the entire game (Ch.1's trace-the-chunk).</p>

  <h2><span class="ix">3</span> Metrics That Matter Here</h2>
  <div class="sub">The scorecard for your instrumentation itself.</div>
  <table>
    <tr><th>Metric</th><th>Reads as</th><th>Why a PM watches it</th></tr>
    <tr><td><strong>Trace coverage</strong></td><td>% of requests with a full, replayable trace</td><td>Blind spots are where regressions hide</td></tr>
    <tr><td><strong>Online eval score</strong></td><td>Quality scored on live production traffic</td><td>Your early-warning system, before users react</td></tr>
    <tr><td><strong>Regression-detection lead time</strong></td><td>How long from a quality drop to you knowing</td><td>The whole point — beat the user to the bad news</td></tr>
    <tr><td><strong>Feedback capture rate</strong></td><td>% of interactions with a usable feedback signal</td><td>More labels = cheaper, faster evals</td></tr>
  </table>
  <div class="callout warn">
    <div class="ch">The trap — logging the output only</div>
    <p>The most common instrumentation mistake is saving the model's final answer and nothing else. Then a bad answer shows up and you're stuck: was retrieval wrong, was the prompt wrong, did the model regress? You can't tell, so you guess — and guessing on a probabilistic system burns weeks. <strong>Capture the full chain (prompt + context + output + tools), or you've logged the symptom and thrown away the diagnosis.</strong></p>
  </div>

  <h2><span class="ix">4</span> How to Think Here</h2>
  <div class="sub">Instrumentation isn't a log file — it's a loop that catches problems before users do.</div>
  <div class="fig">
    <div class="fig-title">The observability loop</div>
    <svg viewBox="0 0 520 300" xmlns="http://www.w3.org/2000/svg" font-family="Hanken Grotesk, sans-serif">
      <rect x="185" y="22" width="150" height="46" rx="9" fill="#0071e3" opacity="0.10" stroke="#0071e3" stroke-width="1.3"/>
      <text x="260" y="42" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0058b0">1 · Trace everything</text>
      <text x="260" y="58" text-anchor="middle" font-size="10" fill="#0058b0">prompt → context → output</text>
      <rect x="372" y="118" width="132" height="48" rx="9" fill="#ffffff" stroke="#1d1d1f" stroke-width="1.3"/>
      <text x="438" y="138" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1d1d1f">2 · Score online</text>
      <text x="438" y="154" text-anchor="middle" font-size="10" fill="#86868b">evals on live traffic</text>
      <rect x="185" y="224" width="150" height="48" rx="9" fill="#ffffff" stroke="#1d1d1f" stroke-width="1.3"/>
      <text x="260" y="244" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1d1d1f">3 · Detect &amp; alert</text>
      <text x="260" y="260" text-anchor="middle" font-size="10" fill="#86868b">quality drop → page you</text>
      <rect x="16" y="118" width="132" height="48" rx="9" fill="#ffffff" stroke="#1d1d1f" stroke-width="1.3"/>
      <text x="82" y="138" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1d1d1f">4 · Curate &amp; fix</text>
      <text x="82" y="154" text-anchor="middle" font-size="10" fill="#86868b">failures → eval set</text>
      <path d="M335,48 Q420,55 438,116" fill="none" stroke="#86868b" stroke-width="1.4" marker-end="url(#o52)"/>
      <path d="M438,166 Q400,238 337,248" fill="none" stroke="#86868b" stroke-width="1.4" marker-end="url(#o52)"/>
      <path d="M185,248 Q100,238 82,168" fill="none" stroke="#86868b" stroke-width="1.4" marker-end="url(#o52)"/>
      <path d="M82,116 Q120,55 183,46" fill="none" stroke="#86868b" stroke-width="1.4" marker-end="url(#o52)"/>
      <text x="260" y="146" text-anchor="middle" font-size="10.5" font-weight="800" fill="#1d1d1f">CLOSE THE LOOP</text>
      <text x="260" y="163" text-anchor="middle" font-size="9.5" fill="#b25000">catch it before users do</text>
      <defs><marker id="o52" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#86868b"/></marker></defs>
    </svg>
    <div class="fig-cap">Logging isn't the goal — the loop is. Trace every request, score traffic with online evals, alert when quality drops, and feed each real failure back into the eval set so it can never silently return.</div>
  </div>
  <p>The mental model is a flywheel, not a filing cabinet. Run it like this:</p>
  <ol>
    <li><strong>Trace everything</strong> — full chain on every request, so any failure is reproducible.</li>
    <li><strong>Score it online</strong> — run evals (LLM-as-judge plus checks) on live traffic, asynchronously, so quality is measured continuously, not just at launch.</li>
    <li><strong>Alert on the drop</strong> — when the online score falls below a threshold, someone gets paged. This is how you beat the user to the bad news.</li>
    <li><strong>Curate failures into the eval set</strong> — every confirmed bad case becomes a permanent test, so the next release can't reintroduce it (this is the bridge to Ch.11's eval-driven iteration).</li>
  </ol>
  <div class="callout accent">
    <div class="ch">Say this in the interview</div>
    <p>"I'd trace the full chain — prompt, retrieved context, output, tool calls — not just the answer, so I can localize failures. Then I'd run online evals on production traffic with alerting, so we catch a regression before a customer does."</p>
  </div>

  <h2><span class="ix">5</span> Frameworks to Deploy</h2>
  <div class="sub">Three practices that turn a black box into a managed product.</div>
  <h3>① Trace the full chain</h3>
  <p>Log <em class="k">prompt + retrieved context + output + tool calls</em> as one linked trace, not scattered lines. This is what lets you answer the only question that matters when something breaks: <em>which box failed?</em> (Ch.1). Without the context in the trace, you can't separate a retrieval failure from a generation failure — and you'll "fix" the wrong one.</p>
  <h3>② Online evals + alerting</h3>
  <p>Evals aren't only a pre-launch gate (5.1) — run them continuously on a sample of live traffic, scored in the background with zero user-facing latency, with an alert when the score drops. This converts "we found out from a support ticket" into "we got paged at 2pm and rolled back by 2:30."</p>
  <h3>③ The production-to-eval flywheel</h3>
  <p>Every real-world failure your traces surface should be <strong>curated into the eval set as a permanent test case</strong>. Production becomes your richest source of test data, and your eval suite gets stronger every week instead of going stale. Bad cases stop being one-off fires and become regressions you can never ship again.</p>

  <h2><span class="ix">6</span> Worked Solution</h2>
  <div class="sub">The "it got worse" complaint — and whether you can even tell.</div>
  <div class="callout">
    <div class="ch">The prompt</div>
    <p style="font-family:var(--font-ui);font-weight:600;">"Users say your AI feature 'got worse' after last week's release. You have no idea whether that's true. What instrumentation should have been there — and what do you do right now?"</p>
  </div>
  <p><strong>Step 1 — Diagnose the real problem: you're blind.</strong> The complaint may be real or may be noise — and the fact that I can't tell <em>is</em> the failure. The fix is observability, not a guess.</p>
  <p><strong>Step 2 — What should have existed.</strong> A full trace on every request, so any answer is reproducible and attributable:</p>
  <div class="flow">
<span class="st">[one request, traced]</span>
   <span class="ar">↓</span>
<span class="st">prompt</span>     <span class="nt">what we actually asked the model</span>
<span class="st">context</span>    <span class="nt">what retrieval fed in   ← localize the failure here (Ch.1)</span>
<span class="st">output</span>     <span class="nt">what it returned</span>
<span class="st">feedback</span>   <span class="nt">thumbs · edit · regenerate · escalate</span>
   <span class="ar">↓</span>
<span class="nt"># now retrieval-fail vs generation-fail is visible — and replayable</span>
  </div>
  <p><strong>Step 3 — What I do now.</strong> Pull a sample of pre- and post-release traces and run the eval set on both. If the post-release eval score dropped, the regression is real — and the traces tell me where (retrieval, prompt, or model). If the score held, the complaints are perception or a narrow slice I can isolate.</p>
  <p><strong>Step 4 — Make sure it never happens blind again.</strong> Stand up online evals on live traffic with an alert threshold, and a pre-release eval gate (5.1). Curate the failing cases into the eval set so this exact regression is now a permanent test.</p>
  <div class="callout good">
    <div class="ch">Why this wins</div>
    <p>You turned a vague "it got worse" into a measurable question, answered it with traces and an eval instead of opinion, localized the cause, and closed the loop so the next regression gets caught by a machine at 2pm — not by a customer on Friday night. That is what instrumentation buys.</p>
  </div>

  <h2><span class="ix">7</span> Industry Case</h2>
  <div class="sub">A whole tooling category that exists for exactly this problem.</div>
  <h3>The LLM observability stack — LangSmith, Langfuse, Braintrust</h3>
  <p>The clearest proof that instrumentation is now core AI-PM infrastructure is that an entire tooling category grew up around it in 2024–25. <strong>LangSmith</strong> (from the LangChain team), <strong>Langfuse</strong> (open-source, self-hostable), and <strong>Braintrust</strong> (managed, fast trace search) all do the same essential job: capture full traces, run evals on them — including LLM-as-judge — and monitor production quality over time. By 2025 the pattern these tools converged on is exactly this lesson's loop: <em>structured tracing + continuous online evals + regression tests wired into CI/CD</em>, with online scoring run asynchronously on live traffic so it adds no latency.</p>
  <p>The payoff is concrete. Braintrust reports production users including <strong>Notion, Stripe, Zapier, and Vercel</strong>; by Braintrust's own account, <strong>Notion went from fixing on the order of 3 issues a day to about 30</strong> after adopting systematic tracing and evals. That's not a model upgrade — it's the same team catching and fixing roughly ten times more quality issues purely because they could finally <em>see</em> them. The model didn't get smarter; the product got observable.</p>
  <ul>
    <li><strong>Tracing is the foundation.</strong> Every tool starts by capturing the full chain — prompt, context, output, tool calls — because you can't evaluate or debug what you didn't record.</li>
    <li><strong>Online evals are the early-warning system.</strong> Scoring live traffic and alerting on drops is how teams catch regressions before users, instead of after.</li>
    <li><strong>The loop closes in CI.</strong> Production failures become eval cases that gate the next release — the flywheel, in real tooling.</li>
  </ul>
  <div class="callout accent">
    <div class="ch">The PM takeaway</div>
    <p>You measure quality (5.1) only if you instrument for it (5.2) — and a whole industry now exists to help you. The teams shipping trustworthy AI in 2026 aren't the ones with the biggest model; they're the ones who can see their product fail in a dashboard before a customer sees it fail in their face.</p>
  </div>

  <h2><span class="ix">✓</span> Check Yourself</h2>
  <div class="quiz" data-correct="0">
    <div class="q">Your AI product logs only the final output of each request. Why is that a problem when a bad answer appears?</div>
    <div class="opt" data-i="0"><span class="l">A</span><span>You can see THAT it failed but not WHERE — you can't tell a retrieval failure from a generation failure without the prompt and context in the trace.</span></div>
    <div class="opt" data-i="1"><span class="l">B</span><span>Outputs take too much storage.</span></div>
    <div class="opt" data-i="2"><span class="l">C</span><span>It's fine — the output is all that matters.</span></div>
    <div class="opt" data-i="3"><span class="l">D</span><span>Logging slows the model down too much to allow.</span></div>
    <div class="qexp">Logging the output is logging the symptom. To diagnose, you need the full chain — prompt + retrieved context + output + tool calls — so you can localize the failure (Ch.1's trace-the-chunk). Otherwise you guess, and guessing on a probabilistic system wastes weeks.</div>
  </div>
  <div class="quiz" data-correct="2">
    <div class="q">What's the point of running evals on live production traffic (online evals), not just before launch?</div>
    <div class="opt" data-i="0"><span class="l">A</span><span>To increase model latency.</span></div>
    <div class="opt" data-i="1"><span class="l">B</span><span>To replace user feedback entirely.</span></div>
    <div class="opt" data-i="2"><span class="l">C</span><span>To catch a quality regression early — get alerted when scores drop, before users notice and complain.</span></div>
    <div class="opt" data-i="3"><span class="l">D</span><span>To make the dashboard look busier.</span></div>
    <div class="qexp">Online evals score live traffic asynchronously and alert when quality drops below a threshold — your early-warning system. Combined with a pre-release eval gate and curating failures back into the eval set, that's the observability loop that beats users to the bad news.</div>
  </div>

  <h2><span class="ix">✎</span> Apply It Yourself</h2>
  <div class="sub">No worked answer this time — this one's your rep. Give it 10 minutes before you move on.</div>
  <div class="callout">
    <div class="ch">Your problem</div>
    <p style="font-family:var(--font-ui);font-weight:600;">"Users say your AI feature 'got worse' after last week's release. You have no data to confirm it. Decide what instrumentation should have existed and what you do right now."</p>
  </div>
  <p><strong>Hints</strong> (peek only if you're stuck):</p>
  <ul>
    <li>You need the full trace: prompt + retrieved context + output, not just the answer.</li>
    <li>Compare pre/post-release on an eval set to confirm it's real.</li>
    <li>The trap: guessing or arguing instead of measuring.</li>
  </ul>
  <table>
    <tr><th>A strong answer...</th><th>A weak answer...</th></tr>
    <tr><td>Specifies full-chain tracing; runs the eval set on pre/post traces to localize the cause.</td><td>Guesses it's the model.</td></tr>
    <tr><td>Stands up online evals + alerting so the next regression is caught first.</td><td>Waits for more complaints.</td></tr>
    <tr><td>Curates the failures into the eval set as regression tests.</td><td>Fixes one case and moves on.</td></tr>
  </table>
  <div class="callout accent">
    <div class="ch">Make it live</div>
    <p>Open an LLM observability tool's demo (LangSmith / Langfuse / Braintrust) and look at a trace. Could you tell retrieval-fail from generation-fail from it?</p>
  </div>

  <div class="callout good" style="margin-top:40px;">
    <div class="ch">Chapter 5 complete</div>
    <p>You can now run an AI product on the metrics that tell the truth — eval quality, cost-per-task, resolution — instead of vanity engagement, and you know how to instrument a product so you see its failures before your users do. DAU lies; you no longer fly blind. Next, <strong>Chapter 6 — Product Planning &amp; Prioritization</strong>: how to roadmap when the model keeps improving under you.</p>
  </div>
  __NAV__
</div>
`,

/* ---------------------------------------------------------------- 6.1 */
"6.1": `
<div class="wrap">
  <div class="les-kicker">Chapter 6 · Lesson 6.1</div>
  <h1 class="les-title">Roadmapping When the Model Keeps Changing</h1>
  <div class="les-meta">
    <span class="pill">Product planning</span><span class="pill">~24 min read</span>
    <span class="pill">Prereq: Ch.4</span><span class="pill">Difficulty: core</span>
  </div>
  <p class="motto">Your roadmap's biggest competitor isn't another company — it's the next version of the model you're building on. Plan as if it ships next quarter, because it will.</p>

  <p class="lead">Every roadmap framework you learned assumes a stable foundation: you decide what to build, engineering builds it, the ground stays put. In AI the ground moves under you — a frontier release every few weeks can hand you a feature for free or erase one you spent a quarter on. This lesson teaches you to roadmap on that shifting ground: to tell, for any bet, whether the model's improvement will <em class="k">strengthen it or submerge it</em> — and to build above the waterline.</p>

  <h2><span class="ix">1</span> Your Mandate</h2>
  <div class="sub">What you own when your foundation upgrades itself without asking.</div>
  <p>Your mandate is to <strong>sequence the roadmap against the model's trajectory, not against a frozen spec</strong>. You don't control when the next model ships or what it can do — that's the vendor's roadmap, not yours. What you own is the decision, for every item, of whether to <em class="k">build it now, wait for the model to do it, or never build it because the model will</em>. Get that judgment right and each release is a tailwind; get it wrong and you ship things that are obsolete the week they launch.</p>

  <h2><span class="ix">2</span> Your Responsibilities</h2>
  <div class="sub">The concrete planning calls that are yours.</div>
  <table>
    <tr><th>You own</th><th>You do NOT own</th></tr>
    <tr><td><strong>Classifying every bet</strong> by model-overhang exposure — will a better model help or kill it?</td><td>The vendor's release schedule and roadmap</td></tr>
    <tr><td><strong>Sequencing</strong> — what to build now vs wait for vs skip</td><td>How fast the frontier improves</td></tr>
    <tr><td><strong>Investing in the durable layer</strong> — data, workflow, distribution the model can't provide</td><td>The model's raw capability curve</td></tr>
    <tr><td><strong>Re-planning each release</strong> — treating a model drop as a roadmap event</td><td>Which capability ships next</td></tr>
  </table>
  <p>The junior move is to build a tidy 12-month roadmap and defend it. The senior move is to build a roadmap that <strong>assumes the model gets dramatically better on its own</strong>, and concentrates your team's effort only where that improvement <em>can't</em> reach.</p>

  <h2><span class="ix">3</span> Metrics That Matter Here</h2>
  <div class="sub">How you measure whether a roadmap is built on rock or on sand.</div>
  <table>
    <tr><th>Signal</th><th>Reads as</th><th>Why a PM watches it</th></tr>
    <tr><td><strong>Model-overhang exposure</strong></td><td>% of roadmap value the next model likely gives away free</td><td>It's the share of your plan with a ticking clock</td></tr>
    <tr><td><strong>Durable-value ratio</strong></td><td>Effort spent above the waterline (data/workflow/distribution) vs below</td><td>Whether the team compounds or runs in place</td></tr>
    <tr><td><strong>"Survives a better model" test</strong></td><td>Would this bet still matter if the model were 30% better?</td><td>The fastest filter for a fragile roadmap item</td></tr>
    <tr><td><strong>Time-to-obsolescence</strong></td><td>Rough shelf life of a feature given the release cadence</td><td>Stops you funding 6-month builds with 2-month lives</td></tr>
  </table>
  <div class="callout warn">
    <div class="ch">The trap — building into the overhang</div>
    <p>"Model overhang" is the gap between what the current model can do and what the next one will. Building a feature that sits in that gap — a clever workaround for a limitation the next release simply removes — is the most common way AI teams waste a quarter. <strong>If your feature exists only to patch a current model weakness, assume the model fixes it and you just shipped dead weight.</strong></p>
  </div>

  <h2><span class="ix">4</span> How to Think Here</h2>
  <div class="sub">Picture model capability as a rising waterline — and build above it.</div>
  <div class="fig">
    <div class="fig-title">The rising waterline — build above it, not below</div>
    <svg viewBox="0 0 520 300" xmlns="http://www.w3.org/2000/svg" font-family="Hanken Grotesk, sans-serif">
      <polygon points="70,213 490,73 490,250 70,250" fill="#0071e3" opacity="0.10"/>
      <line x1="70" y1="250" x2="490" y2="250" stroke="#1d1d1f" stroke-width="1.2"/>
      <line x1="70" y1="250" x2="70" y2="40" stroke="#1d1d1f" stroke-width="1.2"/>
      <polyline points="70,213 490,73" fill="none" stroke="#0071e3" stroke-width="2.4"/>
      <text x="486" y="62" text-anchor="end" font-size="10" font-weight="700" fill="#0058b0">model capability ↑ (every release)</text>
      <text x="300" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#0a7d3c">ABOVE THE LINE — durable</text>
      <text x="300" y="112" text-anchor="middle" font-size="9.5" fill="#0a7d3c">your data · workflow · distribution</text>
      <text x="178" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#b25000">UNDERWATER</text>
      <text x="178" y="239" text-anchor="middle" font-size="9.5" fill="#b25000">the model now does this for free</text>
      <text x="280" y="282" text-anchor="middle" font-size="11" fill="#86868b">time →</text>
      <text x="40" y="148" text-anchor="middle" font-size="11" fill="#86868b" transform="rotate(-90 40 148)">capability / value</text>
    </svg>
    <div class="fig-cap">As model capability rises (the line), it submerges whatever sits below it — those features become free commodities. Build above the line, on the data, workflow, and distribution the model can't hand your competitor.</div>
  </div>
  <p>When you plan, run every roadmap item through this loop:</p>
  <ol>
    <li><strong>Plot the trajectory.</strong> Assume the model gets meaningfully better on the obvious axes (reasoning, context length, multimodality, cost) within your roadmap window. It will.</li>
    <li><strong>Locate each bet.</strong> Is it below the waterline (the model will do this soon) or above it (it depends on something only you have)?</li>
    <li><strong>Below the line → wait or skip.</strong> Don't spend a quarter building what a release gives you free. Ride the model up.</li>
    <li><strong>Above the line → invest hard.</strong> Proprietary data, workflow integration, distribution — the durable layer compounds with every model upgrade instead of being erased by it.</li>
    <li><strong>Re-plan on every release.</strong> A new model is a roadmap event, not just an eng ticket.</li>
  </ol>
  <div class="callout accent">
    <div class="ch">Say this in the interview</div>
