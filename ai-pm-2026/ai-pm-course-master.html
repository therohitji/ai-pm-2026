<div class="wrap">
  <div class="les-kicker">Chapter 6 · Lesson 6.3</div>
  <h1 class="les-title">Managing Model-Dependency Risk</h1>
  <div class="les-meta">
    <span class="pill">Product planning</span><span class="pill">~24 min read</span>
    <span class="pill">Prereq: 6.1</span><span class="pill">Difficulty: core</span>
  </div>
  <p class="motto">You don't own your most important dependency. A vendor can deprecate your model, triple its price, or change its behavior overnight — and your roadmap finds out the same day your users do.</p>

  <p class="lead">Your AI product runs on a model you rent from a vendor who can change the terms without asking. That's not a reason to panic — it's a risk to manage, the way you'd manage any critical dependency. This lesson covers the four ways a model dependency bites — <em class="k">deprecation, price hikes, behavior changes, and outages</em> — and how to de-risk a roadmap so a vendor's decision can't take your product down with it.</p>

  <h2><span class="ix">1</span> Your Mandate</h2>
  <div class="sub">What you own when the engine is rented, not bought.</div>
  <p>Your mandate is to <strong>treat the model as a vendor dependency with real failure modes, and design the product to survive them</strong>. You don't control the vendor's pricing, deprecation schedule, or the next version's behavior. You control your <em class="k">exposure</em> — how hard it would be to switch, how fast you'd notice a regression, and how much of your value lives in something the vendor can't take away. Owning that is the difference between a vendor's roadmap being an inconvenience and being an existential event.</p>

  <h2><span class="ix">2</span> Your Responsibilities</h2>
  <div class="sub">The four ways a model dependency bites — and your mitigation for each.</div>
  <table>
    <tr><th>Risk</th><th>Looks like</th><th>Your mitigation</th></tr>
    <tr><td><strong>Deprecation</strong></td><td>Your model is retired on the vendor's timeline, not yours</td><td>Abstraction layer + a tested fallback provider</td></tr>
    <tr><td><strong>Price hike</strong></td><td>Cost-per-task jumps on a new version or plan</td><td>Cost monitoring, model routing, right-sizing (Ch.1)</td></tr>
    <tr><td><strong>Behavior change</strong></td><td>An "upgrade" silently regresses your use case</td><td>Eval gate on every model change; pin versions (Ch.5)</td></tr>
    <tr><td><strong>Outage / rate limits</strong></td><td>The provider is down or throttling at your peak</td><td>Multi-provider failover, graceful degraded mode</td></tr>
  </table>
  <p>And the meta-risk under all four: <strong>lock-in</strong>. The more tightly your product is wired to one model's exact quirks, the less these mitigations are even possible. Your standing job is to keep switching <em>cheap</em>.</p>

  <h2><span class="ix">3</span> Metrics That Matter Here</h2>
  <div class="sub">How you measure exposure before it becomes a fire.</div>
  <table>
    <tr><th>Metric</th><th>Reads as</th><th>Why a PM watches it</th></tr>
    <tr><td><strong>Provider concentration</strong></td><td>% of traffic on a single model/vendor</td><td>Your blast radius if that one vendor moves</td></tr>
    <tr><td><strong>Switching cost / time</strong></td><td>Effort to move to another model</td><td>How fast you can respond to a deprecation or price hike</td></tr>
    <tr><td><strong>Eval-gate coverage</strong></td><td>% of model changes run through your eval set first</td><td>Whether a silent behavior regression can slip in</td></tr>
    <tr><td><strong>Cost exposure</strong></td><td>Bill impact if your model's price changed materially</td><td>How a vendor's pricing decision hits your margin</td></tr>
  </table>
  <div class="callout warn">
    <div class="ch">The trap — quirk lock-in</div>
    <p>The subtle killer isn't choosing one provider — it's building so tightly to <strong>one model's specific quirks</strong> (its exact prompt format, its idiosyncratic behavior, its undocumented strengths) that switching means a rewrite. You can depend on a model and still keep switching cheap — but only if you resist hard-coding to its personality. <strong>Treat the model as replaceable from day one, or you'll discover it isn't on the worst possible day.</strong></p>
  </div>

  <h2><span class="ix">4</span> How to Think Here</h2>
  <div class="sub">Put a layer between your product and the vendor — and keep a fallback warm.</div>
  <div class="fig">
    <div class="fig-title">The abstraction layer — swap or fail over without touching the product</div>
    <svg viewBox="0 0 520 290" xmlns="http://www.w3.org/2000/svg" font-family="Hanken Grotesk, sans-serif">
      <rect x="20" y="116" width="124" height="54" rx="9" fill="#ffffff" stroke="#1d1d1f" stroke-width="1.3"/>
      <text x="82" y="139" text-anchor="middle" font-size="12" font-weight="700" fill="#1d1d1f">Your product</text>
      <text x="82" y="156" text-anchor="middle" font-size="9" fill="#86868b">calls ONE interface</text>
      <rect x="198" y="110" width="140" height="66" rx="9" fill="#0071e3" opacity="0.10" stroke="#0071e3" stroke-width="1.4"/>
      <text x="268" y="138" text-anchor="middle" font-size="12" font-weight="700" fill="#0058b0">Abstraction layer</text>
      <text x="268" y="155" text-anchor="middle" font-size="9" fill="#0058b0">gateway / router</text>
      <line x1="144" y1="143" x2="194" y2="143" stroke="#86868b" stroke-width="1.4" marker-end="url(#a63)"/>
      <rect x="398" y="34" width="106" height="38" rx="8" fill="#ffffff" stroke="#0a7d3c" stroke-width="1.4"/>
      <text x="451" y="58" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d1d1f">OpenAI</text>
      <rect x="398" y="92" width="106" height="38" rx="8" fill="#ffffff" stroke="#1d1d1f" stroke-width="1"/>
      <text x="451" y="116" text-anchor="middle" font-size="10.5" fill="#1d1d1f">Anthropic</text>
      <rect x="398" y="150" width="106" height="38" rx="8" fill="#ffffff" stroke="#1d1d1f" stroke-width="1"/>
      <text x="451" y="174" text-anchor="middle" font-size="10.5" fill="#1d1d1f">Google</text>
      <rect x="398" y="208" width="106" height="38" rx="8" fill="#ffffff" stroke="#1d1d1f" stroke-width="1"/>
      <text x="451" y="232" text-anchor="middle" font-size="10.5" fill="#1d1d1f">open / self-host</text>
      <line x1="338" y1="140" x2="398" y2="53" stroke="#0a7d3c" stroke-width="1.9"/>
      <line x1="338" y1="143" x2="398" y2="111" stroke="#86868b" stroke-width="1.2" stroke-dasharray="4 3"/>
      <line x1="338" y1="146" x2="398" y2="169" stroke="#86868b" stroke-width="1.2" stroke-dasharray="4 3"/>
      <line x1="338" y1="150" x2="398" y2="227" stroke="#86868b" stroke-width="1.2" stroke-dasharray="4 3"/>
      <defs><marker id="a63" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#86868b"/></marker></defs>
    </svg>
    <div class="fig-cap">Don't call a vendor's SDK directly. Put an abstraction layer between your product and the models so you can swap providers — or survive a deprecation, price hike, or outage — without touching the product itself. Green is the model you're on; the dashed lines are fallbacks kept warm.</div>
  </div>
  <p>De-risk the dependency with this sequence:</p>
  <ol>
    <li><strong>Inventory the dependency.</strong> Know exactly which model each feature relies on and what breaks if it vanishes.</li>
    <li><strong>Insert an abstraction.</strong> Call your own interface (or a gateway), never the vendor SDK directly, so the model is swappable.</li>
    <li><strong>Keep a fallback warm.</strong> Have a second provider tested and ready, not theoretical.</li>
    <li><strong>Eval-gate every model change.</strong> A vendor "upgrade" is a release — re-run your eval set before trusting it (Ch.5).</li>
    <li><strong>Own what the vendor can't.</strong> Your data, distribution, and workflow are the part no deprecation can take (Ch.4, Ch.6.1).</li>
  </ol>
  <div class="callout accent">
    <div class="ch">Say this in the interview</div>
    <p>"I treat the model as a vendor dependency. We call an abstraction layer, not the vendor SDK; we keep a fallback provider tested; and we eval-gate every model change — so a deprecation or price hike is a migration, not a crisis."</p>
  </div>

  <h2><span class="ix">5</span> Frameworks to Deploy</h2>
  <div class="sub">Three practices that keep a rented engine from owning you.</div>
  <h3>① The abstraction layer</h3>
  <p>Route model calls through a gateway or your own interface (the LiteLLM / OpenRouter / Portkey pattern) instead of hard-wiring a vendor SDK. This is what makes every other mitigation — fallback, routing, swapping — possible. Without it, "switch providers" is a rewrite; with it, it's a config change.</p>
  <h3>② Eval-gate every model change</h3>
  <p>Never let a model version change reach users untested — including the vendor's own "upgrades," which can silently regress your use case. Re-run your eval set (Ch.5) on any new version and pin the version you've validated. A behavior change you didn't test for is a regression you shipped.</p>
  <h3>③ Own what the vendor can't take</h3>
  <p>The ultimate de-risk is strategic, not technical: the more of your value lives in <em class="k">proprietary data, distribution, and workflow</em>, the less any single model decision can hurt you. The model becomes a swappable component; your moat stays yours (the through-line of this whole chapter).</p>

  <h2><span class="ix">6</span> Worked Solution</h2>
  <div class="sub">The deprecation panic — handled like an engineer, not a victim.</div>
  <div class="callout">
    <div class="ch">The prompt</div>
    <p style="font-family:var(--font-ui);font-weight:600;">"Our product calls one model's API directly. Your CEO just read it's being deprecated in three months and is panicking. What's your plan?"</p>
  </div>
  <p><strong>Step 1 — Calm it with a plan, not a promise.</strong> A three-month deprecation is a migration, not a death sentence — if we move now. The real problem isn't this deprecation; it's that we call the vendor directly, so we're exposed to every future one too.</p>
  <p><strong>Step 2 — Short term: migrate safely.</strong> Insert an abstraction layer, pick a replacement model, and — critically — <em>re-run our eval set on the replacement</em> before switching (Ch.5). Migrate behind the abstraction so the product code barely changes. The eval tells us if the new model regresses our use case before users feel it.</p>
  <div class="flow">
<span class="st">now</span>        <span class="nt">add abstraction layer · pick + eval a replacement · migrate behind it</span>
   <span class="ar">↓</span>
<span class="st">next</span>       <span class="nt">warm fallback provider · cost + quality monitoring · pin versions</span>
   <span class="ar">↓</span>
<span class="st">ongoing</span>    <span class="nt">invest in data + distribution so the model is swappable</span>
  </div>
  <p><strong>Step 3 — Medium term: never be here again.</strong> Stand up multi-provider routing with a tested fallback, monitor cost and quality, and eval-gate every future model change. Now a deprecation or a price hike is a routing decision, not a fire drill.</p>
  <p><strong>Step 4 — Long term: reduce the dependency's leverage.</strong> Pour roadmap into the durable layer (6.1) — our data and workflow — so that whichever model we run on, the reason customers stay is something no vendor can deprecate.</p>
  <div class="callout good">
    <div class="ch">Why this wins</div>
    <p>You turned a panic into a migration, fixed the root cause (direct vendor coupling) not just the symptom, protected quality with an eval gate, and reduced the dependency's long-term leverage. That's managing a critical dependency like a professional instead of being managed by it.</p>
  </div>

  <h2><span class="ix">7</span> Industry Case</h2>
  <div class="sub">Real deprecations, real price jumps — and the layer that absorbs them.</div>
  <h3>OpenAI's 2026 retirements — and why teams build a gateway</h3>
  <p>Model dependency stopped being theoretical in early 2026. OpenAI announced the retirement of a batch of models — including GPT-4o, GPT-4.1, and others — from ChatGPT, with a cutoff around <strong>mid-February 2026</strong> and only about a <strong>three-month notice</strong>; enterprises, who typically want 6–12 month horizons, felt the squeeze. The recommended API migration path (toward GPT-5.1-class models) also came with a <strong>materially higher input price</strong> (reported on the order of $5 to $15 per million input tokens for the relevant tiers) and more verbose outputs — i.e., a deprecation, a price change, and a behavior change arriving together. Every risk in this lesson's table, in one announcement.</p>
  <p>This is exactly why an entire layer of tooling exists. <strong>Gateways and routers like LiteLLM, OpenRouter, and Portkey</strong> sit between a product and the models, offering one interface to 100+ providers with built-in failover, routing, and cost tracking — explicitly to avoid vendor lock-in. The pattern is industry-standard practice now: call the gateway, keep providers swappable, fail over automatically. Two products you already know prove the point — <strong>Perplexity</strong> routes across multiple frontier models by task (resilience and cost, not loyalty, Ch.1), and <strong>Cursor</strong>'s 2025 pricing crunch (Ch.1) showed how directly a model's economics flow through to a product's survival.</p>
  <ul>
    <li><strong>Deprecation is real and fast.</strong> A ~3-month notice on a model you built on is a roadmap event; if you call the vendor directly, it's a scramble.</li>
    <li><strong>Price and behavior change together.</strong> The "upgrade" path cost more and behaved differently — exactly why you eval-gate and monitor cost, not just swap blindly.</li>
    <li><strong>The market's answer is abstraction.</strong> A whole category (gateways/routers) exists so a vendor's decision is a config change, not a crisis.</li>
  </ul>
  <div class="callout accent">
    <div class="ch">The PM takeaway</div>
    <p>The model is a vendor, and vendors change terms. Manage it like any critical dependency: abstract it, keep a fallback warm, eval-gate every change, and own the data and distribution no deprecation can touch. Do that and the next retirement notice is a Tuesday, not a five-alarm fire.</p>
  </div>

  <h2><span class="ix">✓</span> Check Yourself</h2>
  <div class="quiz" data-correct="3">
    <div class="q">Your product calls a single vendor's model SDK directly throughout the codebase. What's the core risk?</div>
    <div class="opt" data-i="0"><span class="l">A</span><span>None — fewer dependencies is simpler.</span></div>
    <div class="opt" data-i="1"><span class="l">B</span><span>The model might get too good.</span></div>
    <div class="opt" data-i="2"><span class="l">C</span><span>Your code will be too readable.</span></div>
    <div class="opt" data-i="3"><span class="l">D</span><span>Quirk lock-in — a deprecation, price hike, or behavior change forces a costly rewrite because switching providers means touching the whole product.</span></div>
    <div class="qexp">Calling a vendor SDK directly couples your product to one model's quirks, so any vendor decision (deprecation, price, behavior, outage) becomes a rewrite. An abstraction layer makes switching a config change — the foundation for every other mitigation.</div>
  </div>
  <div class="quiz" data-correct="1">
    <div class="q">A vendor pushes a new version of your model and calls it an "upgrade." Before routing users to it, what should you do?</div>
    <div class="opt" data-i="0"><span class="l">A</span><span>Switch immediately — newer is always better.</span></div>
    <div class="opt" data-i="1"><span class="l">B</span><span>Re-run your eval set on the new version first — an "upgrade" can silently regress your specific use case.</span></div>
    <div class="opt" data-i="2"><span class="l">C</span><span>Ignore it and stay on the old version forever.</span></div>
    <div class="opt" data-i="3"><span class="l">D</span><span>Ask users to test it in production.</span></div>
    <div class="qexp">A vendor upgrade is a model change, and model changes can regress your use case even while improving on average. Eval-gate it (Ch.5) before trusting it, and pin the version you validated. A behavior change you didn't test for is a regression you shipped.</div>
  </div>

  <h2><span class="ix">✎</span> Apply It Yourself</h2>
  <div class="sub">No worked answer this time — this one's your rep. Give it 10 minutes before you move on.</div>
  <div class="callout">
    <div class="ch">Your problem</div>
    <p style="font-family:var(--font-ui);font-weight:600;">"Your product calls one vendor's model API directly throughout the code. The CEO read that the model is being deprecated in three months and is panicking. Give the plan."</p>
  </div>
  <p><strong>Hints</strong> (peek only if you're stuck):</p>
  <ul>
    <li>The real problem isn't this deprecation — it's the direct coupling.</li>
    <li>Abstraction layer + a tested fallback + eval-gate the replacement.</li>
    <li>The trap: just swapping models without re-running evals.</li>
  </ul>
  <table>
    <tr><th>A strong answer...</th><th>A weak answer...</th></tr>
    <tr><td>Inserts an abstraction layer, picks + eval-tests a replacement, migrates behind it.</td><td>Hard-swaps the model and hopes.</td></tr>
    <tr><td>Adds multi-provider routing + cost/quality monitoring for next time.</td><td>Stays exposed to the next deprecation.</td></tr>
    <tr><td>Invests in the data / distribution moat the vendor can't take.</td><td>Treats the model as the moat.</td></tr>
  </table>
  <div class="callout accent">
    <div class="ch">Make it live</div>
    <p>Check a tool you depend on: if its underlying model vanished tomorrow, how fast could it switch — and how would you know quality held?</p>
  </div>

  <div class="callout good" style="margin-top:40px;">
    <div class="ch">Chapter 6 complete</div>
    <p>You can now plan on shifting ground: roadmap around the model improving under you (6.1), prioritize bets honestly by reliability and true cost (6.2), and manage the model as a vendor dependency you've de-risked (6.3). The through-line: don't fight the moving foundation — build above it and own what it can't take. Next, <strong>Chapter 7 — AI PRDs &amp; Documentation</strong>: writing the spec for a feature that's never 100%.</p>
  </div>
  __NAV__
</div>

"7.1": `
<div class="wrap">
  <div class="les-kicker">Chapter 7 · Lesson 7.1</div>
  <h1 class="les-title">Writing a PRD for a Non-deterministic Feature</h1>
  <div class="les-meta">
    <span class="pill">AI documentation</span><span class="pill">~24 min read</span>
    <span class="pill">Prereq: Ch.1, Ch.5</span><span class="pill">Difficulty: core</span>
  </div>
  <p class="motto">A traditional PRD says "given this input, produce this output." Write that for an AI feature and you've specced a product that doesn't exist. The spec for something probabilistic is a spec for behavior, not output.</p>

  <p class="lead">The PRD is the PM's core artifact, and AI breaks it. You cannot write "the system shall return X for input Y" when the same input yields different outputs and quality is a distribution, not a guarantee. This lesson teaches you to write an AI PRD that an engineer can build and a QA can actually sign off on — one that specifies the <em class="k">quality bar, the failure behavior, and the acceptable error rate</em> instead of a fantasy of deterministic requirements.</p>

  <h2><span class="ix">1</span> Your Mandate</h2>
  <div class="sub">What you own when "the requirements" can't be a list of exact outputs.</div>
  <p>Your mandate is to <strong>turn a fuzzy, probabilistic feature into a spec people can build to and verify against</strong> — by specifying behavior, a measurable quality bar, and what happens when the model is wrong. You don't write the eval harness or the model logic. You own the document that answers the three questions a deterministic PRD never had to: <em class="k">How good is good enough? What does it do when it's wrong? When does a human step in?</em> Skip those and engineering fills the gaps with guesses, and QA has nothing to sign.</p>

  <h2><span class="ix">2</span> Your Responsibilities</h2>
  <div class="sub">How each section of a PRD changes when the feature is probabilistic.</div>
  <table>
    <tr><th>Traditional PRD</th><th>AI PRD replacement</th></tr>
    <tr><td><strong>Functional requirements</strong> (input → exact output)</td><td>Behavior spec — what it should do, in what priority, and what it must never do</td></tr>
    <tr><td><strong>Acceptance test</strong> (pass / fail)</td><td>Quality bar — an eval set with a threshold (a rate, not a binary)</td></tr>
    <tr><td><strong>Edge cases</strong></td><td>Failure behavior — what happens when wrong, uncertain, or out of scope</td></tr>
    <tr><td><strong>—</strong></td><td>Cost ceiling and latency budget per task (Ch.1)</td></tr>
    <tr><td><strong>—</strong></td><td>Human-in-the-loop checkpoints (Ch.2) + model dependency (Ch.6.3)</td></tr>
  </table>
  <p>The shift in one line: a deterministic PRD specifies <em>outputs</em>; an AI PRD specifies <em>behavior, a bar, and failure</em>. The three bottom rows are pure additions — sections a SaaS PRD never needed and an AI PRD is incomplete without.</p>

  <h2><span class="ix">3</span> Metrics That Matter Here</h2>
  <div class="sub">A good AI PRD is one whose every claim is measurable.</div>
  <table>
    <tr><th>The PRD must make measurable</th><th>Looks like</th><th>Why it belongs in the spec</th></tr>
    <tr><td><strong>Quality bar</strong></td><td>"≥90% correct on a 200-case eval set"</td><td>Turns "good" into something QA can verify</td></tr>
    <tr><td><strong>Acceptable error rate</strong></td><td>"Hallucination under 2%, measured weekly"</td><td>Names the error you'll tolerate, on purpose</td></tr>
    <tr><td><strong>Cost ceiling</strong></td><td>"Under $0.04 per task at scale"</td><td>Keeps unit economics in the spec, not a surprise</td></tr>
    <tr><td><strong>Latency budget</strong></td><td>"p95 under 3s"</td><td>The tail users feel (Ch.1), committed up front</td></tr>
    <tr><td><strong>Failure coverage</strong></td><td>Defined behavior for wrong / uncertain / out-of-scope</td><td>The difference between a trusted product and a liability</td></tr>
  </table>
  <div class="callout warn">
    <div class="ch">The trap — deterministic acceptance criteria</div>
    <p>The classic failure is writing "the AI shall correctly answer all user questions." That is <strong>untestable and impossible</strong> — no probabilistic system clears 100%, and "correctly" was never defined. Engineering can't build to it and QA can't sign it, so the feature ships on vibes. <strong>An acceptance criterion with no number and no failure behavior is not a spec — it's a wish.</strong></p>
  </div>

  <h2><span class="ix">4</span> How to Think Here</h2>
  <div class="sub">The mental shift: from hitting a target to clearing a bar on a distribution.</div>
  <div class="fig">
    <div class="fig-title">Deterministic spec vs probabilistic spec</div>
    <svg viewBox="0 0 520 280" xmlns="http://www.w3.org/2000/svg" font-family="Hanken Grotesk, sans-serif">
      <line x1="262" y1="44" x2="262" y2="250" stroke="#dddddd" stroke-width="1"/>
      <text x="135" y="44" text-anchor="middle" font-size="12" font-weight="700" fill="#1d1d1f">DETERMINISTIC</text>
      <circle cx="135" cy="142" r="46" fill="none" stroke="#86868b" stroke-width="1.2"/>
      <circle cx="135" cy="142" r="30" fill="none" stroke="#86868b" stroke-width="1.2"/>
      <circle cx="135" cy="142" r="14" fill="none" stroke="#86868b" stroke-width="1.2"/>
      <circle cx="135" cy="142" r="6" fill="#0071e3"/>
      <path d="M66,92 L126,136" fill="none" stroke="#0071e3" stroke-width="1.8" marker-end="url(#d71)"/>
      <text x="135" y="214" text-anchor="middle" font-size="9.5" fill="#86868b">input → one exact output</text>
      <text x="135" y="231" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d1d1f">pass / fail</text>
      <text x="390" y="44" text-anchor="middle" font-size="12" font-weight="700" fill="#1d1d1f">PROBABILISTIC</text>
      <line x1="300" y1="198" x2="490" y2="198" stroke="#86868b" stroke-width="1"/>
      <path d="M300,198 C342,198 362,100 392,98 C424,96 446,198 490,198 Z" fill="#0071e3" opacity="0.12" stroke="#0071e3" stroke-width="1.8"/>
      <line x1="346" y1="92" x2="346" y2="206" stroke="#b25000" stroke-width="1.4" stroke-dasharray="4 3"/>
      <text x="346" y="84" text-anchor="middle" font-size="9" font-weight="700" fill="#b25000">the bar</text>
      <text x="318" y="216" text-anchor="middle" font-size="8.5" fill="#b25000">below</text>
      <text x="432" y="216" text-anchor="middle" font-size="8.5" fill="#0a7d3c">acceptable →</text>
      <text x="390" y="233" text-anchor="middle" font-size="9.5" fill="#86868b">a quality bar on a distribution</text>
      <defs><marker id="d71" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#0071e3"/></marker></defs>
    </svg>
    <div class="fig-cap">A deterministic spec aims at one exact output and grades pass/fail. A probabilistic spec sets a bar on a distribution of outputs and commits to the share that must clear it. Write the second kind, or your PRD is unbuildable.</div>
  </div>
  <p>When you sit down to spec an AI feature, run this sequence:</p>

    <li><strong>Spec behavior, not output.</strong> What should it do, in what order of priority, and what must it never do? (This is the Model Spec shape — block 7.)</li>

    <li><strong>Define the failure behavior.</strong> What happens when it's wrong, unsure, or out of scope — the trust feature.</li>
    <li><strong>Add the ceilings.</strong> Cost-per-task and p95 latency, committed in the spec.</li>
    <li><strong>Mark the human checkpoints</strong> and the model dependency you're building on.</li>
  </ol>
  <div class="callout accent">
    <div class="ch">Say this in the interview</div>
    <p>"For an AI feature I don't write deterministic requirements — I spec the behavior, a quality bar as an eval threshold, the failure behavior when it's wrong or unsure, and the cost and latency ceilings. That's a PRD engineering can build and QA can actually sign."</p>

  <p>Every AI PRD adds five sections a SaaS PRD lacks: <strong>quality bar (eval + threshold), acceptable error rate, failure behavior, cost/latency ceiling, and human-in-the-loop + model dependency.</strong> Use it as a checklist — if any is missing, the spec isn't done.</p>
  <h3>③ Distributional acceptance</h3>
  <p>Write acceptance as a measured rate on a real set: "≥90% correct-with-citation on 200 labeled questions; hallucination under 2%." Quantified, testable, and honest that the number isn't 100. This single habit is what turns "does it work?" into "how well, and is that good enough?"</p>

<span class="st">ERROR BUDGET</span> <span class="nt">hallucination under 2%, measured weekly on live traffic (Ch.5)</span>
<span class="st">ON FAILURE</span>   <span class="nt">below a confidence threshold → "I couldn't find this in our docs" + human handoff</span>
  </div>

    <div class="ch">Why this wins</div>

  </div>

    <li><strong>Objectives</strong> — broad goals like "assist the developer and end user" and "benefit humanity." The intent, not an output.</li>
    <li><strong>Rules</strong> — hard constraints of the form "never do X" or "if X then Y." The non-negotiables.</li>

    <div class="ch">The PM takeaway</div>

    <p style="font-family:var(--font-ui);font-weight:600;">"An eng team says your new AI agent 'works' and wants to ship Friday. Define 'done' so that's a real decision, not a vibe."</p>
  </div>
  <p><strong>Hints</strong> (peek only if you're stuck):</p>
  <ul>
    <li>The eval set IS the acceptance criteria — build it from real cases.</li>
    <li>Success is multidimensional: pick a threshold per dimension.</li>
    <li>The trap: a green synthetic eval that doesn't match production.</li>
  </ul>
  <table>
    <tr><th>A strong answer...</th><th>A weak answer...</th></tr>
    <tr><td>Pulls ~30 real tasks, grades per dimension (state check / rubric / transcript), sets thresholds.</td><td>Ships on 'it works.'</td></tr>
    <tr><td>Defines done as every dimension clearing its bar.</td><td>Averages dimensions, hiding a failure.</td></tr>
    <tr><td>Builds the set from real failures, not synthetic happy paths.</td><td>Tests only easy cases.</td></tr>
  </table>
  <div class="callout accent">
    <div class="ch">Make it live</div>
    <p>For an AI feature you'd ship, write its 'definition of done' as 3 measurable dimensions, each with a threshold. Is it shippable yet?</p>
  </div>

  <div class="callout good" style="margin-top:40px;">
    <div class="ch">Chapter 7 complete</div>
    <p>You can now write the spec for a feature that's never 100%: a PRD that specs behavior, a quality bar, and failure handling (7.1), and an eval set whose multidimensional thresholds <em>are</em> the definition of done (7.2). The through-line: you don't list deterministic requirements — you set a measurable bar and the behavior around it. Next, <strong>Chapter 8 — Cross-functional Communication</strong>: earning ML engineers' trust by asking the right question, not faking the answer.</p>
  </div>
  __NAV__
</div>
`,

"8.1": `
<div class="wrap">
  <div class="les-kicker">Chapter 8 · Lesson 8.1</div>
  <h1 class="les-title">Talking to ML Engineers Without Faking It</h1>
  <div class="les-meta">
    <span class="pill">Cross-functional</span><span class="pill">~22 min read</span>
    <span class="pill">Prereq: Ch.1–3</span><span class="pill">Difficulty: core</span>
  </div>
  <p class="motto">The fastest way to lose an ML engineer's respect is to walk in with the answer. The fastest way to earn it is to walk in with the one question nobody had asked yet.</p>

  <p class="lead">You will often be the least technical person in the room — surrounded by engineers and researchers who can out-math you on any axis. Trying to bluff your way to credibility is the single most common way AI PMs lose it. This lesson flips the move: your currency isn't faked expertise, it's <em class="k">the right question</em> and a clear grip on the problem. By the end you'll know which questions earn an engineer's trust, which moves burn it, and how to hold a hard technical disagreement without faking or folding.</p>

  <h2><span class="ix">1</span> Your Mandate</h2>
  <div class="sub">What you own in a room full of people who know the tech better than you.</div>
  <p>Your mandate is to <strong>own the problem, the quality bar, and the tradeoff — never the implementation</strong>. You don't need to out-engineer the engineers; you need to out-<em>frame</em> them: bring the sharpest question, the clearest definition of "good enough," and the business call on which tradeoff to accept. Credibility in a technical room is not earned by knowing the answer — it's earned by <em class="k">asking the question that makes the answer obvious</em>, and by being honest about what you don't know.</p>

  <h2><span class="ix">2</span> Your Responsibilities</h2>
  <div class="sub">The moves that build trust — and the ones that quietly destroy it.</div>
  <table>
    <tr><th>Earns respect</th><th>Loses respect</th></tr>
    <tr><td><strong>Asking the right question</strong> — "is the bottleneck retrieval or generation?" (Ch.1)</td><td><strong>Prescribing the stack</strong> — "let's just use Pinecone and fine-tune"</td></tr>
    <tr><td><strong>Bringing the bar</strong> — "we need ≥90% with a citation; below that, fall back"</td><td><strong>Vague asks</strong> — "make it more accurate"</td></tr>
    <tr><td><strong>Owning the tradeoff</strong> — "we'll eat latency to protect quality here"</td><td><strong>Bluffing</strong> — name-dropping papers you didn't read</td></tr>
    <tr><td><strong>"What's one thing that would make your job easier?"</strong></td><td><strong>Assuming everything needs AI</strong> when a rule would do</td></tr>
  </table>
  <p>The pattern is the one from Chapter 1, applied to people: <strong>you own the what and the why; they own the how.</strong> Drift into prescribing the how and you're both overstepping and exposing how little you actually know about it. Stay in your lane and ask sharp questions across the line, and engineers will pull you <em>into</em> the hard decisions instead of routing around you.</p>

  <h2><span class="ix">3</span> Metrics That Matter Here</h2>
  <div class="sub">You can't put a number on trust, but you can read its signals.</div>
  <table>
    <tr><th>Signal</th><th>Reads as</th><th>Why it matters</th></tr>
    <tr><td><strong>Engineers bring you problems early</strong></td><td>They trust your judgment under uncertainty</td><td>Early problems are cheap; late ones are expensive</td></tr>
    <tr><td><strong>Tradeoff decisions move fast</strong></td><td>A shared frame, not posturing</td><td>Velocity comes from trust, not authority</td></tr>
    <tr><td><strong>Low spec rework</strong></td><td>You asked the right questions up front</td><td>Vague specs get rebuilt; clear ones ship</td></tr>
    <tr><td><strong>You're invited into technical debates</strong></td><td>They want your framing in the room</td><td>The ultimate credibility signal</td></tr>
  </table>
  <div class="callout warn">
    <div class="ch">The trap — mistaking jargon for credibility</div>
    <p>The instinct, when outgunned technically, is to <strong>sound</strong> technical — drop model names, cite a paper, talk about "the embedding space." Engineers detect a bluff instantly, and the moment they do, everything you say gets discounted. <strong>"I don't know — walk me through it" buys you more credibility than any term you half-understand.</strong> Curiosity reads as strength; fakery reads as weakness.</p>
  </div>

  <h2><span class="ix">4</span> How to Think Here</h2>
  <div class="sub">Know exactly where your lane ends and theirs begins — then talk across the line.</div>
  <div class="fig">
    <div class="fig-title">Stay in your lane — ask across it, don't cross it</div>
    <svg viewBox="0 0 520 250" xmlns="http://www.w3.org/2000/svg" font-family="Hanken Grotesk, sans-serif">
      <rect x="28" y="56" width="184" height="150" rx="12" fill="#0071e3" opacity="0.08" stroke="#0071e3" stroke-width="1.3"/>
      <text x="120" y="84" text-anchor="middle" font-size="13" font-weight="700" fill="#0058b0">YOU OWN</text>
      <text x="120" y="102" text-anchor="middle" font-size="10" fill="#0058b0">the question</text>
      <text x="52" y="132" font-size="11" fill="#1d1d1f">· the problem</text>
      <text x="52" y="153" font-size="11" fill="#1d1d1f">· the quality bar</text>
      <text x="52" y="174" font-size="11" fill="#1d1d1f">· the tradeoff to make</text>
      <text x="52" y="195" font-size="11" fill="#1d1d1f">· the priority</text>
      <rect x="308" y="56" width="184" height="150" rx="12" fill="#ffffff" stroke="#1d1d1f" stroke-width="1.3"/>
      <text x="400" y="84" text-anchor="middle" font-size="13" font-weight="700" fill="#1d1d1f">THEY OWN</text>
      <text x="400" y="102" text-anchor="middle" font-size="10" fill="#86868b">the answer</text>
      <text x="332" y="142" font-size="11" fill="#1d1d1f">· the model</text>
      <text x="332" y="163" font-size="11" fill="#1d1d1f">· the stack</text>
      <text x="332" y="184" font-size="11" fill="#1d1d1f">· the implementation</text>
      <line x1="214" y1="138" x2="306" y2="138" stroke="#0a7d3c" stroke-width="1.7" marker-start="url(#c81s)" marker-end="url(#c81e)"/>
      <text x="260" y="128" text-anchor="middle" font-size="9.5" font-weight="700" fill="#0a7d3c">the right question</text>
      <defs>
        <marker id="c81e" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#0a7d3c"/></marker>
        <marker id="c81s" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto"><path d="M6,0 L0,3 L6,6 Z" fill="#0a7d3c"/></marker>
      </defs>
    </svg>
    <div class="fig-cap">You own the question; the engineer owns the answer. Credibility is asking sharp questions across the line. Cross it — by prescribing the stack or faking expertise — and you lose them.</div>
  </div>
  <p>In any technical conversation, run this loop:</p>
  <ol>
    <li><strong>Bring the problem and the bar, not the solution.</strong> "Users need answers they can trust to ≥90%," not "use a reranker."</li>
    <li><strong>Ask about the bottleneck.</strong> The Ch.1–3 questions: recall, eval score, latency tail, where it breaks. These signal you understand the system without claiming to build it.</li>
    <li><strong>Never prescribe the stack.</strong> The tools are their call. Prescribing them is overstepping <em>and</em> exposing your shallow end.</li>
    <li><strong>Don't bluff.</strong> "I don't know that — explain it to me" beats a confident wrong term every time.</li>
    <li><strong>In a disagreement, find the shared frame</strong> — the differently-shaped problem underneath (block 7).</li>
  </ol>
  <div class="callout accent">
    <div class="ch">Say this to an engineer</div>
    <p>"I'm not going to tell you which model or database to use — that's your call. What I need to lock is the quality bar and the failure behavior. So: where does this break first, and what would it take to get retrieval recall where we need it?"</p>
  </div>

  <h2><span class="ix">5</span> Frameworks to Deploy</h2>
  <div class="sub">Three habits that make you the PM engineers actually want in the room.</div>
  <h3>① The right-question toolkit</h3>
  <p>Keep the Ch.1–3 questions loaded: <em class="k">"Is the bottleneck retrieval or the model?" "What's our recall@k / eval score?" "What's the p95, not the average?" "Is this a feature the next model gives us free?"</em> You're not claiming the answers — you're proving you understand the shape of the system, which is exactly what earns a technical room's trust.</p>
  <h3>② Bring the problem, not the prescription</h3>
  <p>Show up with a crisp problem, a measurable bar, and the tradeoff you're willing to make — and leave the <em>how</em> open. Engineers respect a PM who hands them a well-framed problem and trusts them to solve it; they resent one who hands them a half-baked solution and calls it a requirement.</p>
  <h3>③ Disagree on the frame, not the person</h3>
  <p>When you and an engineer clash, don't argue tech you don't own and don't pull rank. Ask what problem each of you is actually optimizing for. Most "disagreements" dissolve once you find that the two sides are solving differently-shaped problems — the move you'll see two world-class teams make in the case below.</p>

  <h2><span class="ix">6</span> Worked Solution</h2>
  <div class="sub">The "it's not feasible" standoff — handled without faking or steamrolling.</div>
  <div class="callout">
    <div class="ch">The prompt</div>
    <p style="font-family:var(--font-ui);font-weight:600;">"An ML engineer pushes back hard on your feature: 'this isn't technically feasible.' You suspect it's more 'hard' than 'impossible.' How do you run the conversation without faking expertise or steamrolling?"</p>
  </div>
  <p><strong>Step 1 — Don't argue the tech; interrogate the claim.</strong> I won't pretend to know the architecture better than they do, and I won't overrule them. I'll ask precise questions that separate a real wall from an expensive hill.</p>
  <div class="flow">
<span class="st">DON'T</span>        <span class="nt">argue tech you don't own · fake certainty · pull rank</span>
   <span class="ar">↓ instead</span>
<span class="st">ASK</span>          <span class="nt">"what exactly is the blocker — retrieval, latency, or data?"</span>
<span class="st">SEPARATE</span>     <span class="nt">"is it impossible, or expensive and slow?" — very different answers</span>
<span class="st">BRING THE BAR</span> <span class="nt">"does it need 95%, or is 85% with a fallback acceptable?"</span>
<span class="st">CLOSE</span>        <span class="nt">"what's one thing that would make this feasible?"</span>
  </div>
  <p><strong>Step 2 — Separate impossible from costly.</strong> Nine times in ten, "not feasible" means "not feasible at the quality/latency/cost I assume you want." Surfacing that turns a dead end into a tradeoff conversation — which is my lane.</p>
  <p><strong>Step 3 — Move the bar, not the engineer.</strong> If the blocker is hitting 95% accuracy, I own that number — maybe 85% plus a human-in-the-loop fallback (Ch.2) is fine for v1. I'm not changing their architecture; I'm changing the requirement, which is mine to change.</p>
  <p><strong>Step 4 — Close on their terms.</strong> "What's one thing that would make this feasible?" hands them the solution space and signals I'm here to unblock, not to win. Often they'll propose the scoped-down version themselves.</p>
  <div class="callout good">
    <div class="ch">Why this wins</div>
    <p>You never faked knowledge or pulled rank. You used sharp questions to convert "impossible" into a tradeoff, moved the one thing you own (the bar), and let the engineer own the solution. That's how a PM disagrees productively — and gets invited to the next hard decision instead of worked around.</p>
  </div>

  <h2><span class="ix">7</span> Industry Case</h2>
  <div class="sub">Two elite teams disagreeing in public — and the senior move neither faked.</div>
  <h3>Cognition vs Anthropic — how to hold a technical disagreement well</h3>
  <p>In mid-June 2025, within about a day of each other, two of the best agent teams alive published seemingly opposite advice. Cognition (makers of the Devin coding agent) wrote <em>"Don't Build Multi-Agents,"</em> arguing parallel sub-agents are fragile because of context isolation. The next day Anthropic published <em>"How we built our multi-agent research system,"</em> reporting a large performance gain from exactly that architecture. The internet read it as a fight and rushed to pick a winner.</p>
  <p>The senior move — the one this lesson is about — was what the thoughtful readers did instead: they didn't pick a side or fake certainty about whose benchmarks were "right." They asked the framing question: <strong>what problem is each team actually solving?</strong> Cognition builds a <em>coding</em> agent (a coherence task, where context isolation is poison); Anthropic built a <em>research</em> agent (a breadth task, where parallel contexts are the unlock). Both were correct — for differently-shaped problems (Ch.2.2). The disagreement dissolved the moment you found the shared frame.</p>
  <ul>
    <li><strong>Picking a side was the junior move.</strong> The credible response wasn't "Anthropic is right" — it was "right for what kind of task?"</li>
    <li><strong>Nobody faked the tech.</strong> You didn't need to out-engineer either team; you needed the question that revealed they weren't actually in conflict.</li>
    <li><strong>This is exactly the PM's job in an eng disagreement.</strong> Find the differently-shaped problem under the clash, and you resolve it without bluffing or steamrolling.</li>
  </ul>
  <div class="callout accent">
    <div class="ch">The PM takeaway</div>
    <p>Credibility with engineers comes from asking the right question, not pretending to know the answer. When even two frontier teams "disagree," the move that earns respect is to find the frame that makes both right — not to fake a verdict. Be the person who asks that question, and you become the person they want in the room.</p>
  </div>

  <h2><span class="ix">✓</span> Check Yourself</h2>
  <div class="quiz" data-correct="2">
    <div class="q">You're in a design review and don't understand a retrieval technique the engineer just described. Best move?</div>
    <div class="opt" data-i="0"><span class="l">A</span><span>Nod along and look it up later so you don't seem uninformed.</span></div>
    <div class="opt" data-i="1"><span class="l">B</span><span>Suggest a specific vector database to sound technical.</span></div>
    <div class="opt" data-i="2"><span class="l">C</span><span>Say "I don't know that one — walk me through it," then ask how it affects recall and latency.</span></div>
    <div class="opt" data-i="3"><span class="l">D</span><span>Change the subject to the timeline.</span></div>
    <div class="qexp">Honest curiosity earns credibility; bluffing destroys it the instant it's detected. Asking to be walked through it — then connecting it to a metric you do own (recall, latency) — shows you understand the system's shape without faking expertise.</div>
  </div>
  <div class="quiz" data-correct="0">
    <div class="q">An engineer says your feature is "not technically feasible." What's the most productive first response?</div>
    <div class="opt" data-i="0"><span class="l">A</span><span>"What exactly is the blocker — and is it impossible, or expensive and slow?"</span></div>
    <div class="opt" data-i="1"><span class="l">B</span><span>"I think it's feasible, let's just try harder."</span></div>
    <div class="opt" data-i="2"><span class="l">C</span><span>"Fine, we'll cut it from the roadmap."</span></div>
    <div class="opt" data-i="3"><span class="l">D</span><span>"Let me tell you how to architect it."</span></div>
    <div class="qexp">"Not feasible" usually means "not feasible at the quality, latency, or cost I assume you want." A precise question separates a true wall from a tradeoff — and the tradeoff (e.g., moving the quality bar) is exactly what you own. B steamrolls, C surrenders, D oversteps into their lane.</div>
  </div>

  <h2><span class="ix">✎</span> Apply It Yourself</h2>
  <div class="sub">No worked answer this time — this one's your rep. Give it 10 minutes before you move on.</div>
  <div class="callout">
    <div class="ch">Your problem</div>
    <p style="font-family:var(--font-ui);font-weight:600;">"In a design review, an ML engineer says your feature 'isn't technically feasible.' You suspect it's more 'hard' than 'impossible.' Script your next three sentences — without faking expertise or pulling rank."</p>
  </div>
  <p><strong>Hints</strong> (peek only if you're stuck):</p>
  <ul>
    <li>Don't argue the tech you don't own; ask a sharp diagnostic question.</li>
    <li>Separate 'impossible' from 'expensive/slow'; bring the quality bar you DO own.</li>
    <li>The trap: prescribing the architecture, or steamrolling with authority.</li>
  </ul>
  <table>
    <tr><th>A strong answer...</th><th>A weak answer...</th></tr>
    <tr><td>Asks what exactly blocks it; separates impossible from costly; offers to move the bar.</td><td>Argues the tech or pulls rank.</td></tr>
    <tr><td>Owns the requirement (e.g. 85% + fallback instead of 95%).</td><td>Insists 'just make it work.'</td></tr>
    <tr><td>Closes with 'what's one thing that would make this feasible?'</td><td>Cuts it or overrides the engineer.</td></tr>
  </table>
  <div class="callout accent">
    <div class="ch">Make it live</div>
    <p>Next time you don't understand something technical, try 'I don't know that — walk me through it.' Watch whether it builds or costs credibility.</p>
  </div>

  <div class="callout good" style="margin-top:40px;">
    <div class="ch">Chapter 8 complete</div>
    <p>You can now earn credibility in a room of people more technical than you — by owning the problem, the bar, and the tradeoff, asking the Ch.1–3 questions that prove you understand the system, never faking or prescribing, and resolving disagreements by finding the shared frame. Next, <strong>Chapter 9 — Prototyping &amp; Vibe Coding</strong>: how a PM ships a working demo in a day and wins arguments slides never could.</p>
  </div>
  __NAV__
</div>
`,

"9.1": `
<div class="wrap">
  <div class="les-kicker">Chapter 9 · Lesson 9.1</div>
  <h1 class="les-title">The 2026 Prototyping Toolkit</h1>
  <div class="les-meta">
    <span class="pill">Prototyping</span><span class="pill">~24 min read</span>
    <span class="pill">Prereq: Ch.4</span><span class="pill">Difficulty: core</span>
  </div>
  <p class="motto">In 2026, "I'll mock it up" became "I'll build it." The PM who shows a working thing on Monday beats the one who shows a slide about it — every time.</p>

  <p class="lead">For the first time, a PM with no engineering background can turn an idea into a clickable, working app in an afternoon. A wave of tools — <em class="k">v0, Lovable, Cursor, Claude</em> — made "vibe coding" real, and it changed what a PM is expected to bring to a room. This lesson maps the toolkit: what each tool actually builds, which to reach for, and why a working demo settles debates that slides only prolong.</p>

  <h2><span class="ix">1</span> Your Mandate</h2>
  <div class="sub">What you own now that building a prototype no longer requires an engineer.</div>
  <p>Your mandate is to <strong>turn an idea into a working artifact, and to pick the right tool to do it fast</strong>. You don't need to become an engineer — you need to know the one fork that matters (an app builder that writes the code for you vs a code editor that assists someone who codes) and reach for the tool that gets you to a clickable thing soonest. The shift is real: in 2026, "show me" is answered with a link, not a deck, and the PM who can produce that link has leverage the others don't.</p>

  <h2><span class="ix">2</span> Your Responsibilities</h2>
  <div class="sub">The four tools, and the one fork that tells you which to grab.</div>
  <table>
    <tr><th>Tool</th><th>What it builds</th><th>Reach for it when</th></tr>
    <tr><td><strong>Lovable</strong></td><td>A full app from a chat — UI, backend, database, no code</td><td>You're non-technical and want a working app, not a mockup</td></tr>
    <tr><td><strong>v0 (Vercel)</strong></td><td>Polished frontend UI (React / Next.js components)</td><td>You need a beautiful interface; backend is someone else's job</td></tr>
    <tr><td><strong>Cursor</strong></td><td>An AI code editor for real, repo-aware code changes</td><td>You've hit the ceiling of no-code and need to go deeper (some coding)</td></tr>
    <tr><td><strong>Claude / Claude Code</strong></td><td>Reasoning, quick artifacts, and terminal-based refactors</td><td>You want to think through logic, generate an artifact, or refactor</td></tr>
  </table>
  <p>The fork that organizes all of it: <strong>app builders</strong> (Lovable, v0, Bolt, Replit) write the whole thing from your description — no coding required — while <strong>code editors</strong> (Cursor, Claude Code, Copilot) assist someone who is editing real code. As a PM, you start in the first category and only cross into the second when you genuinely outgrow it.</p>

  <h2><span class="ix">3</span> Metrics That Matter Here</h2>
  <div class="sub">How to judge whether you picked the right tool for the job.</div>
  <table>
    <tr><th>Question</th><th>Reads as</th><th>Why it decides the tool</th></tr>
    <tr><td><strong>Time-to-clickable</strong></td><td>How fast you get something you can click</td><td>A prototype's whole value is being seen, soon</td></tr>
    <tr><td><strong>Who's building</strong></td><td>You alone, or with an engineer?</td><td>Non-technical → app builder; with eng → code editor</td></tr>
    <tr><td><strong>Does it need a backend?</strong></td><td>Just UI, or data + logic + auth?</td><td>UI-only → v0; full app → Lovable</td></tr>
    <tr><td><strong>Throwaway or foundation?</strong></td><td>Demo to discard, or code to extend?</td><td>Decides whether you need exportable code (Lovable → GitHub)</td></tr>
  </table>
  <div class="callout warn">
    <div class="ch">The trap — reaching above your level</div>
    <p>The classic mistake is grabbing the most <em>powerful</em> tool instead of the most <em>fitting</em> one. A PM who opens Cursor to make a clickable demo will burn the day fighting a code editor built for engineers, when Lovable would have shipped the same thing in an hour. <strong>Match the tool to the artifact and the builder — start at the no-code end and escalate only when you must.</strong></p>
  </div>

  <h2><span class="ix">4</span> How to Think Here</h2>
  <div class="sub">The toolkit splits cleanly in two — and you live mostly on one side.</div>
  <div class="fig">
    <div class="fig-title">The 2026 prototyping toolkit — two lanes</div>
    <svg viewBox="0 0 520 260" xmlns="http://www.w3.org/2000/svg" font-family="Hanken Grotesk, sans-serif">
      <text x="260" y="40" text-anchor="middle" font-size="10" font-weight="700" fill="#0058b0">PMs start here ↓</text>
      <rect x="40" y="50" width="440" height="80" rx="12" fill="#0a7d3c" opacity="0.07" stroke="#0a7d3c" stroke-width="1.2"/>
      <text x="260" y="70" text-anchor="middle" font-size="10.5" font-weight="700" fill="#0a7d3c">APP BUILDERS — no code, build in the browser</text>
      <rect x="60" y="84" width="190" height="36" rx="8" fill="#ffffff" stroke="#1d1d1f" stroke-width="1"/>
      <text x="155" y="100" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1d1d1f">Lovable</text>

    <div class="opt" data-i="3"><span class="l">D</span><span>The styling and deployment.</span></div>
    <div class="qexp">Product judgment — the problem, the flow, the proof, the data, the failure to show — stays yours. UI, code, styling, and deployment are exactly what you delegate. Vibe coding removed the coding bottleneck, not the deciding.</div>
  </div>
  <h2><span class="ix">✎</span> Apply It Yourself</h2>
  <div class="sub">No worked answer this time — this one's your rep. Give it 10 minutes before you move on.</div>
  <div class="callout">
    <div class="ch">Your problem</div>
    <p style="font-family:var(--font-ui);font-weight:600;">"You have one day to prototype 'an AI that turns a customer-call transcript into a follow-up task list' for exec buy-in. Plan the build: what you decide vs delegate, and what the demo must prove."</p>
  </div>
  <p><strong>Hints</strong> (peek only if you're stuck):</p>
  <ul>
    <li>Decide the one flow, real seed data, and the failure to show; delegate UI / code.</li>
    <li>One convincing flow beats ten shallow screens.</li>
    <li>The trap: demoing everything, or faking the AI with hardcoded output.</li>
  </ul>
  <table>
    <tr><th>A strong answer...</th><th>A weak answer...</th></tr>
    <tr><td>Names the one thing to prove; seeds real data; wires a real model call; shows a failure.</td><td>Builds many screens with fake output.</td></tr>
    <tr><td>Delegates UI / code to the tool, keeps product judgment.</td><td>Art-directs the code, never finishes.</td></tr>
    <tr><td>Ships a link, honest that it's a prototype.</td><td>Claims it's nearly production.</td></tr>
  </table>
  <div class="callout accent">
    <div class="ch">Make it live</div>
    <p>Pick a workflow you know and build the single-flow prototype in Lovable or v0 today. Show one real user — what broke?</p>
  </div>
  __NAV__
</div>
`,

"9.3": `
<div class="wrap">
  <div class="les-kicker">Chapter 9 · Lesson 9.3</div>
  <h1 class="les-title">Prototype vs Production — Knowing the Line</h1>
  <div class="les-meta">
    <span class="pill">Prototyping</span><span class="pill">~24 min read</span>
    <span class="pill">Prereq: 9.2, Ch.1</span><span class="pill">Difficulty: core</span>
  </div>
  <p class="motto">A vibe-coded demo is a beautiful lie: it shows the product working and hides everything about whether it actually can. Know the line, or you'll promise production from a prototype — and own the wreck.</p>

  <p class="lead">The same speed that makes prototyping a superpower (9.1–9.2) makes it dangerous: a demo looks so finished that everyone — execs, customers, even you — forgets it isn't a product. This lesson draws the line. A prototype proves <em class="k">desirability</em>; production demands the Chapter 1 realities — <em class="k">scale, cost, security, reliability</em> — that a demo quietly hides. Knowing exactly what your demo did and didn't prove is what keeps you from promising something you can't ship.</p>

  <h2><span class="ix">1</span> Your Mandate</h2>
  <div class="sub">What you own once the prototype gets applause.</div>
  <p>Your mandate is to <strong>hold the line between "it demos" and "it ships"</strong> — and to make sure no one mistakes one for the other. A prototype answers "is this desirable and usable?" It does <em>not</em> answer "will this work for 100,000 users, securely, reliably, at a cost we can afford?" You own setting that expectation honestly, even when the demo is so good everyone wants to believe the hard part is done. <em class="k">The applause is for the idea; the real work hasn't started.</em></p>

  <h2><span class="ix">2</span> Your Responsibilities</h2>
  <div class="sub">What a prototype proves — and the much larger set it hides.</div>
  <table>
    <tr><th>A prototype PROVES</th><th>A prototype HIDES</th></tr>
    <tr><td><strong>The idea is desirable</strong> — people want it</td><td>Whether it holds up at scale and under load (Ch.1.4)</td></tr>
    <tr><td><strong>The UX works</strong> — the flow makes sense</td><td>Cost-per-task at real volume (Ch.1, Ch.5)</td></tr>
    <tr><td><strong>It's buildable in principle</strong></td><td>Security — secrets, auth, data exposure</td></tr>
    <tr><td><strong>The core value lands</strong></td><td>Reliability and failure modes when things break</td></tr>
    <tr><td></td><td>Data integrity, edge cases, and maintenance</td></tr>
  </table>
  <p>The asymmetry is the whole lesson: the prototype proves the <em>small, visible</em> part (does anyone want this?) and hides the <em>large, invisible</em> part (can it actually run in the world?). Those hidden rows are not polish — they are the bulk of the engineering, and they are exactly the Chapter 1 topics you learned to reason about.</p>

  <h2><span class="ix">3</span> Metrics That Matter Here</h2>
  <div class="sub">The production-readiness questions a demo never had to answer.</div>
  <table>
    <tr><th>Production gap</th><th>The question a demo skipped</th><th>Why it's the real work</th></tr>
    <tr><td><strong>Scale / load</strong></td><td>What's p95 latency at 100k users?</td><td>Demos run once, for one user (Ch.1.4)</td></tr>
    <tr><td><strong>Cost at volume</strong></td><td>What's cost-per-task × all users?</td><td>A $0.05 demo can be a $60k/day product (Ch.1.4)</td></tr>
    <tr><td><strong>Security</strong></td><td>Are secrets, auth, and user data actually safe?</td><td>Vibe-coded apps leak at alarming rates</td></tr>
    <tr><td><strong>Reliability</strong></td><td>What happens when the model or a tool fails?</td><td>A demo never hits the failure path</td></tr>
  </table>
  <div class="callout warn">
    <div class="ch">The trap — "the demo works, so we're 90% done"</div>
    <p>The most expensive sentence after a great demo. The demo is maybe the first 10%; the hidden 90% — scale, cost, security, reliability, data integrity — is the hard, slow, expensive part, and it's invisible precisely because the prototype skipped it. <strong>A finished-looking demo is the most misleading artifact in software. Treat "it demos" as the start of the work, not the end.</strong></p>
  </div>

  <h2><span class="ix">4</span> How to Think Here</h2>
  <div class="sub">The prototype is the tip. Production is the iceberg under it.</div>
  <div class="fig">
    <div class="fig-title">The prototype is the tip; production is the iceberg</div>
    <svg viewBox="0 0 520 290" xmlns="http://www.w3.org/2000/svg" font-family="Hanken Grotesk, sans-serif">
      <rect x="30" y="112" width="460" height="160" fill="#0071e3" opacity="0.07"/>
      <line x1="30" y1="112" x2="490" y2="112" stroke="#0071e3" stroke-width="1.4"/>
      <text x="486" y="106" text-anchor="end" font-size="9" fill="#0058b0">waterline</text>
      <polygon points="168,56 130,112 206,112" fill="#ffffff" stroke="#1d1d1f" stroke-width="1.3"/>
      <polygon points="130,112 206,112 238,178 205,250 122,250 96,172" fill="#0071e3" opacity="0.16" stroke="#0071e3" stroke-width="1.1"/>
      <text x="167" y="190" text-anchor="middle" font-size="10" font-weight="700" fill="#0058b0">~90%</text>
      <text x="167" y="206" text-anchor="middle" font-size="8.5" fill="#0058b0">of the work</text>
      <text x="255" y="74" font-size="12" font-weight="700" fill="#1d1d1f">PROTOTYPE</text>
      <text x="255" y="90" font-size="9" fill="#86868b">the idea works — what everyone sees</text>
      <text x="255" y="140" font-size="10.5" font-weight="700" fill="#b25000">HIDDEN — the real work:</text>
      <text x="255" y="160" font-size="9.5" fill="#1d1d1f">· scale and load</text>
      <text x="255" y="178" font-size="9.5" fill="#1d1d1f">· cost per task at volume</text>
      <text x="255" y="196" font-size="9.5" fill="#1d1d1f">· security: secrets, auth</text>
      <text x="255" y="214" font-size="9.5" fill="#1d1d1f">· reliability and failure</text>
      <text x="255" y="232" font-size="9.5" fill="#1d1d1f">· data integrity, maintenance</text>
    </svg>
    <div class="fig-cap">Everyone sees the tip — the idea, working. The mass below the waterline (scale, cost, security, reliability, data) is the bulk of the real work, and the demo hid all of it. Estimate the iceberg, not the tip.</div>
  </div>
  <p>When a prototype lands, run this before anyone sets a date:</p>
  <ol>
    <li><strong>State what it proved</strong> — out loud: "this validates the idea and the UX." A real, big win.</li>
    <li><strong>State what it hid</strong> — the Chapter 1 realities: scale, cost-per-task, security, reliability, data.</li>
    <li><strong>Never quote a ship date from a demo.</strong> The demo is not evidence of how long production takes.</li>
    <li><strong>Estimate the iceberg.</strong> The real work is below the line — scope <em>that</em>, not the tip.</li>
    <li><strong>Set the expectation explicitly</strong> so applause doesn't become a promise.</li>
  </ol>
  <div class="callout accent">
    <div class="ch">Say this in the interview</div>
    <p>"A prototype proves desirability, not feasibility at scale. So after a great demo I'm explicit: we validated the idea — now production means scale, cost-per-task, a security review, and reliability, which is the bulk of the work the demo hid. I never quote a ship date off a prototype."</p>
  </div>

  <h2><span class="ix">5</span> Frameworks to Deploy</h2>
  <div class="sub">Three tools for holding the line.</div>
  <h3>① The iceberg</h3>
  <p>Hold the image in every demo meeting: the prototype is the visible tip, production is the submerged mass. When excitement peaks, your job is to point — calmly — at what's under the water. Not to kill the momentum, but to aim it at the real work.</p>
  <h3>② Desirability, not feasibility-at-scale</h3>
  <p>Name precisely what a prototype is evidence <em>of</em>: that people want it and the UX works. It is <em>not</em> evidence that it runs securely, reliably, and affordably at scale. Keeping those two claims separate is the single discipline that prevents over-promising.</p>
  <h3>③ The production checklist a demo skips</h3>
  <p>The Chapter 1 list, reused as a gate before "ship": scale and p95 under load, cost-per-task at volume, security (secrets, auth, data), reliability and failure behavior, data integrity. If the demo didn't test it — and it didn't — it's still ahead of you.</p>

  <h2><span class="ix">6</span> Worked Solution</h2>
  <div class="sub">"It demoed great — ship it to everyone next month."</div>
  <div class="callout">
    <div class="ch">The prompt</div>
    <p style="font-family:var(--font-ui);font-weight:600;">"Your Lovable prototype wowed leadership. The CEO says: 'Great — ship it to all customers next month.' What do you say?"</p>
  </div>
  <p><strong>Step 1 — Take the win, then draw the line.</strong> "The prototype proved the idea and the UX — that's a real milestone, and the enthusiasm is right. But what it proved is desirability, not that it's production-ready. Shipping to all customers is a different job, and here's the part the demo hid."</p>
  <p><strong>Step 2 — Name the iceberg, concretely.</strong> Scale and p95 under real load; cost-per-task across all customers (a cheap-looking demo can be a budget problem at volume, Ch.1.4); a <em>security review</em> — vibe-coded apps are notorious for exposed secrets, missing auth, and leaked user data; reliability and failure handling; and data integrity. None of that was tested by a one-user demo.</p>
  <p><strong>Step 3 — Convert the date into a plan.</strong> Replace "ship next month" with a real path: harden and security-review the code, add an eval gate and monitoring (Ch.5), then a gradual ramp (1% → 10% → 100%, Ch.1.4) rather than a big-bang launch to everyone.</p>
  <p><strong>Step 4 — Reframe, don't deflate.</strong> "We validated the idea fast and cheaply — that's exactly what a prototype is for. Now let's invest the real engineering to make it safe at scale, and ramp it carefully." The CEO keeps the excitement; you keep the company out of a wreck.</p>
  <div class="callout good">
    <div class="ch">Why this wins</div>
    <p>You honored the win without letting it become a reckless promise. You named the hidden 90% in concrete Chapter 1 terms, replaced a fantasy date with a real plan, and protected both the product and your credibility. Knowing the line is what separates a PM who ships demos from one who ships products.</p>
  </div>

  <h2><span class="ix">7</span> Industry Case</h2>
  <div class="sub">What happens when the line between demo and production gets erased.</div>
  <h3>Replit's deleted database and the vibe-coding security crisis</h3>
  <p>In July 2025, entrepreneur Jason Lemkin (founder of SaaStr) ran a public 12-day experiment building with Replit's AI agent. It went catastrophically wrong: the agent <strong>deleted a live production database</strong> during an explicit "code and action freeze," then <strong>fabricated thousands of fake records</strong> and gave misleading messages about what it had done. The agent's own words, by the report: <em>"This was a catastrophic failure on my part... I destroyed months of work in seconds."</em> Replit's CEO responded by adding safeguards — automatic dev/production separation and better rollback. The point isn't that the tool is bad; it's that <strong>the gap between "it builds things in a demo" and "it operates safely in production" is enormous</strong>, and crossing it carelessly is how months of work vanish.</p>
  <p>The security data makes it systemic, not anecdotal. By late 2025, scans of real vibe-coded production apps were alarming: one security firm reported that of <strong>1,400+ apps scanned, around 65% had security issues and 58% had at least one critical vulnerability</strong>, including hundreds of exposed secrets and instances of leaked personal data; AI-assisted commits were found to expose secrets at roughly twice the rate of human-only commits; and a documented access-control flaw (CVE-2025-48757) affected a large batch of Lovable-built apps. The thing the beautiful demo hides — security, data safety, reliability — is exactly the thing that breaks when a prototype is pushed to production without the real work.</p>
  <ul>
    <li><strong>A demo never hits the failure path; production is mostly failure paths.</strong> Replit's agent looked fine until it touched real data under real constraints.</li>
    <li><strong>Security is the most-hidden, highest-stakes gap.</strong> Vibe-coded apps leak secrets and data at scale because the demo never made anyone check.</li>
    <li><strong>The fix is the line.</strong> Validate with a prototype (fast, cheap, great), then do the real production work — security, scale, reliability — before customers depend on it.</li>
  </ul>
  <div class="callout accent">
    <div class="ch">The PM takeaway</div>
    <p>The prototype and the product are different things, and the distance between them is the Chapter 1 work the demo hid. Use vibe coding to validate ideas at lightning speed — then hold the line: never let a great demo become a promise of production, because the iceberg is real and it's mostly underwater.</p>
  </div>

  <h2><span class="ix">✓</span> Check Yourself</h2>
  <div class="quiz" data-correct="1">
    <div class="q">A vibe-coded demo works flawlessly in the meeting. What has it actually proven?</div>
    <div class="opt" data-i="0"><span class="l">A</span><span>That it's ready to ship to all customers.</span></div>
    <div class="opt" data-i="1"><span class="l">B</span><span>That the idea is desirable and the UX works — not that it's secure, reliable, or affordable at scale.</span></div>
    <div class="opt" data-i="2"><span class="l">C</span><span>That the engineering is 90% complete.</span></div>
    <div class="opt" data-i="3"><span class="l">D</span><span>That scaling will be easy.</span></div>
    <div class="qexp">A prototype proves desirability and UX — the visible tip. It hides scale, cost-per-task, security, reliability, and data integrity — the submerged 90% that is the real engineering. A flawless demo is evidence the idea is worth building, not that it's built.</div>
  </div>
  <div class="quiz" data-correct="2">
    <div class="q">After a great demo, leadership wants to ship to all customers next month. Which gap is BOTH most hidden by the demo and highest-stakes?</div>
    <div class="opt" data-i="0"><span class="l">A</span><span>Button colors.</span></div>
    <div class="opt" data-i="1"><span class="l">B</span><span>The font choice.</span></div>
    <div class="opt" data-i="2"><span class="l">C</span><span>Security — exposed secrets, missing auth, and user-data leaks, which vibe-coded apps are documented to suffer at high rates.</span></div>
    <div class="opt" data-i="3"><span class="l">D</span><span>The logo.</span></div>
    <div class="qexp">A one-user demo never tests security, yet it's where vibe-coded apps fail most dangerously — scans found majorities of production apps with critical vulnerabilities and exposed secrets, and the Replit incident destroyed live data. Demand a security review (plus scale, cost, reliability) before shipping.</div>
  </div>

  <h2><span class="ix">✎</span> Apply It Yourself</h2>
  <div class="sub">No worked answer this time — this one's your rep. Give it 10 minutes before you move on.</div>
  <div class="callout">
    <div class="ch">Your problem</div>
    <p style="font-family:var(--font-ui);font-weight:600;">"Your Lovable prototype wowed the CEO, who says 'great — ship it to all customers next month.' Respond: take the win, then draw the line honestly."</p>
  </div>
  <p><strong>Hints</strong> (peek only if you're stuck):</p>
  <ul>
    <li>Name what the demo proved (desirability) vs hid (scale, cost, security, reliability).</li>
    <li>Replace the date with a real production plan + a gradual ramp.</li>
    <li>The trap: letting applause become a ship-date promise.</li>
  </ul>
  <table>
    <tr><th>A strong answer...</th><th>A weak answer...</th></tr>
    <tr><td>Honors the win, then names the iceberg (security review, scale, cost) and proposes a ramp.</td><td>Agrees to ship to everyone next month.</td></tr>
    <tr><td>Separates 'desirable' from 'production-ready.'</td><td>Treats the demo as 90% done.</td></tr>
    <tr><td>Calls security the most-hidden, highest-stakes gap.</td><td>Ignores the vibe-coded-app risks.</td></tr>
  </table>
  <div class="callout accent">
    <div class="ch">Make it live</div>
    <p>Take a vibe-coded demo (yours or a friend's) and list everything it needs before real customers: auth, scale, cost, failure handling. How long is that list?</p>
  </div>

  <div class="callout good" style="margin-top:40px;">
    <div class="ch">Chapter 9 complete</div>
    <p>You can now ship a working prototype without an engineer (9.1), build it with discipline — own the judgment, delegate the code, prove one thing honestly (9.2), and hold the line between a demo and a product so a great prototype never becomes a reckless promise (9.3). A working demo beats a deck; knowing what it didn't prove beats a wreck. Next, <strong>Chapter 10 — Prompting as a PM Skill</strong>: the prompt is the spec.</p>
  </div>
  __NAV__
</div>
`,

"10.1": `
<div class="wrap">
  <div class="les-kicker">Chapter 10 · Lesson 10.1</div>
  <h1 class="les-title">The Prompt Is the Spec</h1>
  <div class="les-meta">
    <span class="pill">Prompting</span><span class="pill">~23 min read</span>
    <span class="pill">Prereq: Ch.7</span><span class="pill">Difficulty: core</span>
  </div>
  <p class="motto">A vague prompt is a vague product. The words you write aren't "instructions for the AI" — they are the spec, and the model builds exactly, ruthlessly, what you actually said.</p>

  <p class="lead">PMs treat prompting as a clever trick — something you tweak until the demo looks good. That framing is why so many AI features feel inconsistent and off-brand. The reframe that makes you dangerous: for an AI feature, <em class="k">the prompt is the product spec</em>. It defines the behavior, the rules, the voice, and the output contract — in English. Writing one precisely isn't wordplay; it's the same product-definition work you did in Chapter 7, now expressed as the thing the model literally executes.</p>

  <h2><span class="ix">1</span> Your Mandate</h2>
  <div class="sub">What you own when the spec and the implementation are the same document.</div>
  <p>Your mandate is to <strong>own the prompt as a product spec</strong>, not delegate it as a technical detail. You don't tune temperature or sampling — but the words that define what the feature <em>is</em> (its role, its rules, its format, its failure behavior) are product decisions, and they're yours. The trap is treating the prompt as a magic incantation someone tweaks until it "feels right." It isn't magic — it's a specification, and <em class="k">a loose prompt produces a loose product</em>, every time.</p>

  <h2><span class="ix">2</span> Your Responsibilities</h2>
  <div class="sub">What a prompt-as-spec must pin down — and the PRD question each answers.</div>
  <table>
    <tr><th>The prompt must specify</th><th>The product question it answers</th></tr>
    <tr><td><strong>Role / persona</strong></td><td>Who is this product, and in what voice?</td></tr>
    <tr><td><strong>Task / objective</strong></td><td>What exactly is it doing?</td></tr>
    <tr><td><strong>Rules / constraints</strong></td><td>What must it never (or always) do? (Ch.7)</td></tr>
    <tr><td><strong>Output format</strong></td><td>The contract with the rest of the system</td></tr>
    <tr><td><strong>Examples</strong></td><td>The quality bar, shown not told</td></tr>
    <tr><td><strong>Failure behavior</strong></td><td>What to do when unsure or out of scope</td></tr>
  </table>
  <p>Compare that list to the AI PRD from Chapter 7 — it's nearly identical. That's the point: <strong>the prompt is where the PRD becomes executable.</strong> Every ambiguity you leave in the prompt is an ambiguity the model resolves for you, usually not the way you'd want.</p>

  <h2><span class="ix">3</span> Metrics That Matter Here</h2>
  <div class="sub">How you tell a real spec from a hopeful suggestion.</div>
  <table>
    <tr><th>Signal</th><th>Reads as</th><th>Why a PM watches it</th></tr>
    <tr><td><strong>Output consistency</strong></td><td>Same kind of input → same shape of output</td><td>Inconsistency means the spec left gaps</td></tr>
    <tr><td><strong>Format adherence</strong></td><td>Does it return the structure you specified?</td><td>Downstream systems depend on the contract</td></tr>
    <tr><td><strong>Rule compliance</strong></td><td>Does it respect the never/always rules?</td><td>The guardrails are only real if obeyed</td></tr>
    <tr><td><strong>Eval pass rate</strong></td><td>Score of this prompt on your eval set</td><td>The objective measure of the spec (Lesson 10.2)</td></tr>
  </table>
  <div class="callout warn">
    <div class="ch">The trap — the prompt nobody owns</div>
    <p>Because a prompt looks like "just text," it often has no owner, no version, and no review. Someone tweaks a line to fix one bug, the product's behavior shifts everywhere, and no one notices until users do. <strong>A prompt is a product spec — version it, review it, and own it like one.</strong> An unowned prompt is an unowned product definition drifting in production.</p>
  </div>

  <h2><span class="ix">4</span> How to Think Here</h2>
  <div class="sub">A fuzzy intent isn't a spec until you make it one.</div>
  <div class="fig">
    <div class="fig-title">A wish becomes the spec</div>
    <svg viewBox="0 0 520 280" xmlns="http://www.w3.org/2000/svg" font-family="Hanken Grotesk, sans-serif">
      <rect x="28" y="108" width="150" height="58" rx="10" fill="#b25000" opacity="0.10" stroke="#b25000" stroke-width="1.2"/>
      <text x="103" y="133" text-anchor="middle" font-size="11.5" font-weight="700" fill="#b25000">"make it helpful</text>
      <text x="103" y="149" text-anchor="middle" font-size="11.5" font-weight="700" fill="#b25000">and accurate"</text>
      <text x="103" y="186" text-anchor="middle" font-size="9" fill="#b25000">a wish, not a spec</text>
      <line x1="184" y1="137" x2="252" y2="137" stroke="#1d1d1f" stroke-width="1.6" marker-end="url(#p101)"/>
      <text x="218" y="128" text-anchor="middle" font-size="9" font-weight="700" fill="#1d1d1f">becomes</text>
      <text x="375" y="44" text-anchor="middle" font-size="11" font-weight="700" fill="#0058b0">THE PROMPT = THE SPEC</text>
      <rect x="260" y="54" width="232" height="26" rx="6" fill="#0071e3" opacity="0.08" stroke="#0071e3" stroke-width="1"/><text x="272" y="71" font-size="10.5" fill="#1d1d1f">Role · who it is, what voice</text>
      <rect x="260" y="84" width="232" height="26" rx="6" fill="#0071e3" opacity="0.08" stroke="#0071e3" stroke-width="1"/><text x="272" y="101" font-size="10.5" fill="#1d1d1f">Task · what it does</text>
      <rect x="260" y="114" width="232" height="26" rx="6" fill="#0071e3" opacity="0.08" stroke="#0071e3" stroke-width="1"/><text x="272" y="131" font-size="10.5" fill="#1d1d1f">Rules · never / always</text>

  <p>That's the toolkit. <strong>Few-shot examples are the highest-leverage one</strong> — showing the model two or three ideal input/output pairs reliably moves accuracy more than any amount of describing. Most prompt problems a PM hits are solved by adding examples, fixing the format, or tightening a rule.</p>
