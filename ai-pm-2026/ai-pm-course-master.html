    <div class="opt" data-i="2"><span class="l">C</span><span>Fine-tune the model on formatting.</span></div>
    <div class="opt" data-i="3"><span class="l">D</span><span>Remove all instructions and hope.</span></div>
    <div class="qexp">Correct-but-messy is a format problem, solved with pattern fixes: specify the format and show a couple of few-shot examples of the ideal output. Few-shot is the highest-leverage pattern — then prove the fix on the eval set and check accuracy didn't regress.</div>
  </div>

  <h2><span class="ix">✎</span> Apply It Yourself</h2>
  <div class="sub">No worked answer this time — this one's your rep. Give it 10 minutes before you move on.</div>
  <div class="callout">
    <div class="ch">Your problem</div>
    <p style="font-family:var(--font-ui);font-weight:600;">"Your AI feature's answers are correct but inconsistently formatted and often too long. Fix the prompt — and design how you'd prove the fix actually worked."</p>
  </div>
  <p><strong>Hints</strong> (peek only if you're stuck):</p>
  <ul>
    <li>Correct-but-messy is a format problem: output-format spec + few-shot examples.</li>
    <li>Change one thing, then run v1 vs v2 on the same eval set.</li>
    <li>The trap: re-reading one output and declaring it 'feels better.'</li>
  </ul>
  <table>
    <tr><th>A strong answer...</th><th>A weak answer...</th></tr>
    <tr><td>Adds a format spec + 2 few-shot examples; A/B's v1 vs v2 on the eval set.</td><td>Wordsmiths by vibes.</td></tr>
    <tr><td>Changes one thing at a time so the delta is attributable.</td><td>Rewrites everything and can't tell what helped.</td></tr>
    <tr><td>Checks accuracy didn't regress while format improved.</td><td>Fixes format, silently breaks correctness.</td></tr>
  </table>
  <div class="callout accent">
    <div class="ch">Make it live</div>
    <p>Take a prompt you use, add 2 few-shot examples of the ideal output, and compare 5 results before/after. Did examples beat instructions?</p>
  </div>

  <div class="callout good" style="margin-top:40px;">
    <div class="ch">Chapter 10 complete</div>
    <p>You can now treat the prompt as what it is — the product spec (10.1) — and iterate it the way engineers iterate code: a few reliable patterns, one change at a time, proven against an eval set (10.2). The prompt isn't a party trick; it's product definition you write precisely and refine rigorously. Next, <strong>Chapter 11 — AI Product Improvement Loops</strong>: turning that single eval loop into your product's whole improvement engine.</p>
  </div>
  __NAV__
</div>

"11.1": `
<div class="wrap">
  <div class="les-kicker">Chapter 11 · Lesson 11.1</div>
  <h1 class="les-title">Eval-driven Iteration</h1>
  <div class="les-meta">
    <span class="pill">Improvement loops</span><span class="pill">~23 min read</span>
    <span class="pill">Prereq: Ch.5, Ch.10</span><span class="pill">Difficulty: core</span>
  </div>
  <p class="motto">When your AI product is weak, the junior instinct is to wait for the next model. The senior move is to look at thirty of your own failures — the fix is almost never the model.</p>

  <p class="lead">AI products don't get better because a bigger model showed up. They get better because someone ran a disciplined loop: <em class="k">ship, look at the failures, find the pattern, fix the cheapest lever, re-measure</em>. This lesson teaches that loop and its beating heart — <em class="k">error analysis</em>, the unglamorous practice of reading your product's real failures. Master it and you can improve any AI product on demand, instead of praying for the next release.</p>

  <h2><span class="ix">1</span> Your Mandate</h2>
  <div class="sub">What you own when "make it better" lands on your desk.</div>
  <p>Your mandate is to <strong>own the improvement loop and the discipline of looking at your data</strong>. You don't retrain the model; you find the failure classes and direct the cheapest fix that closes them — usually a prompt, retrieval, or data change, rarely a model swap (Ch.1.1). The trap is treating quality as something that arrives from outside (a vendor's new model). It's something you manufacture, iteration by iteration, by reading failures and fixing the biggest pattern.</p>

  <h2><span class="ix">2</span> Your Responsibilities</h2>
  <div class="sub">The loop, stage by stage — and where the PM actually works.</div>
  <table>
    <tr><th>Stage</th><th>What happens</th><th>Your role</th></tr>
    <tr><td><strong>Ship + log</strong></td><td>The feature runs; traces are captured (Ch.5.2)</td><td>Make sure failures are observable</td></tr>
    <tr><td><strong>Error analysis</strong></td><td>Read 30–50 real outputs; label and cluster failures</td><td>This is your core job — do it by hand</td></tr>
    <tr><td><strong>Find the failure class</strong></td><td>Group failures into a few named patterns</td><td>Decide which class is biggest and worth fixing</td></tr>
    <tr><td><strong>Fix the cheapest lever</strong></td><td>Prompt (10.2) / retrieval (1.2) / data — rarely model</td><td>Pick the lever that closes that class cheapest</td></tr>
    <tr><td><strong>Re-eval</strong></td><td>Run the eval set; did the class shrink?</td><td>Gate the change; then repeat</td></tr>
  </table>
  <p>The stage that separates real AI PMs from the rest is <strong>error analysis</strong>: actually reading the failures. It's tedious and un-delegatable, and it's where every other decision in the loop comes from. Skip it and you'll fix problems you imagine instead of the ones you have.</p>

  <h2><span class="ix">3</span> Metrics That Matter Here</h2>
  <div class="sub">How you know the loop is turning and the gains are real.</div>
  <table>
    <tr><th>Metric</th><th>Reads as</th><th>Why a PM watches it</th></tr>
    <tr><td><strong>Eval score over iterations</strong></td><td>Is quality trending up loop by loop?</td><td>The loop's whole purpose, made visible</td></tr>
    <tr><td><strong>Failure-class distribution</strong></td><td>Which pattern accounts for most failures?</td><td>Tells you exactly where to spend effort</td></tr>
    <tr><td><strong>Fix → re-eval cycle time</strong></td><td>How fast you close one loop</td><td>Faster loops compound into faster improvement</td></tr>
    <tr><td><strong>Share of gains from non-model fixes</strong></td><td>How much improvement came from prompt/retrieval/data</td><td>Usually most of it — the lesson's whole point</td></tr>
  </table>
  <div class="callout warn">
    <div class="ch">The trap — writing evals without looking at the data</div>
    <p>Teams love to design elaborate eval criteria up front — before reading a single real output. The result: you build careful tests for failures that rarely happen and miss the ones that dominate. Worse, your criteria <em>shift</em> once you finally look (a documented effect called "criteria drift"). <strong>Error analysis comes first: read the failures, let them tell you the criteria. Evaluation is human-driven sensemaking, not a spec you write blind.</strong></p>
  </div>

  <h2><span class="ix">4</span> How to Think Here</h2>
  <div class="sub">Turn a pile of failures into named classes — then fix the biggest one.</div>
  <div class="fig">
    <div class="fig-title">Error analysis — a pile of failures becomes a to-do list</div>
    <svg viewBox="0 0 520 280" xmlns="http://www.w3.org/2000/svg" font-family="Hanken Grotesk, sans-serif">
      <rect x="34" y="64" width="150" height="150" rx="10" fill="#f5f5f7" stroke="#dddddd" stroke-width="1"/>
      <circle cx="60" cy="84" r="3" fill="#86868b"/><circle cx="96" cy="78" r="3" fill="#86868b"/><circle cx="134" cy="90" r="3" fill="#86868b"/><circle cx="165" cy="82" r="3" fill="#86868b"/>
      <circle cx="55" cy="116" r="3" fill="#86868b"/><circle cx="100" cy="110" r="3" fill="#86868b"/><circle cx="140" cy="120" r="3" fill="#86868b"/><circle cx="168" cy="114" r="3" fill="#86868b"/>
      <circle cx="68" cy="148" r="3" fill="#86868b"/><circle cx="110" cy="152" r="3" fill="#86868b"/><circle cx="150" cy="144" r="3" fill="#86868b"/>
      <circle cx="60" cy="182" r="3" fill="#86868b"/><circle cx="105" cy="186" r="3" fill="#86868b"/><circle cx="150" cy="180" r="3" fill="#86868b"/>
      <text x="109" y="234" text-anchor="middle" font-size="9.5" fill="#86868b">~30 raw failures</text>
      <text x="109" y="249" text-anchor="middle" font-size="9" fill="#86868b">(look at your data)</text>
      <line x1="192" y1="139" x2="240" y2="139" stroke="#1d1d1f" stroke-width="1.5" marker-end="url(#e111)"/>
      <text x="216" y="130" text-anchor="middle" font-size="9" font-weight="700" fill="#1d1d1f">label</text>
      <text x="250" y="76" font-size="10" fill="#1d1d1f">Retrieval miss</text>
      <rect x="250" y="82" width="195" height="13" rx="3" fill="#b25000" opacity="0.65"/><text x="452" y="92" font-size="10" font-weight="700" fill="#b25000">14</text>
      <text x="250" y="115" font-size="10" fill="#1d1d1f">Wrong format</text>
      <rect x="250" y="121" width="112" height="13" rx="3" fill="#0071e3" opacity="0.6"/><text x="369" y="131" font-size="10" font-weight="700" fill="#0058b0">8</text>
      <text x="250" y="154" font-size="10" fill="#1d1d1f">Off tone</text>
      <rect x="250" y="160" width="70" height="13" rx="3" fill="#0071e3" opacity="0.45"/><text x="327" y="170" font-size="10" font-weight="700" fill="#1d1d1f">5</text>
      <text x="250" y="193" font-size="10" fill="#1d1d1f">Model too weak</text>
      <rect x="250" y="199" width="42" height="13" rx="3" fill="#86868b" opacity="0.5"/><text x="299" y="209" font-size="10" font-weight="700" fill="#86868b">3</text>
      <text x="350" y="240" text-anchor="middle" font-size="9.5" fill="#0a7d3c">fix the biggest class first — the model is the smallest bar</text>
      <defs><marker id="e111" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#1d1d1f"/></marker></defs>
    </svg>
    <div class="fig-cap">Error analysis turns a shapeless pile of failures into a ranked list of named classes. The biggest bar is where the gains are — and it's almost never "the model is too weak."</div>
  </div>
  <p>Run the loop like this:</p>
  <ol>
    <li><strong>Don't reach for the model.</strong> Before any upgrade, look at your data.</li>
    <li><strong>Pull 30–50 real failures</strong> from production traces.</li>
    <li><strong>Label and cluster them</strong> into a few named failure classes.</li>
    <li><strong>Fix the biggest class with the cheapest lever</strong> — prompt, then retrieval, then data; model last.</li>
    <li><strong>Re-eval and repeat.</strong> Confirm the class shrank without breaking others, then attack the next-biggest.</li>
  </ol>
  <div class="callout accent">
    <div class="ch">Say this in the interview</div>
    <p>"Before upgrading anything, I'd do error analysis — read 30 to 50 real failures and cluster them into classes. The biggest class is usually retrieval or prompt, not the model, so I fix that cheapest lever and re-run the eval. Quality is a loop you run, not a model you buy."</p>
  </div>

  <h2><span class="ix">5</span> Frameworks to Deploy</h2>
  <div class="sub">Three disciplines that make the loop work.</div>
  <h3>① Error analysis first</h3>
  <p>Always start by reading the data, not by writing eval criteria. Spend 30 minutes on 20–50 real outputs whenever you make a meaningful change; let the failures define the criteria. This is the single highest-leverage habit in AI product work, and the one teams most often skip because it isn't glamorous.</p>
  <h3>② The cheapest-lever order</h3>
  <p>To close a failure class, try levers in cost order: <em class="k">prompt → retrieval → data → model</em> (Ch.1.3). Most classes are closed by the first three. Reaching for the model first is the expensive reflex this whole course pushes against — it's rarely the bottleneck (Ch.1.1).</p>
  <h3>③ The closed loop, gated by evals</h3>
  <p>Ship → observe (Ch.5.2) → analyze → fix → re-eval, with the eval set as the gate (Ch.5.1, Ch.7.2). The loop only compounds if every fix is verified against real cases and locked in as a regression test. An "improvement" you didn't re-eval is a guess.</p>

  <h2><span class="ix">6</span> Worked Solution</h2>
  <div class="sub">The model-upgrade reflex, intercepted.</div>
  <div class="callout">
    <div class="ch">The prompt</div>
    <p style="font-family:var(--font-ui);font-weight:600;">"Our AI feature's quality is mediocre. An engineer wants to upgrade to the newest, most expensive model to fix it. What do you do first?"</p>
  </div>
  <p><strong>Step 1 — Intercept the reflex.</strong> Upgrading the model is the expensive guess. Before spending, I'd do error analysis — because if the failures are retrieval or format problems, a bigger model fixes none of them and we've paid more for the same mediocrity.</p>
  <div class="flow">
<span class="st">resist</span>     <span class="nt">don't buy the bigger model yet</span>
   <span class="ar">↓</span>
<span class="st">analyze</span>    <span class="nt">pull 30 real failures · label · cluster into classes</span>
   <span class="ar">↓</span>
<span class="st">find</span>       <span class="nt">retrieval misses 40% · bad format 25% · model-weakness only 10%</span>
   <span class="ar">↓</span>
<span class="st">fix cheap</span>  <span class="nt">hybrid retrieval (1.2) + a format spec (10.2) → re-eval</span>
  </div>
  <p><strong>Step 2 — Read the failures.</strong> Thirty real cases, labeled, cluster into classes. Say it comes back: 40% retrieval misses, 25% wrong format, 15% tone, and only ~10% genuine "the model couldn't reason it." That distribution is the answer.</p>
  <p><strong>Step 3 — Fix the biggest classes cheaply.</strong> Retrieval misses → add hybrid retrieval (Ch.1.2). Format → tighten the prompt with a format spec and few-shot (Ch.10.2). These are days of work, near-zero ongoing cost, and they target two-thirds of the failures.</p>
  <p><strong>Step 4 — Re-eval, then reconsider the model.</strong> Re-run the eval set; if retrieval and format gains lift the score materially, the "mediocre" problem is largely solved without a model swap. If a real failure class genuinely needs more capability, <em>now</em> the model upgrade is an evidence-based decision, not a reflex.</p>
  <div class="callout good">
    <div class="ch">Why this wins</div>
    <p>You replaced an expensive guess with a measured diagnosis, fixed the two biggest failure classes with the cheapest levers, and kept the model upgrade as an evidence-gated option. Research backs the instinct: studies in 2025–26 found roughly half of the gain from a model upgrade actually comes from better prompting, and structured prompts alone can lift accuracy 20–30%. The model is rarely the bottleneck.</p>
  </div>

  <h2><span class="ix">7</span> Industry Case</h2>
  <div class="sub">The methodology that became AI product management's core skill.</div>
  <h3>Error analysis — "look at your data" as the standard practice</h3>
  <p>By 2025, the most-repeated advice from practitioners running real AI products (notably ML engineer Hamel Husain and collaborators, whose eval guidance circulated widely among PMs) converged on a single, almost stubborn point: <strong>"evals aren't about writing tests first — they're about error analysis."</strong> The recommended ritual is concrete and humble: whenever you make a meaningful change, spend ~30 minutes manually reading 20–50 of your product's outputs, labeling pass/fail with a short critique, and clustering the failures into classes. Their warning is pointed — many teams craft elaborate eval criteria <em>without first looking at the data</em>, then waste effort on failures that barely occur. And they document <strong>"criteria drift"</strong>: your sense of what "good" means actually changes once you read real outputs, which is exactly why evaluation has to be a human-driven loop, not a spec written blind.</p>
  <p>The "model is rarely the bottleneck" half is now backed by research, not just intuition. A 2025–26 MIT Sloan study found that <strong>only about half of the performance gain from adopting a more advanced model came from the model itself</strong> — the other half came from how users adapted their prompts; and separate work found structured prompting alone improving accuracy on the order of 20–30% with no model change. The leading AI companies, the same sources note, win not by having the biggest model but by having the best <em>data and retrieval</em> for their domain.</p>
  <ul>
    <li><strong>Reading failures is the job.</strong> The highest-leverage AI-PM activity is unglamorous manual error analysis — and most teams skip it.</li>
    <li><strong>Criteria emerge from data.</strong> You discover your real eval criteria by looking, not by guessing up front.</li>
    <li><strong>Gains live in the cheap levers.</strong> Prompt, retrieval, and data improvements deliver most of the quality — the model upgrade is the last resort, not the first.</li>
  </ul>
  <div class="callout accent">
    <div class="ch">The PM takeaway</div>
    <p>AI products improve by closing a loop you run by hand: read the failures, find the biggest class, fix the cheapest lever, re-eval. Waiting for a bigger model is the amateur's substitute for the work. The professional looks at the data — and almost always finds the fix was never the model.</p>
  </div>

  <h2><span class="ix">✓</span> Check Yourself</h2>
  <div class="quiz" data-correct="2">
    <div class="q">Your AI feature is underperforming. What should you do before considering a model upgrade?</div>
    <div class="opt" data-i="0"><span class="l">A</span><span>Nothing — just buy the biggest model available.</span></div>
    <div class="opt" data-i="1"><span class="l">B</span><span>Write a detailed eval spec from your imagination, then build to it.</span></div>
    <div class="opt" data-i="2"><span class="l">C</span><span>Error analysis — read 30–50 real failures, cluster them into classes, and fix the biggest class with the cheapest lever.</span></div>
    <div class="opt" data-i="3"><span class="l">D</span><span>Ask users to be more patient.</span></div>
    <div class="qexp">Improvement starts by looking at your data. Reading and clustering real failures reveals the dominant class — usually retrieval or prompt, not the model — which you then fix with the cheapest lever and re-eval. Writing eval criteria before looking (B) creates tests for problems you don't have.</div>
  </div>
  <div class="quiz" data-correct="0">
    <div class="q">Error analysis on 30 failures shows: 40% retrieval misses, 25% format, 15% tone, 10% genuine model weakness. Best first move?</div>
    <div class="opt" data-i="0"><span class="l">A</span><span>Fix retrieval (the biggest class) with the cheapest lever, then re-eval — not upgrade the model.</span></div>
    <div class="opt" data-i="1"><span class="l">B</span><span>Upgrade the model to fix the 10%.</span></div>
    <div class="opt" data-i="2"><span class="l">C</span><span>Fix tone first because it's most visible.</span></div>
    <div class="opt" data-i="3"><span class="l">D</span><span>Do nothing until the next model release.</span></div>
    <div class="qexp">Attack the biggest failure class first, and use the cheapest lever that closes it — here, retrieval (Ch.1.2). The model-weakness class is the smallest (10%), so a model upgrade would spend the most to fix the least. Fix, re-eval, then move to the next-biggest class.</div>
  </div>
  <h2><span class="ix">✎</span> Apply It Yourself</h2>
  <div class="sub">No worked answer this time — this one's your rep. Give it 10 minutes before you move on.</div>
  <div class="callout">
    <div class="ch">Your problem</div>
    <p style="font-family:var(--font-ui);font-weight:600;">"Your AI feature's quality is mediocre and an engineer wants to upgrade to the newest, most expensive model. What do you do first — and how do you decide if the model is even the problem?"</p>
  </div>
  <p><strong>Hints</strong> (peek only if you're stuck):</p>
  <ul>
    <li>Error analysis first: read 30 real failures and cluster them.</li>
    <li>Fix the biggest class with the cheapest lever (prompt / retrieval / data).</li>
    <li>The trap: buying a bigger model before looking at the data.</li>
  </ul>
  <table>
    <tr><th>A strong answer...</th><th>A weak answer...</th></tr>
    <tr><td>Does error analysis, finds the dominant failure class, fixes the cheapest lever, re-evals.</td><td>Upgrades the model on a hunch.</td></tr>
    <tr><td>Reserves the model swap for a class that genuinely needs more capability.</td><td>Treats the model as the default fix.</td></tr>
    <tr><td>Confirms the fix on the eval set.</td><td>Declares victory off one example.</td></tr>
  </table>
  <div class="callout accent">
    <div class="ch">Make it live</div>
    <p>Pull 20 real outputs from any AI tool you use, label them pass/fail, and cluster the failures. Bet: is the biggest class really 'the model'?</p>
  </div>
  __NAV__
</div>
`,

"11.2": `
<div class="wrap">
  <div class="les-kicker">Chapter 11 · Lesson 11.2</div>
  <h1 class="les-title">The Data Flywheel</h1>
  <div class="les-meta">
    <span class="pill">Improvement loops</span><span class="pill">~23 min read</span>
    <span class="pill">Prereq: 11.1, Ch.4</span><span class="pill">Difficulty: core</span>
  </div>
  <p class="motto">Anyone can rent the same model you use. The one thing they can't rent is the data your users generate every day — if you designed the product to capture it.</p>

  <p class="lead">Lesson 11.1 was the tactical loop; this is the strategic one. A <em class="k">data flywheel</em> is the cycle where usage produces data, data improves the product, and a better product drives more usage — compounding into the one moat in AI that competitors can't buy. But flywheels don't spin for free: they turn only if you design the product to <em class="k">capture the right feedback</em>. This lesson is how a PM builds a moat out of usage.</p>

  <h2><span class="ix">1</span> Your Mandate</h2>
  <div class="sub">What you own when the model is rentable but the moat isn't.</div>
  <p>Your mandate is to <strong>design the product so usage compounds into proprietary advantage</strong> — to make the flywheel turn. You don't train the model; you decide what signal each interaction produces, how it's captured, and how it feeds back into improvement (the 11.1 loop). The strategic truth underneath: the model is a commodity anyone can rent, so your durable edge is the data only your users can generate — and capturing it is a <em class="k">product-design decision you own</em>, not an ML detail.</p>

  <h2><span class="ix">2</span> Your Responsibilities</h2>
  <div class="sub">What makes a flywheel spin — and what leaves it stalled.</div>
  <table>
    <tr><th>A flywheel needs</th><th>What stalls it</th></tr>
    <tr><td><strong>A closed loop</strong> — signal feeds a real improvement</td><td>Data collected but never used to improve anything</td></tr>
    <tr><td><strong>Domain-specific signals</strong> — you capture the <em>right</em> data</td><td>Generic logs that don't reveal quality</td></tr>
    <tr><td><strong>An action layer</strong> — the data changes the product</td><td>A dashboard nobody acts on</td></tr>
    <tr><td><strong>Lightweight capture</strong> — easy to give feedback</td><td>Relying on a thumbs button nobody clicks</td></tr>
  </table>
  <p>The most common failure is the last row. Teams add a thumbs up/down, ship, and discover the flywheel has no fuel because <strong>almost nobody clicks it</strong>. The PM's real design work is capturing signal users give <em>for free</em> — their corrections and their behavior — not begging for ratings.</p>

  <h2><span class="ix">3</span> Metrics That Matter Here</h2>
  <div class="sub">How you tell a spinning flywheel from a decorative one.</div>
  <table>
    <tr><th>Metric</th><th>Reads as</th><th>Why a PM watches it</th></tr>
    <tr><td><strong>Feedback capture rate</strong></td><td>% of interactions that yield a usable signal</td><td>No signal, no fuel — this is the tank gauge</td></tr>
    <tr><td><strong>Signal quality</strong></td><td>Does the signal actually indicate good vs bad?</td><td>Corrections beat thumbs; implicit beats nothing</td></tr>
    <tr><td><strong>Signal → shipped-fix time</strong></td><td>How fast feedback becomes a real improvement</td><td>A closed loop, or a data graveyard?</td></tr>
    <tr><td><strong>Quality-vs-usage trend</strong></td><td>Is the product getting better as usage grows?</td><td>The flywheel actually compounding (or not)</td></tr>
  </table>
  <div class="callout warn">
    <div class="ch">The trap — the thumbs button nobody clicks</div>
    <p>The default feedback design is a thumbs up/down, and the default outcome is that the analytics show almost no one uses it. You've built a flywheel with an empty tank. <strong>The fix is to capture signal users produce naturally:</strong> let them <em>edit</em> the output (a correction is the richest signal there is — it shows not just that it was wrong but how to make it right), and log <em>implicit</em> behavior (did they accept it, copy it, re-ask, or abandon?). Explicit ratings are the garnish, not the meal.</p>
  </div>

  <h2><span class="ix">4</span> How to Think Here</h2>
  <div class="sub">Usage feeds data; data feeds the product; the product feeds usage.</div>
  <div class="fig">
    <div class="fig-title">The data flywheel — the only AI moat that compounds</div>
    <svg viewBox="0 0 520 290" xmlns="http://www.w3.org/2000/svg" font-family="Hanken Grotesk, sans-serif">
      <path d="M260,82 A68,68 0 0 1 328,150" fill="none" stroke="#0071e3" stroke-width="2.4" marker-end="url(#fw)"/>
      <path d="M328,150 A68,68 0 0 1 260,218" fill="none" stroke="#0071e3" stroke-width="2.4" marker-end="url(#fw)"/>
      <path d="M260,218 A68,68 0 0 1 192,150" fill="none" stroke="#0071e3" stroke-width="2.4" marker-end="url(#fw)"/>
      <path d="M192,150 A68,68 0 0 1 260,82" fill="none" stroke="#0071e3" stroke-width="2.4" marker-end="url(#fw)"/>
      <text x="260" y="146" text-anchor="middle" font-size="11.5" font-weight="800" fill="#1d1d1f">DATA</text>
      <text x="260" y="162" text-anchor="middle" font-size="11.5" font-weight="800" fill="#1d1d1f">FLYWHEEL</text>
      <text x="260" y="46" text-anchor="middle" font-size="11" font-weight="700" fill="#0058b0">More usage</text>
      <text x="344" y="154" text-anchor="start" font-size="11" font-weight="700" fill="#0058b0">More proprietary data</text>
      <text x="260" y="262" text-anchor="middle" font-size="11" font-weight="700" fill="#0058b0">Better product</text>
      <text x="176" y="154" text-anchor="end" font-size="11" font-weight="700" fill="#0058b0">Stickier, more trust</text>
      <text x="260" y="284" text-anchor="middle" font-size="9.5" fill="#0a7d3c">after 12–24 months of compounding, the gap becomes hard to cross</text>
      <defs><marker id="fw" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#0071e3"/></marker></defs>
    </svg>
    <div class="fig-cap">Each turn feeds the next: usage generates proprietary data, which improves the product, which deepens trust and drives more usage. The model is rentable; this loop is not — and it compounds.</div>
  </div>
  <p>To build a flywheel that actually turns:</p>
  <ol>
    <li><strong>Name the signal</strong> each interaction can produce (an accept, an edit, a re-ask).</li>
    <li><strong>Capture it lightweight</strong> — corrections and implicit behavior, not just a thumbs button.</li>
    <li><strong>Build the action layer</strong> — feed signals into the 11.1 loop so the product measurably improves.</li>
    <li><strong>Close the loop fast</strong> — the quicker signal becomes a shipped fix, the faster it spins.</li>
    <li><strong>Protect it</strong> — it's the moat; it's what makes you un-rentable (Ch.4, Ch.6).</li>
  </ol>
  <div class="callout accent">
    <div class="ch">Say this in the interview</div>
    <p>"Our moat isn't the model — anyone can rent that. It's the data flywheel: every interaction produces a signal we capture (mostly user corrections and implicit behavior, not thumbs), feed into our eval loop, and ship as improvements. After a year of compounding, a competitor can't catch up just by using the same model."</p>
  </div>

  <h2><span class="ix">5</span> Frameworks to Deploy</h2>
  <div class="sub">Three rules for building a moat out of usage.</div>
  <h3>① The three elements</h3>
  <p>A real flywheel needs all three: a <em class="k">closed feedback loop</em> (signal actually improves the product), <em class="k">domain-specific signals</em> (you capture data that reveals quality in <em>your</em> domain), and an <em class="k">action layer</em> (the data drives real changes, not a dashboard). Missing any one and the wheel is decorative.</p>
  <h3>② Capture correction, not just rating</h3>
  <p>Rank your signals by richness: a <strong>correction</strong> (the user edits the output) is gold — it shows what was wrong <em>and</em> the right answer; <strong>implicit behavior</strong> (accept, copy, re-ask, abandon) is plentiful and free; an <strong>explicit thumbs</strong> is the weakest and rarest. Design the product so giving a correction is the natural next action, and log behavior automatically.</p>
  <h3>③ The flywheel is the moat</h3>
  <p>This is the strategic payoff of the whole course's "the model isn't the moat" thread (Ch.4, Ch.6). Proprietary, compounding, usage-generated data is the one advantage a competitor can't rent, copy, or skip — they'd need your users and your time. Treat the flywheel as the company's core asset and design to protect it.</p>

  <h2><span class="ix">6</span> Worked Solution</h2>
  <div class="sub">"We have no moat — anyone can use the same model."</div>
  <div class="callout">
    <div class="ch">The prompt</div>
    <p style="font-family:var(--font-ui);font-weight:600;">"Leadership is worried our AI product has no moat — competitors can use the exact same model. How do you build one?"</p>
  </div>
  <p><strong>Step 1 — Agree, then reframe.</strong> They're right that the model is no moat — it's rentable. The moat we can build is a data flywheel: an advantage that grows with every user and can't be bought off the shelf.</p>
  <div class="flow">
<span class="st">not the model</span>  <span class="nt">anyone can rent it — that is not a moat</span>
   <span class="ar">↓</span>
<span class="st">capture</span>        <span class="nt">let users EDIT outputs (corrections) + log implicit signals (accept · copy · re-ask)</span>
   <span class="ar">↓</span>
<span class="st">act</span>            <span class="nt">feed signals into the eval loop (11.1) so the product measurably improves</span>
   <span class="ar">↓</span>
<span class="st">compound</span>       <span class="nt">more usage → more data → better product → more usage</span>
  </div>
  <p><strong>Step 2 — Design the capture.</strong> Crucially, not a thumbs button (nobody clicks it). I'd make <em>editing the output</em> a natural part of the flow — every edit is a labeled correction — and log implicit signals (did they accept it, copy it, re-ask, abandon?). That's high-volume, high-quality fuel users give us for free.</p>
  <p><strong>Step 3 — Build the action layer.</strong> Pipe those signals into the eval-driven loop from 11.1: corrections become eval cases and training-data candidates; implicit signals surface failure classes. The product improves on data only we have.</p>
  <p><strong>Step 4 — Let it compound, and protect it.</strong> Each turn makes us a little better and a little stickier, which brings more usage and more data. Over a year that lead compounds into something a competitor on the same model can't close — because they don't have our users' corrections. That's the moat.</p>
  <div class="callout good">
    <div class="ch">Why this wins</div>
    <p>You reframed "no moat" into a concrete, ownable plan: capture the right signals (corrections and implicit behavior, not thumbs), close the loop so they improve the product, and let usage compound the advantage. The model stays rentable; your data flywheel becomes the thing competitors can't rent.</p>
  </div>

  <h2><span class="ix">7</span> Industry Case</h2>
  <div class="sub">The moat that compounds — and why thumbs buttons don't fill it.</div>
  <h3>Tesla and Copilot — flywheels you can't rent your way past</h3>
  <p>The canonical data flywheel is <strong>Tesla's self-driving program</strong>: by 2023 its fleet had reportedly accumulated <strong>over 300 million miles of real-world driving data</strong>, and every time a driver engages or disengages Autopilot, the car captures another edge case that feeds the next model. No competitor can rent that — it would take their own fleet and their own years. <strong>GitHub Copilot</strong> shows the same shape in software: after <strong>12–24 months of interaction data inside customers' codebases</strong>, internally tuned instances reportedly outperform any public model, and switching away becomes impractical. The reported pattern across cases is blunt — more usage produces more proprietary data, which produces a better product, which produces more usage, and after roughly a year or two of compounding <strong>the gap becomes very hard to cross</strong>.</p>
  <p>But the same body of practice is equally blunt about how flywheels stall: teams lean on a thumbs up/down and find <em>almost nobody clicks it</em>. The fix that recurs everywhere is to capture what users give naturally — <strong>corrections</strong> (letting users edit the output, which reveals both the error and the fix) and <strong>implicit signals</strong> (abandonment, copy/paste, follow-up queries). Explicit ratings offer precision but no volume; implicit signals offer volume; corrections offer both richness and intent. The flywheel only spins if the feedback design fills the tank.</p>
  <ul>
    <li><strong>The moat is usage-generated data, not the model.</strong> Tesla's miles and Copilot's in-codebase data are un-rentable by construction.</li>
    <li><strong>It compounds, and then it's a wall.</strong> A year-plus of accumulated signal is a lead competitors can't buy their way past.</li>
    <li><strong>Capture is a design decision.</strong> Corrections and implicit behavior fuel the wheel; a thumbs button leaves it empty.</li>
  </ul>
  <div class="callout accent">
    <div class="ch">The PM takeaway</div>
    <p>The only AI moat that compounds is the data your users generate — and whether you capture it is a product-design choice you own. Build the flywheel: capture corrections and behavior (not thumbs), close the loop into eval-driven improvement (11.1), and let usage turn a rentable model into an un-rentable advantage.</p>
  </div>

  <h2><span class="ix">✓</span> Check Yourself</h2>
  <div class="quiz" data-correct="1">
    <div class="q">Your AI product added a thumbs up/down for feedback, but analytics show almost nobody uses it. Best fix?</div>
    <div class="opt" data-i="0"><span class="l">A</span><span>Make the thumbs buttons bigger and nag users to click.</span></div>
    <div class="opt" data-i="1"><span class="l">B</span><span>Capture signal users give naturally — let them edit outputs (corrections) and log implicit behavior (accept, copy, re-ask).</span></div>
    <div class="opt" data-i="2"><span class="l">C</span><span>Give up on feedback entirely.</span></div>
    <div class="opt" data-i="3"><span class="l">D</span><span>Only use a bigger model so feedback isn't needed.</span></div>
    <div class="qexp">Thumbs buttons reliably go unused, starving the flywheel. The richest, most plentiful signals are corrections (an edit shows what was wrong and the fix) and implicit behavior (accept/copy/re-ask/abandon) — captured automatically, in the natural flow, without begging for a rating.</div>
  </div>
  <div class="quiz" data-correct="3">
    <div class="q">Why is a data flywheel a stronger moat than the model an AI product runs on?</div>
    <div class="opt" data-i="0"><span class="l">A</span><span>Models are illegal to reuse.</span></div>
    <div class="opt" data-i="1"><span class="l">B</span><span>Flywheels are cheaper to build.</span></div>
    <div class="opt" data-i="2"><span class="l">C</span><span>The model never matters at all.</span></div>
    <div class="opt" data-i="3"><span class="l">D</span><span>Competitors can rent the same model, but they can't rent your users' compounding, usage-generated data — after 12–24 months that lead is very hard to cross.</span></div>
    <div class="qexp">The model is a commodity anyone can rent; proprietary data generated by your users (Tesla's miles, Copilot's in-codebase signal) is not. It compounds — more usage, more data, better product — into a lead competitors can't buy. Capturing that data is the PM's design job.</div>
  </div>

  <h2><span class="ix">✎</span> Apply It Yourself</h2>
  <div class="sub">No worked answer this time — this one's your rep. Give it 10 minutes before you move on.</div>
  <div class="callout">
    <div class="ch">Your problem</div>
    <p style="font-family:var(--font-ui);font-weight:600;">"Leadership worries your AI product has 'no moat — competitors use the same model.' Design the moat: what signal you'd capture and how you'd make it compound."</p>
  </div>
  <p><strong>Hints</strong> (peek only if you're stuck):</p>
  <ul>
    <li>The model is rentable; the moat is the data your users generate.</li>
    <li>Capture corrections and implicit behavior, not just a thumbs button.</li>
    <li>The trap: relying on thumbs up/down that nobody clicks.</li>
  </ul>
  <table>
    <tr><th>A strong answer...</th><th>A weak answer...</th></tr>
    <tr><td>Designs correction + implicit-signal capture feeding an eval / improvement loop.</td><td>Adds a thumbs button and hopes.</td></tr>
    <tr><td>Builds the action layer so signal becomes shipped improvement.</td><td>Collects data nobody uses.</td></tr>
    <tr><td>Explains the compounding (usage → data → better → more usage).</td><td>Treats the model as the moat.</td></tr>
  </table>
  <div class="callout accent">
    <div class="ch">Make it live</div>
    <p>Look at an AI product you use: what signal are you giving it for free (edits, re-asks, copies)? Is it capturing that — or wasting it?</p>
  </div>

  <div class="callout good" style="margin-top:40px;">
    <div class="ch">Chapter 11 complete</div>
    <p>You can now improve an AI product the way the best teams do: run the eval-driven loop and fix the cheapest lever from real failure analysis (11.1), and design the data flywheel so usage compounds into a moat the model alone can never give you (11.2). Improvement is a loop you run and a wheel you build — not a release you wait for. Next, <strong>Chapter 12 — Customer Comms &amp; GTM for AI</strong>: selling a probability honestly.</p>
  </div>
  __NAV__
</div>

"12.1": `
<div class="wrap">
  <div class="les-kicker">Chapter 12 · Lesson 12.1</div>
  <h1 class="les-title">Selling Probabilistic Outcomes Honestly</h1>
  <div class="les-meta">
    <span class="pill">Go-to-market</span><span class="pill">~22 min read</span>
    <span class="pill">Prereq: Ch.4.2</span><span class="pill">Difficulty: core</span>
  </div>
  <p class="motto">Every AI landing page says "it just works." The first time it doesn't — and there is always a first time — that sentence becomes the reason they churn. Sell the probability, not the magic.</p>

  <p class="lead">Marketing an AI product pulls hard toward the words "automatic," "effortless," "it just works." Those words convert — and then they betray you, because the product is probabilistic and will be visibly wrong at some point. This lesson is about closing the gap between the promise and the product: how to message accuracy and limits so that <em class="k">trust survives the first mistake</em> instead of dying with it. Honest expectation-setting isn't timidity; it's the highest-leverage retention work you'll do.</p>

  <h2><span class="ix">1</span> Your Mandate</h2>
  <div class="sub">What you own when sales and marketing want to promise magic.</div>
  <p>Your mandate is to <strong>make the promise match the probability</strong>. Go-to-market will reach for "fully automated" and "always accurate" because that language wins demos and signups. Your job is to ensure the claim is one the product can actually keep — because the gap between what you promised and what the model delivers is exactly where trust, retention, and (increasingly) regulators come for you. You own the honesty of the claim, and honesty here is a growth strategy, not a brake on one.</p>

  <h2><span class="ix">2</span> Your Responsibilities</h2>
  <div class="sub">Honest framing vs the over-promise that feels good and ends badly.</div>
  <table>
    <tr><th>Honest framing</th><th>The over-promise (the trap)</th></tr>
    <tr><td><strong>"Drafts a reply you approve and send"</strong></td><td>"Fully automated support"</td></tr>
    <tr><td><strong>"Right about 90% of the time — with sources so you can verify"</strong></td><td>"Always accurate"</td></tr>
    <tr><td><strong>"Handles routine questions; escalates the rest to your team"</strong></td><td>"Replaces your support team"</td></tr>
    <tr><td><strong>Shows the limits up front</strong></td><td>Hides them until the user finds them</td></tr>
    <tr><td><strong>Clear, predictable pricing</strong></td><td>Surprise costs revealed on the bill</td></tr>
  </table>
  <p>The left column converts a little worse on day one and dramatically better over a year, because every claim is one the product keeps. The right column is a loan against future trust — and the interest is churn.</p>

  <h2><span class="ix">3</span> Metrics That Matter Here</h2>
  <div class="sub">The numbers that reveal an expectation gap before it becomes a churn spike.</div>
  <table>
    <tr><th>Metric</th><th>Reads as</th><th>Why a PM watches it</th></tr>
    <tr><td><strong>Expectation gap</strong></td><td>What you promised minus what the product delivers</td><td>The size of the gap is the size of the future disappointment</td></tr>
    <tr><td><strong>Trust-after-first-error retention</strong></td><td>Do users stay after the first visible mistake?</td><td>The truest test of whether your messaging was honest</td></tr>
    <tr><td><strong>Disappointment churn</strong></td><td>Cancellations citing "not what I expected"</td><td>The bill for over-promising, paid monthly</td></tr>
    <tr><td><strong>"It didn't work like you said" tickets</strong></td><td>Support volume blaming the marketing claim</td><td>A direct readout of the promise–product gap</td></tr>
  </table>
  <div class="callout warn">
    <div class="ch">The trap — the claim that converts then betrays</div>
    <p>"It just works" is the highest-converting and most destructive line in AI marketing. It maximizes signups and sets a 100% expectation no probabilistic product can keep, so the first visible error reads as a broken promise, not a normal limitation. You bought signups with future churn — and in 2024–25 regulators began treating exaggerated AI claims as deceptive practice. <strong>An overclaim is a debt; the first mistake is when it comes due.</strong></p>
  </div>

  <h2><span class="ix">4</span> How to Think Here</h2>
  <div class="sub">Two ways to set expectations — and what each does to trust at the first mistake.</div>
  <div class="fig">
    <div class="fig-title">The trust curve — over-promise vs honest</div>
    <svg viewBox="0 0 520 290" xmlns="http://www.w3.org/2000/svg" font-family="Hanken Grotesk, sans-serif">
      <line x1="60" y1="244" x2="492" y2="244" stroke="#1d1d1f" stroke-width="1.2"/>
      <line x1="60" y1="244" x2="60" y2="46" stroke="#1d1d1f" stroke-width="1.2"/>
      <text x="276" y="272" text-anchor="middle" font-size="11" fill="#86868b">time →</text>
      <text x="38" y="146" text-anchor="middle" font-size="11" fill="#86868b" transform="rotate(-90 38 146)">customer trust</text>
      <line x1="300" y1="58" x2="300" y2="244" stroke="#b25000" stroke-width="1.3" stroke-dasharray="4 3"/>
      <text x="300" y="50" text-anchor="middle" font-size="9" font-weight="700" fill="#b25000">first visible mistake</text>
      <polyline points="70,78 300,92 332,196 490,206" fill="none" stroke="#b25000" stroke-width="2.4"/>
      <polyline points="70,162 300,138 326,152 490,108" fill="none" stroke="#0a7d3c" stroke-width="2.4"/>
      <circle cx="490" cy="206" r="3.5" fill="#b25000"/><circle cx="490" cy="108" r="3.5" fill="#0a7d3c"/>
      <text x="486" y="224" text-anchor="end" font-size="9.5" font-weight="700" fill="#b25000">over-promise: "it just works"</text>
      <text x="486" y="98" text-anchor="end" font-size="9.5" font-weight="700" fill="#0a7d3c">honest: "~90%, you verify"</text>
    </svg>
    <div class="fig-cap">Over-promising buys a high start — until the first mistake (and there is always one), when trust collapses below where honesty even began. An honest promise survives the miss and compounds past it.</div>
  </div>
  <p>To set an expectation that survives contact with reality:</p>
  <ol>
    <li><strong>State the probability, not a guarantee.</strong> "Usually," "most of the time," "drafts for your review" — never "always."</li>
    <li><strong>Name the limits up front.</strong> Telling users what it can't do builds more trust than pretending it can do everything.</li>
    <li><strong>Make verification easy.</strong> Citations and sources (Ch.1) turn "trust me" into "check for yourself."</li>
    <li><strong>Promise the floor, deliver above it.</strong> Under-promise on purpose; let the product pleasantly exceed the claim.</li>
    <li><strong>Communicate changes early and clearly</strong> — especially pricing. How you say it is part of the product.</li>
  </ol>
  <div class="callout accent">
    <div class="ch">Say this in the interview</div>
    <p>"I sell a probability, not a guarantee. I'd message it as 'handles the routine cases and escalates the rest, with sources to verify' rather than 'fully automated' — because the first visible mistake is inevitable, and honest framing is what lets trust survive it instead of collapse."</p>
  </div>

  <h2><span class="ix">5</span> Frameworks to Deploy</h2>
  <div class="sub">Three rules for selling a probabilistic product without lying about it.</div>
  <h3>① Under-promise, over-deliver</h3>
  <p>Set the public bar where the product reliably clears it, then let it beat the claim. A user who expected "handles routine questions" and gets 90% coverage is delighted; a user who expected "fully automated" and gets 90% feels cheated by the same product. Same reality, opposite trust — the only difference is the promise.</p>
  <h3>② Sell the workflow, not the magic</h3>
  <p>Describe what the product actually does in the user's workflow — "drafts replies for your approval," "flags risky contracts for review" — instead of an outcome it can't guarantee. Workflow language is honest, concrete, and conveniently bakes the human-in-the-loop (Ch.2) right into the pitch, so the limit is a feature, not a surprise.</p>
  <h3>③ How you communicate change is part of the product</h3>
  <p>A pricing change, a capability cut, a model swap — the <em>communication</em> of it can do more damage than the change itself. Tell users early, plainly, and before the bill or the bug does. Surprise is the trust-killer; a change announced well is absorbed, a change discovered is resented.</p>

  <h2><span class="ix">6</span> Worked Solution</h2>
  <div class="sub">The landing-page line that would convert — and cost you.</div>
  <div class="callout">
    <div class="ch">The prompt</div>
    <p style="font-family:var(--font-ui);font-weight:600;">"Marketing wants the homepage to say 'AI that handles all your customer support, fully automated.' You know it resolves about 50% and escalates the rest. What do you do?"</p>
  </div>
  <p><strong>Step 1 — Refuse the overclaim, with the reason.</strong> "Fully automated" sets a 100% expectation against a 50% reality. It will convert well and then betray every customer at their first escalation, generating churn, bad reviews, and — given the FTC's stance on exaggerated AI claims — real legal exposure.</p>
  <div class="flow">
<span class="st">OVER-PROMISE</span>  <span class="nt">"fully automated support" → signups soar</span>
   <span class="ar">↓ first escalation (inevitable)</span>
<span class="st">BETRAYAL</span>      <span class="nt">"you said it just works" → churn · bad reviews · regulatory risk</span>

<span class="st">HONEST</span>        <span class="nt">"resolves routine questions instantly, escalates the rest to your team"</span>
   <span class="ar">↓ first escalation (expected)</span>
<span class="st">TRUST HOLDS</span>   <span class="nt">"it did exactly what it promised" → retention</span>
  </div>
  <p><strong>Step 2 — Reframe to the honest, still-compelling claim.</strong> "Resolves your routine support questions instantly and routes the rest to your team — so customers always reach a human when they need one." That's accurate, it's a genuinely strong pitch (instant + safe), and it pre-sells the escalation as a feature rather than a failure.</p>
  <p><strong>Step 3 — Make the limit a selling point.</strong> "Always escalates to a human when unsure" is reassuring, not weak. Pairing the AI's speed with a visible human safety net is more attractive to a buyer than an unbelievable "fully automated."</p>
  <p><strong>Step 4 — Set the internal metric.</strong> Track trust-after-first-escalation retention, not just signup conversion. If the honest page converts slightly lower but retains far better, it wins on the only number that compounds.</p>
  <div class="callout good">
    <div class="ch">Why this wins</div>
    <p>You traded a fragile conversion spike for durable trust. The honest claim still sells (instant answers, human safety net), survives the inevitable escalation, and keeps you clear of deceptive-marketing risk. You optimized for the customer who's still here in a year, not just the one who clicked today.</p>
  </div>

  <h2><span class="ix">7</span> Industry Case</h2>
  <div class="sub">Three flavors of the same lesson: the legal, reputational, and communication costs of overclaiming.</div>
  <h3>DoNotPay, Klarna, and Cursor — when the promise outran the product</h3>
  <p><strong>The legal cost — DoNotPay.</strong> In September 2024 the FTC launched <em>Operation AI Comply</em>, a crackdown on deceptive AI claims it calls "AI washing." A headline case: DoNotPay marketed the "world's first robot lawyer," but the FTC found the service couldn't live up to claims that it could substitute for a human lawyer — and DoNotPay settled. The lesson is stark: selling a probabilistic AI as a guaranteed outcome is now not just risky for trust, it's an enforcement target with real penalties.</p>
  <p><strong>The reputational cost — Klarna.</strong> Klarna's 2024 messaging that its AI did the work of <strong>~700 agents</strong> and handled two-thirds of support was a marketing triumph — until 2025, when it publicly walked back the most aggressive automation and reintroduced human agents after quality slipped on harder cases (Ch.2, Ch.5). The overclaim outran the product, and the correction became its own news story.</p>
  <p><strong>The communication cost — Cursor.</strong> Cursor's flat "$20/month" plan implied effectively unlimited use; in 2025 it moved to usage-based pricing, and users discovered "unlimited" had meant only an auto-selected model and hit surprise overage bills. The CEO publicly apologized and refunded charges around July 2025. Crucially, the damage came less from the pricing change than from how it was <em>communicated</em> — a surprise on the bill instead of a clear heads-up (Ch.1.4).</p>
  <ul>
    <li><strong>Overclaiming now has a regulator.</strong> "It just works" can be a deceptive-practices problem, not just a churn problem.</li>
    <li><strong>The correction is louder than the claim.</strong> Walking back an overclaim (Klarna) makes news the original hype primed.</li>
    <li><strong>How you communicate is the product.</strong> Cursor's substance was defensible; the surprise was not.</li>
  </ul>
  <div class="callout accent">
    <div class="ch">The PM takeaway</div>
    <p>You sell a probability, not a guarantee. Promise what the product reliably keeps, name the limits, make verification easy, and communicate every change before the user discovers it. Honest expectation-setting costs you a little conversion today and saves you churn, reputation, and legal exposure tomorrow — set it honestly, or the first mistake collects the debt.</p>
  </div>

  <h2><span class="ix">✓</span> Check Yourself</h2>
  <div class="quiz" data-correct="1">
    <div class="q">Why is "fully automated, it just works" a dangerous tagline for a probabilistic AI product?</div>
    <div class="opt" data-i="0"><span class="l">A</span><span>It's too short.</span></div>
    <div class="opt" data-i="1"><span class="l">B</span><span>It sets a 100% expectation the product can't keep, so the inevitable first mistake reads as a broken promise — driving churn and even deceptive-claims risk.</span></div>
    <div class="opt" data-i="2"><span class="l">C</span><span>Customers prefer long taglines.</span></div>
    <div class="opt" data-i="3"><span class="l">D</span><span>It mentions automation.</span></div>
    <div class="qexp">A probabilistic product will be visibly wrong sometimes. A 100% promise turns that normal limitation into a betrayal, spiking disappointment-churn — and regulators (FTC's Operation AI Comply) now treat exaggerated AI claims as deceptive. Promise what the product reliably keeps.</div>
  </div>
  <div class="quiz" data-correct="2">
    <div class="q">Cursor's 2025 pricing change caused an uproar. What's the core GTM lesson?</div>
    <div class="opt" data-i="0"><span class="l">A</span><span>Never change pricing.</span></div>
    <div class="opt" data-i="1"><span class="l">B</span><span>Usage-based pricing is always wrong.</span></div>
    <div class="opt" data-i="2"><span class="l">C</span><span>How you communicate a change can do more damage than the change itself — surprise on the bill breaks trust; an early, clear heads-up preserves it.</span></div>
    <div class="opt" data-i="3"><span class="l">D</span><span>Pricing doesn't affect trust.</span></div>
    <div class="qexp">The pricing shift was defensible; discovering it as a surprise overage (after "unlimited" implied otherwise) was not. Communicating change early and plainly — before the bill or the bug reveals it — is part of the product. Surprise is the trust-killer.</div>
  </div>

  <h2><span class="ix">✎</span> Apply It Yourself</h2>
  <div class="sub">No worked answer this time — this one's your rep. Give it 10 minutes before you move on.</div>
  <div class="callout">
    <div class="ch">Your problem</div>
    <p style="font-family:var(--font-ui);font-weight:600;">"Marketing wants your homepage to say 'AI that handles all your customer support, fully automated.' You know it resolves about 50% and escalates the rest. Decide what you do — and write the honest line that still sells."</p>
  </div>
  <p><strong>Hints</strong> (peek only if you're stuck):</p>
  <ul>
    <li>A 100% promise on a probabilistic product betrays at the first miss.</li>
    <li>Sell the workflow ('resolves routine, escalates the rest'), not magic.</li>
    <li>The trap: optimizing signup conversion with an overclaim.</li>
  </ul>
  <table>
    <tr><th>A strong answer...</th><th>A weak answer...</th></tr>
    <tr><td>Rejects the overclaim; writes an honest, still-compelling line; makes the limit a feature.</td><td>Ships 'fully automated.'</td></tr>
    <tr><td>Optimizes trust-after-first-error retention, not just conversion.</td><td>Maximizes signups, ignores churn.</td></tr>
    <tr><td>Notes the regulatory / trust risk of deceptive AI claims.</td><td>Treats overclaiming as harmless.</td></tr>
  </table>
  <div class="callout accent">
    <div class="ch">Make it live</div>
    <p>Find a real AI landing page that says 'it just works.' Rewrite its headline honestly — and decide which version you'd actually trust.</p>
  </div>

  <div class="callout good" style="margin-top:40px;">
    <div class="ch">Chapter 12 complete</div>
    <p>You can now take a probabilistic product to market without lying about it: promise what it reliably keeps, name the limits, make verification easy, and communicate change before users discover it. Honesty isn't the cautious choice — it's the one that survives the first mistake and compounds into trust. Next, <strong>Chapter 13 — AI PM Case Interviews</strong>: turning everything in this course into a repeatable way to crack the interview.</p>
  </div>
  __NAV__
</div>
`,

<div class="wrap">
  <div class="les-kicker">Chapter 13 · Lesson 13.1</div>
  <h1 class="les-title">The 2026 AI PM Case Framework</h1>
  <div class="les-meta">
    <span class="pill">Case interviews</span><span class="pill">~24 min read</span>
    <span class="pill">Prereq: Ch.1–12</span><span class="pill">Difficulty: core</span>
  </div>
  <p class="motto">The candidate who brainstorms ten features loses to the one who draws five boxes and names where it breaks. The AI PM case isn't a creativity test — it's a systems test.</p>

  <p class="lead">Everything in this course converges here. An AI PM case interview doesn't reward clever feature ideas; it rewards the ability to <em class="k">map a system, find its bottleneck, name the tradeoff, define the metric, and design the failure</em>. This lesson gives you one repeatable framework that handles any AI PM case — and it's nothing new. It's Chapters 1 through 12, run in order, under pressure.</p>

  <h2><span class="ix">1</span> Your Mandate</h2>
  <div class="sub">What the interviewer is actually testing.</div>
  <p>Your mandate in a case is to <strong>demonstrate AI-PM reasoning, not generate features</strong>. The interviewer wants to see whether you can think in systems and tradeoffs the way this course trained you. They are explicitly <em>not</em> looking for a list of cool capabilities — a candidate who jumps to "I'd add X, Y, and Z" signals junior every time. Own the structure: map before you solve, and let the framework show your seniority in the first sixty seconds.</p>

  <h2><span class="ix">2</span> Your Responsibilities</h2>
  <div class="sub">The five steps — and the chapter each one comes from.</div>
  <table>
    <tr><th>Step</th><th>What you do</th><th>From</th></tr>
    <tr><td><strong>1 · Map the system</strong></td><td>Draw boxes-and-arrows: input → retrieve → reason → guard → output</td><td>Ch.1.1</td></tr>
    <tr><td><strong>2 · Find the bottleneck</strong></td><td>Which box, if it breaks, breaks the product? (usually retrieval)</td><td>Ch.1.2</td></tr>
    <tr><td><strong>3 · Name the tradeoff</strong></td><td>Pick 2 of quality / latency / cost — say the sacrifice out loud</td><td>Ch.1.1</td></tr>
    <tr><td><strong>4 · Define the metric</strong></td><td>Eval score, cost-per-task, containment — never DAU</td><td>Ch.5</td></tr>
    <tr><td><strong>5 · Design the failure</strong></td><td>Loud failure, fallback, human-in-the-loop</td><td>Ch.1, Ch.4.2</td></tr>
  </table>
  <p>That's the whole framework. Run it top to bottom on any prompt — "design an answer engine," "fix our chatbot," "should we build an agent?" — and you will sound like someone who has shipped AI products, because the framework <em>is</em> what shipping them taught.</p>

  <h2><span class="ix">3</span> Metrics That Matter Here</h2>
  <div class="sub">How a strong case answer is actually scored.</div>
  <table>
    <tr><th>What they grade</th><th>Strong signal</th><th>Weak signal</th></tr>
    <tr><td><strong>Structure</strong></td><td>You mapped the system before proposing anything</td><td>You started listing features</td></tr>
    <tr><td><strong>Bottleneck</strong></td><td>You found the real constraint (often retrieval)</td><td>You blamed "the model"</td></tr>
    <tr><td><strong>Tradeoff fluency</strong></td><td>You named the sacrifice (e.g., latency for quality)</td><td>You implied you can have it all</td></tr>
    <tr><td><strong>Evals</strong></td><td>You defined how quality is measured and monitored</td><td>You had no evaluation plan</td></tr>
  </table>
  <div class="callout warn">
    <div class="ch">The trap — feature brainstorming and the missing eval plan</div>
    <p>Two moves end an interview early. First, <strong>brainstorming features before mapping the system</strong> — it reads as a generic PM who doesn't understand AI. Second, <strong>skipping the evaluation plan</strong> — interviewers treat "how will you measure quality and catch regressions?" as a production-readiness litmus test. As one frequently-cited line from OpenAI's product leadership puts it: <em>the most important thing a PM can learn to do is write evals.</em> No eval plan, no offer.</p>
  </div>

  <h2><span class="ix">4</span> How to Think Here</h2>
  <div class="sub">One framework, five steps, run in order — every time.</div>
  <div class="fig">
    <div class="fig-title">The 2026 AI PM case framework</div>
    <svg viewBox="0 0 520 200" xmlns="http://www.w3.org/2000/svg" font-family="Hanken Grotesk, sans-serif">
      <rect x="14" y="64" width="84" height="66" rx="9" fill="#0071e3" opacity="0.10" stroke="#0071e3" stroke-width="1.3"/>
      <text x="56" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#0058b0">1 Map</text>
      <text x="56" y="106" text-anchor="middle" font-size="9" fill="#0058b0">the system</text>
      <text x="56" y="123" text-anchor="middle" font-size="8.5" fill="#86868b">Ch.1</text>
      <rect x="116" y="64" width="84" height="66" rx="9" fill="#ffffff" stroke="#1d1d1f" stroke-width="1.2"/>
      <text x="158" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#1d1d1f">2 Find</text>
      <text x="158" y="106" text-anchor="middle" font-size="9" fill="#1d1d1f">bottleneck</text>
      <text x="158" y="123" text-anchor="middle" font-size="8.5" fill="#86868b">Ch.1</text>
      <rect x="218" y="64" width="84" height="66" rx="9" fill="#ffffff" stroke="#1d1d1f" stroke-width="1.2"/>
      <text x="260" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#1d1d1f">3 Name</text>

      <text x="260" y="123" text-anchor="middle" font-size="8.5" fill="#86868b">Ch.1</text>

      <text x="362" y="106" text-anchor="middle" font-size="9" fill="#1d1d1f">metric</text>
      <text x="362" y="123" text-anchor="middle" font-size="8.5" fill="#86868b">Ch.5</text>
      <rect x="422" y="64" width="84" height="66" rx="9" fill="#ffffff" stroke="#1d1d1f" stroke-width="1.2"/>
      <text x="464" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#1d1d1f">5 Design</text>
      <text x="464" y="106" text-anchor="middle" font-size="9" fill="#1d1d1f">failure</text>
      <text x="464" y="123" text-anchor="middle" font-size="8.5" fill="#86868b">Ch.4</text>
      <line x1="98" y1="97" x2="116" y2="97" stroke="#86868b" stroke-width="1.4" marker-end="url(#c131)"/>
      <line x1="200" y1="97" x2="218" y2="97" stroke="#86868b" stroke-width="1.4" marker-end="url(#c131)"/>
      <line x1="302" y1="97" x2="320" y2="97" stroke="#86868b" stroke-width="1.4" marker-end="url(#c131)"/>
      <line x1="404" y1="97" x2="422" y2="97" stroke="#86868b" stroke-width="1.4" marker-end="url(#c131)"/>
      <text x="260" y="160" text-anchor="middle" font-size="9.5" fill="#86868b">map before you solve — the whole course, run in order</text>
      <defs><marker id="c131" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,6 Z" fill="#86868b"/></marker></defs>
    </svg>
    <div class="fig-cap">Five steps, in order, on any AI PM case: map the system, find the bottleneck, name the tradeoff, define the metric, design the failure. It's Chapters 1–12 turned into an interview reflex.</div>
  </div>
  <p>Run the framework like this:</p>
  <ol>
    <li><strong>Map the system first.</strong> Resist solving. Draw the boxes-and-arrows out loud (Ch.1.1).</li>
    <li><strong>Find the bottleneck.</strong> Name the box that breaks the product — and resist blaming the model (Ch.1.2).</li>
    <li><strong>Name the tradeoff.</strong> Pick two of quality/latency/cost and state the sacrifice (Ch.1.1).</li>
    <li><strong>Define the metric.</strong> Eval score, cost-per-task, containment — and a monitoring plan (Ch.5).</li>
    <li><strong>Design the failure.</strong> What happens when it's wrong: loud failure, fallback, human-in-the-loop (Ch.4.2).</li>
  </ol>
  <div class="callout accent">
    <div class="ch">Say this in the first 60 seconds</div>
    <p>"Before I propose anything, let me map the system and find the bottleneck — for most AI products it's retrieval or failure-handling, not the model. Then I'll name the tradeoff, define how we'd measure quality with evals, and design what happens when it's wrong."</p>
  </div>

  <h2><span class="ix">5</span> Frameworks to Deploy</h2>
  <div class="sub">Three reflexes that carry the whole interview.</div>
  <h3>① The five-step spine</h3>
  <p>Map → bottleneck → tradeoff → metric → failure. Memorize the order; it converts a blank-page panic into a confident walk-through. Every other framework in this course slots into one of these five steps.</p>
  <h3>② Map before you solve</h3>
  <p>The single highest-signal move is drawing the system before proposing anything. It instantly separates you from candidates who feature-brainstorm, and it gives you the boxes you'll need for every later step. Narrate it: "Let me sketch the pipeline first."</p>
  <h3>③ Always bring evals</h3>
  <p>End every case with how you'd measure quality and catch regressions — eval set, cost-per-task, monitoring (Ch.5). Interviewers use the presence or absence of an eval plan as a direct readiness signal. Bringing it unprompted is the closing move that confirms you can actually drive the work, not just talk about it.</p>

  <h2><span class="ix">6</span> Worked Solution</h2>
  <div class="sub">The framework, demonstrated fast (full cases come in 13.2–13.3).</div>
  <div class="callout">
    <div class="ch">The prompt</div>
    <p style="font-family:var(--font-ui);font-weight:600;">"Design an AI assistant that answers patients' basic medical questions. Walk me through your thinking."</p>
  </div>
  <p><strong>1 · Map.</strong> Question → retrieve from a vetted medical knowledge base → reason → guard (cite sources, safety-check) → answer. I'd say this out loud before anything else.</p>
  <p><strong>2 · Bottleneck.</strong> Two: retrieval (a wrong source yields a confident wrong medical answer) and the guard (safety). The model's fluency isn't the risk; what it's grounded in, and what it does when unsure, is.</p>
  <p><strong>3 · Tradeoff.</strong> This is high-consequence, so I protect quality and safety and sacrifice latency and cost — crank retrieval recall, set a high relevance threshold, add a safety check, and accept it's slower and pricier.</p>
  <p><strong>4 · Metric.</strong> Percent of answers correct-with-citation, hallucination rate, and "referred to a clinician" rate — measured on an eval set built with medical professionals. Not engagement.</p>
  <p><strong>5 · Failure.</strong> A loud failure by design: below the confidence threshold, or on any high-risk symptom, it says "please see a clinician" and routes to a human rather than guessing. The dangerous failure (confident wrong advice) is engineered out.</p>
  <div class="callout good">
    <div class="ch">Why this wins</div>
    <p>In under two minutes you mapped a system, located the real risk (retrieval and safety, not the model), named the tradeoff for a high-stakes domain, defined medical-appropriate metrics with an eval plan, and designed a safe failure. You never brainstormed a feature — and that's exactly why it lands as senior.</p>
  </div>

  <h2><span class="ix">7</span> Industry Case</h2>
  <div class="sub">What 2025–26 AI PM interviews actually ask — and reward.</div>
  <h3>The real hiring loop — system design and evals, not feature lists</h3>
  <p>Reports from 2025–26 AI PM hiring loops describe exactly the framework above. Interviewers test <strong>tradeoff fluency</strong> directly — making candidates reason through choices like retrieval speed vs context length, prompt-engineering vs fine-tuning, or GPU cost vs latency — because, as the guidance puts it, every real generative system survives on balanced tradeoffs. The common prompts are the ones this course rehearsed: design a customer-support agent (intent + RAG retrieval + scoped actions), design a RAG system that handles conflicting sources, or fix a vector search returning irrelevant results. And the most-cited red flag is the one block 3 warned about: <strong>skipping the evaluation and monitoring plan signals a lack of production readiness.</strong></p>
  <p>The bar is also explicitly about <em>driving</em> versus being <em>adjacent</em>: interviewers probe technical details, and if you can't name the architecture, the eval metrics, and the business impact, they assume you watched rather than led. That is the whole purpose of this course's spine — Chapters 1 through 5 give you the architecture and metrics, Chapters 6 through 12 give you the planning, specs, and tradeoffs, and this framework lets you deploy all of it on demand.</p>
  <ul>
    <li><strong>The cases mirror real systems you studied.</strong> "Design an answer engine" is Perplexity; "support agent" is Sierra/Klarna; "fix the RAG" is Harvey's bottleneck — you've already worked these.</li>
    <li><strong>Evals are the differentiator.</strong> OpenAI's product leadership calling eval-writing the top PM skill is not hype; it's the interview rubric.</li>
    <li><strong>Structure beats brilliance.</strong> A calm five-step walk-through beats a flashy feature pitch every time.</li>
  </ul>
  <div class="callout accent">
    <div class="ch">The PM takeaway</div>
    <p>The 2026 AI PM case rewards system-mapping and tradeoff-naming over feature brainstorming — and you already hold the system, the tradeoffs, and the metrics from this course. The framework just sequences them. Map, bottleneck, tradeoff, metric, failure: run it on autopilot, and the next two lessons drill it on full cases.</p>
  </div>

  <h2><span class="ix">✓</span> Check Yourself</h2>
  <div class="quiz" data-correct="1">
    <div class="q">An interviewer says "design an AI customer-support tool." What's the strongest opening move?</div>
    <div class="opt" data-i="0"><span class="l">A</span><span>List ten features it could have.</span></div>
    <div class="opt" data-i="1"><span class="l">B</span><span>Map the system out loud (input → retrieve → reason → guard → output), then find the bottleneck.</span></div>
    <div class="opt" data-i="2"><span class="l">C</span><span>Recommend a specific model and vector database immediately.</span></div>
    <div class="opt" data-i="3"><span class="l">D</span><span>Ask what the budget is.</span></div>
    <div class="qexp">Map before you solve. Drawing the pipeline first signals AI-PM seniority and gives you the boxes for every later step (bottleneck, tradeoff, metric, failure). Feature-listing (A) and naming the stack before mapping (C) are the classic junior tells.</div>
  </div>
  <div class="quiz" data-correct="3">
    <div class="q">You've mapped the system, found the bottleneck, named the tradeoff. What must you not forget before finishing?</div>
    <div class="opt" data-i="0"><span class="l">A</span><span>The company's stock price.</span></div>
    <div class="opt" data-i="1"><span class="l">B</span><span>A list of competitor logos.</span></div>
    <div class="opt" data-i="2"><span class="l">C</span><span>Which programming language to use.</span></div>
    <div class="opt" data-i="3"><span class="l">D</span><span>The metric and the failure design — how you'd measure quality with evals, and what happens when it's wrong.</span></div>
    <div class="qexp">Steps 4 and 5 are where many candidates stop short. Interviewers treat a missing eval/monitoring plan as a production-readiness red flag, and a missing failure design as not understanding probabilistic products. Always close with metric + failure.</div>
  </div>
  <h2><span class="ix">✎</span> Apply It Yourself</h2>
  <div class="sub">No worked answer this time — and no notes. This is the rep that mirrors the real interview.</div>
  <div class="callout">
    <div class="ch">Your problem</div>
    <p style="font-family:var(--font-ui);font-weight:600;">"An interviewer says: 'Design an AI assistant that helps users file their taxes.' You have 60 seconds to open. Run the 5-step framework out loud — no notes."</p>
  </div>
  <p><strong>Hints</strong> (peek only if you're stuck):</p>
  <ul>
    <li>Map before you solve: boxes-and-arrows first.</li>
    <li>High-consequence domain — protect quality/safety, design the failure.</li>
    <li>The trap: brainstorming features or naming a model first.</li>
  </ul>
  <table>
    <tr><th>A strong answer...</th><th>A weak answer...</th></tr>
    <tr><td>Maps system → bottleneck → tradeoff → metric → failure, in order.</td><td>Lists features or picks a model.</td></tr>
    <tr><td>Defines an eval + monitoring plan unprompted.</td><td>Skips how quality is measured.</td></tr>
    <tr><td>Designs a loud failure (escalate to a human when unsure).</td><td>Leaves confident wrong answers.</td></tr>
  </table>
  <div class="callout accent">
    <div class="ch">Make it live</div>
    <p>Have someone throw you a random 'design an AI X' prompt and run all 5 steps in under two minutes. Where did you stall?</p>
  </div>
  __NAV__
</div>
`,

<div class="wrap">
  <div class="les-kicker">Chapter 13 · Lesson 13.2</div>
  <h1 class="les-title">Worked Case: Design an AI Agent</h1>
  <div class="les-meta">
    <span class="pill">Case interviews</span><span class="pill">~24 min read</span>
    <span class="pill">Prereq: 13.1, Ch.2</span><span class="pill">Difficulty: core</span>
  </div>
  <p class="motto">"Design an agent that books meetings." The trap is to start listing what it can do. The win is to ask how much autonomy it gets — and where you'd never let it act alone.</p>

  <p class="lead">The agent-design case is the most common — and most mishandled — AI PM interview. Candidates rush to make it powerful and autonomous; the strong answer treats autonomy as a liability granted deliberately (Ch.2). This lesson walks a full agent case end to end with the framework from 13.1, so you can run the same play on any "design an agent" prompt: map the job, decompose actions by <em class="k">blast radius</em>, set the leash, bound the loop, and measure it.</p>

  <h2><span class="ix">1</span> Your Mandate</h2>
  <div class="sub">What the interviewer is testing in an agent case.</div>
  <p>Your mandate is to <strong>show that you grant autonomy on purpose, scoped to risk</strong> — the core Chapter 2 lesson. The interviewer wants to see you resist "make it fully autonomous," decompose the agent's actions by what each can break, and put hard human checkpoints on the irreversible ones. Demonstrating that judgment — not the longest feature list — is what wins the case.</p>

  <h2><span class="ix">2</span> Your Responsibilities</h2>
  <div class="sub">The checklist a complete agent answer covers.</div>
  <table>
    <tr><th>Cover this</th><th>From</th></tr>
    <tr><td><strong>Workflow vs agent</strong> — does the path even need runtime decisions?</td><td>Ch.2.1</td></tr>
    <tr><td><strong>Single vs multi-agent</strong> — coherence task or breadth task?</td><td>Ch.2.2</td></tr>
    <tr><td><strong>Tools, scoped by blast radius</strong> — read / write / irreversible</td><td>Ch.2.3</td></tr>
    <tr><td><strong>The autonomy leash</strong> — which level per action</td><td>Ch.2.1</td></tr>
    <tr><td><strong>Loop bounds + failure</strong> — max steps, escalation</td><td>Ch.2.1</td></tr>
    <tr><td><strong>Metrics</strong> — autonomous completion, escalation quality</td><td>Ch.2, Ch.5</td></tr>
  </table>

  <h2><span class="ix">3</span> Metrics That Matter Here</h2>
  <div class="sub">How the agent case is scored.</div>
  <table>
    <tr><th>What they grade</th><th>Strong signal</th><th>Weak signal</th></tr>
    <tr><td><strong>Autonomy judgment</strong></td><td>Different autonomy per action, by risk</td><td>"Fully autonomous" by default</td></tr>
    <tr><td><strong>Blast-radius scoping</strong></td><td>Human confirm on irreversible actions</td><td>Same permissions for everything</td></tr>
    <tr><td><strong>Loop control</strong></td><td>Bounded steps + a clean escalation</td><td>An unbounded loop that can spin</td></tr>
    <tr><td><strong>Failure behavior</strong></td><td>Asks when ambiguous, doesn't guess</td><td>Acts confidently on ambiguity</td></tr>
  </table>
  <div class="callout warn">
    <div class="ch">The trap — "make it fully autonomous"</div>
    <p>The instinct that sinks the case is granting full autonomy because it sounds impressive. It's the opposite of senior. The strong candidate says: autonomy is a liability you add deliberately, so I'll grant it generously on low-blast-radius actions and put a human in front of anything irreversible. <strong>The grade is in the gradient, not the maximum.</strong></p>
  </div>

  <h2><span class="ix">4</span> How to Think Here</h2>
  <div class="sub">Sort every action the agent can take by what it can break.</div>
  <div class="fig">
    <div class="fig-title">Grant autonomy by blast radius</div>

    <li><strong>Your case answer mirrors production.</strong> Design the gradient and you're describing how Sierra-class products are actually built.</li>
  </ul>

    <div class="ch">The PM takeaway</div>
    <p>An agent case rewards the same judgment a real agent PM uses daily: earn the agent, pick the topology by task shape, scope actions by blast radius, and gate the irreversible ones. Run that play and you don't just pass the case — you sound like you already do the job.</p>
  </div>

    <div class="opt" data-i="2"><span class="l">C</span><span>Human confirm — it touches other people and is socially irreversible, so the agent prepares it and the user approves the send.</span></div>
    <div class="opt" data-i="3"><span class="l">D</span><span>Skip it entirely.</span></div>
    <div class="qexp">Sending to other people is irreversible (you can't un-send), so it belongs in the top blast-radius tier: the agent drafts everything, a human okays the send. Reads and reversible drafts can run autonomously; the irreversible action gets the checkpoint.</div>

  <p class="motto">Half of AI PM cases aren't "design something new" — they're "this is broken, fix it." The fix is never the first thing the room shouts; it's the box you find by tracing the chain.</p>
